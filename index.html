function cvtTemp(c,u){return u==="F"?Math.round(c*9/5+32):c;}
function fmtTemp(c,u){return cvtTemp(c,u)+"°"+u;}
function cvtSpd(m,u){return u==="kmh"?Math.round(m*1.60934):m;}
function fmtSpd(m,u){return cvtSpd(m,u)+(u==="kmh"?" km/h":" mph");}
function cvtRain(mm,u){return u==="in"?(mm*0.0393701).toFixed(2):mm.toFixed(1);}
function fmtRain(mm,u){if(mm===0)return "0"+(u==="in"?'"':"mm");return cvtRain(mm,u)+(u==="in"?'"':"mm");}
function cvtPres(mb,u){if(u==="pa")return Math.round(mb*100);if(u==="bar")return (mb/1000).toFixed(4);if(u==="ba")return Math.round(mb*1000);return mb;}
function fmtPres(mb,u){var v=cvtPres(mb,u);if(u==="pa")return v+" Pa";if(u==="bar")return v+" bar";if(u==="ba")return v+" ba";return v+" mbar";}

function tc(t){return t>=36?"#ff1500":t>=33?"#ff3d00":t>=30?"#ff6600":t>=27?"#ff8800":t>=24?"#ffaa00":t>=21?"#ffcc00":t>=18?"#c8d400":t>=15?"#7bbf44":"#4a9fd4";}
function rc(r){return r>=70?"#4488ff":r>=40?"#66aaff":r>=20?"#88ccff":"#aaddff";}
function hc(h){return h>=80?"#7755cc":h>=60?"#9977dd":h>=40?"#bbaaee":"#ddccff";}
function wc(w){return w>=30?"#ff7722":w>=20?"#ffaa44":w>=10?"#ffcc88":"#fff0cc";}
function pc(p){return p>=1030?"#ff6600":p>=1020?"#ffaa00":p>=1010?"#88ddff":p>=1000?"#6699cc":"#9955cc";}
function bgc(t){return t>=33?"rgba(255,45,0,0.18)":t>=30?"rgba(255,100,0,0.14)":t>=27?"rgba(255,140,0,0.11)":t>=24?"rgba(255,170,0,0.09)":t>=21?"rgba(255,200,0,0.08)":t>=18?"rgba(180,210,0,0.08)":"rgba(74,159,212,0.06)";}

function uvCol(uv){return uv>=11?"#ff1500":uv>=8?"#ff6600":uv>=6?"#ffaa00":uv>=3?"#ffcc00":uv>0?"#7bbf44":"#555";}
function uvLbl(uv){return uv>=11?"Extreme":uv>=8?"Very High":uv>=6?"High":uv>=3?"Moderate":uv>0?"Low":"None";}

function windCat(mph){
  if(mph<5)return "Very Light";if(mph<10)return "Light Breeze";if(mph<15)return "Moderate Breeze";
  if(mph<20)return "Fresh Breeze";if(mph<30)return "Strong Breeze";if(mph<40)return "Gale";
  if(mph<50)return "Strong Gale";if(mph<60)return "Violent Gale";if(mph<73)return "Very Violent Gale";
  return "Hurricane";
}

function condBonus(cond,temp,shade){
  var isRain=cond.includes("🌧")||cond.includes("🌧🌧")||cond.includes("⛈")||cond.includes("🌦")||cond.includes("💧");
  var eff=shade?(isRain?cond:"☁️"):cond;
  if(eff.includes("⛈"))return -5;if(eff.includes("🌧🌧"))return -5;if(eff.includes("🌧"))return -4;
  if(eff.includes("🌦"))return -4;if(eff.includes("💧"))return -3;
  if(eff.includes("☁"))return -2;if(eff.includes("⛅"))return 0;if(eff.includes("🌤"))return 1;
  if(eff.includes("🌡"))return temp>40?8:temp>35?7:temp>30?6:temp>25?5:4;
  if(eff.includes("☀"))return temp>40?8:temp>35?7:temp>30?6:temp>25?5:temp>20?4:3;
  return 0;
}
function humBonus(h){if(h<=10)return -2;if(h<=20)return -1;if(h<=30)return 0;if(h<=40)return 1;if(h<=50)return 2;if(h<=60)return 3;if(h<=70)return 4;if(h<=80)return 6;if(h<=90)return 8;return 10;}
function windBonus(m){if(m<5)return 1;if(m<10)return 0;if(m<15)return -1;if(m<20)return -3;if(m<30)return -5;if(m<40)return -6;if(m<50)return -8;if(m<60)return -13;return -30;}
function sunFeel(t,m,h,c){return Math.round(t+condBonus(c,t,false)+humBonus(h)+windBonus(m));}
function shadeFeel(t,m,h,c){return Math.round(t+condBonus(c,t,true)+humBonus(h)+windBonus(m));}
function hasSun(c){return c.includes("☀")||c.includes("🌡")||c.includes("🌤")||c.includes("⛅");}

// ── Heatwave Underestimation Bias Correction ──────────────────────────────
// During blocking-pattern UK heat events, NWP models systematically underestimate
// daily max temps. Contributing factors: warm overnight lows (reduced nocturnal
// cooling), low cloud cover (more solar heating than modelled), high pressure
// (suppressed convective mixing), low humidity (continental/dry air advection),
// and increasing model uncertainty with lead time. Correction only applies when
// conditions actually look heatwave-prone — it does nothing on a normal day.
function heatwaveBiasCorrection(temp,nightLow,cloudPct,leadDays,pressure,humidity){
  if(temp<22)return 0; // bias only kicks in near/above heatwave-relevant temps
  var corr=0;
  // Warm night contribution: a night that didn't cool much below ~16C signals
  // an already-warm air mass primed for a hotter-than-modelled day.
  if(nightLow!=null){
    if(nightLow>=20)corr+=0.7;
    else if(nightLow>=18)corr+=0.5;
    else if(nightLow>=16)corr+=0.3;
    else if(nightLow>=14)corr+=0.1;
  }
  // Cloud cover: clear skies mean more direct solar heating than a model with
  // even a slight positive cloud bias would suggest.
  if(cloudPct!=null){
    if(cloudPct<=15)corr+=0.6;
    else if(cloudPct<=30)corr+=0.4;
    else if(cloudPct<=45)corr+=0.2;
  }
  // Pressure: strong high pressure (blocking) suppresses convective cooling
  // and vertical mixing, letting surface temps run hotter than modelled.
  if(pressure!=null){
    if(pressure>=1025)corr+=0.5;
    else if(pressure>=1020)corr+=0.3;
    else if(pressure>=1015)corr+=0.1;
  }
  // Humidity: lower relative humidity often indicates continental/dry air
  // advection typical of UK heatwave setups, which models can underplay.
  if(humidity!=null){
    if(humidity<=35)corr+=0.4;
    else if(humidity<=45)corr+=0.2;
  }
  // Lead time: forecast skill degrades further out, so scale the correction
  // up gradually for less-certain days (model tends to "round down" extremes
  // more aggressively the further out it forecasts).
  var leadMult=1;
  if(leadDays>=7)leadMult=1.5;
  else if(leadDays>=4)leadMult=1.25;
  else if(leadDays>=2)leadMult=1.1;
  corr=corr*leadMult;
  // Cap the correction — even in strong setups, don't run away with it.
  if(corr>2.5)corr=2.5;
  return Math.round(corr*10)/10;
}
function nightLowFromHourly(hrs,dayDateStr){
  // hrs.time is ISO strings, hrs.temps parallel array. We want hours 0-5 of
  // the given calendar day, which represent the tail of the overnight low
  // before that day's daytime heating begins.
  if(!hrs||!hrs.time||!hrs.temps)return null;
  var vals=[];
  for(var i=0;i<hrs.time.length;i++){
    var t=hrs.time[i];
    if(t.indexOf(dayDateStr)===0){
      var hh=parseInt(t.substring(11,13),10);
      if(hh>=0&&hh<=5)vals.push(hrs.temps[i]);
    }
  }
  if(vals.length===0)return null;
  return Math.min.apply(null,vals);
}

function condFromCode(code,temp,cloudPct,precipMm){
  var cloud=cloudPct!=null?cloudPct:50;
  var precip=precipMm!=null?precipMm:0;
  if(code>=95)return "⛈️";
  if(code>=71&&code<=77)return "❄️";
  if(code>=60&&code<=67){
    if(code>=60&&code<=61)return "💧";
    if(code>=62&&code<=65){
      if(cloud>=60)return precip>=3?"🌧️🌧️":"🌧️";
      return "🌦️";
    }
    if(code>=66&&code<=67)return "🌧️";
  }
  if(code>=51&&code<=57){
    if(code>=55)return "🌧️";
    return "💧";
  }
  if(code>=80&&code<=82){
    if(cloud>=60)return precip>=3?"🌧️🌧️":"🌧️";
    return "🌦️";
  }
  if(code>=83&&code<=86)return "❄️";
  if(code>=40&&code<=48)return "🌫️";
  if(code===0)return temp>=30?"🌡️":"☀️";
  if(code<=2)return "⛅";
  if(code<=3)return "☁️";
  return "☁️";
}

function getDayPeriods(d){
  var isRainy=d.rain>40;
  return {
    morning:{time:"06:00-12:00",temp:Math.round(d.low+(d.temp-d.low)*0.4),condition:d.condition,rain:isRainy?Math.round(d.rain*0.6):Math.max(0,d.rain-10),rainMm:parseFloat((d.rainMm*0.4).toFixed(1)),windMph:Math.round(d.windMph*0.9),note:isRainy?"Possible showers":"Generally dry"},
    afternoon:{time:"12:00-18:00",temp:d.temp,condition:d.condition,rain:d.rain,rainMm:d.rainMm,windMph:d.windMph,note:d.note},
    evening:{time:"18:00-00:00",temp:Math.round(d.temp*0.75+d.low*0.25),condition:d.condition,rain:isRainy?Math.round(d.rain*0.7):Math.max(0,d.rain-15),rainMm:parseFloat((d.rainMm*0.5).toFixed(1)),windMph:Math.round(d.windMph*1.1),note:"Cooling down"}};
}

function buildHourly(forecastData,hourlyRaw,dayIndex){
  if(hourlyRaw&&hourlyRaw.times&&hourlyRaw.times.length>0){
    var seen={},dates=[];
    hourlyRaw.times.forEach(function(t){var d=t.split("T")[0];if(!seen[d]){seen[d]=true;dates.push(d);}});
    var target=dates[dayIndex];
    if(!target)return [];
    var hrs=[];
    hourlyRaw.times.forEach(function(t,i){
      if(t.split("T")[0]!==target)return;
      var h=parseInt(t.split("T")[1].split(":")[0]);
      var temp=Math.round((hourlyRaw.temps[i]||0)*10)/10;
      var code=hourlyRaw.codes[i]||0;
      var cloud=Math.round(hourlyRaw.cloud[i]||0);
      var rainMmHr=parseFloat((hourlyRaw.rainMm[i]||0).toFixed(1));
      var cond=condFromCode(code,Math.round(temp),cloud,rainMmHr);
      if((h<6||h>=21)&&(cond.includes("☀")||cond.includes("🌡")))cond="🌙";
      var mph=hourlyRaw.windMph[i]||0;
      var gust=hourlyRaw.gusts[i]||Math.round(mph*1.3);
      var hum=Math.round(hourlyRaw.humidity[i]||55);
      var pres=Math.round(hourlyRaw.pressure[i]||1013);
      var uv=Math.round(hourlyRaw.uv[i]||0);
      var rainC=Math.round(hourlyRaw.rain[i]||0);
      var dewp=hourlyRaw.dewpoint?Math.round(hourlyRaw.dewpoint[i]):Math.round(temp-((100-hum)/5));
      var vis=hourlyRaw.vis&&hourlyRaw.vis[i]!==null?(hourlyRaw.vis[i]>=20000?"Excellent (20km+)":hourlyRaw.vis[i]>=10000?"Good (10-20km)":hourlyRaw.vis[i]>=5000?"Moderate (5-10km)":"Poor (<5km)"):"Good";
      var dirs=["N","NE","NE","E","SE","SE","S","SW","SW","W","NW","NW"];
      var windDir=dirs[Math.floor((dayIndex*4+h/6))%12];
      var fl=Math.round(temp+condBonus(cond,temp,false)+humBonus(hum)+windBonus(mph));
      hrs.push({hour:h,timeStr:(h<10?"0":"")+h+":00",temp:temp,feelsLike:fl,condition:cond,windMph:mph,gustMph:gust,windDir:windDir,humidity:hum,dewPoint:dewp,pressure:pres,rainChance:rainC,rainMm:rainMmHr,uv:uv,cloud:cloud,visibility:vis});
    });
    return hrs;
  }
  var d=forecastData[dayIndex];
  if(!d)return [];
  var hrs=[];
  for(var h=0;h<24;h++){
    var prog=Math.sin(((h-15)/24)*Math.PI*2+Math.PI*0.5);
    prog=Math.max(0,Math.min(1,(prog+1)/2));
    var temp=Math.round((d.low+(d.temp-d.low)*Math.pow(prog,1.4))*10)/10;
    var isN=h<6||h>=21;
    var wf=h>=11&&h<=18?1.15:isN?0.75:1.0;
    var mph=Math.round(d.windMph*wf);
    var gust=Math.round(d.gustMph*wf);
    var hum=Math.min(99,Math.max(10,Math.round(d.humidity+(isN?12:h>=12&&h<=16?-10:0))));
    var rainC=d.rain;
    var rainMm=0;
    if(d.rainHours>0){var rp=d.condition.includes("⛈")?(h>=14&&h<=18):(h>=8&&h<=14);if(rp)rainC=Math.min(99,d.rain+20);rainMm=parseFloat((d.rainMm*(rp?0.12:0.02)).toFixed(1));}
    var pres=Math.round(d.pressure+(d.temp>28&&h>=12&&h<=16?-1:0));
    var cond=d.condition;
    if(isN)cond=d.condition.includes("⛈")||d.condition.includes("🌧")||d.condition.includes("💧")?"🌧️":"🌙";
    var sp=h>=6&&h<=20?(1-Math.abs((h-13)/7)):0;
    var maxUv=d.uvMax!=null?d.uvMax:(d.temp>=40?12:d.temp>=35?10:d.temp>=30?9:d.temp>=25?7:d.temp>=20?5:4);
    var uv=cond.includes("☁")?Math.round(maxUv*0.3*sp):Math.round(maxUv*sp*sp);
    var cloud=cond.includes("☀")||cond.includes("🌡")?10:cond.includes("🌤")?30:cond.includes("⛅")?55:cond.includes("☁")?85:90;
    var vis=hum>80?"Poor (<5km)":hum>65?"Moderate (5-10km)":hum>45?"Good (10-20km)":"Excellent (20km+)";
    var dewp=Math.round(temp-((100-hum)/5));
    var dirs=["N","NE","NE","E","SE","SE","S","SW","SW","W","NW","NW"];
    var windDir=dirs[Math.floor((dayIndex*4+h/6))%12];
    var fl=Math.round(temp+condBonus(cond,temp,false)+humBonus(hum)+windBonus(mph));
    hrs.push({hour:h,timeStr:(h<10?"0":"")+h+":00",temp:temp,feelsLike:fl,condition:cond,windMph:mph,gustMph:gust,windDir:windDir,humidity:hum,dewPoint:dewp,pressure:pres,rainChance:Math.min(99,Math.round(rainC)),rainMm:rainMm,uv:uv,cloud:cloud,visibility:vis});
  }
  return hrs;
}

<script>
var VAPID_PUBLIC = "";
function buildAlertList(forecastData, prefs){
  var thresholds = prefs || {tempHeat:30, rain:60, wind:25, uv:8, storm:true};
  var alerts = [];
  if(!forecastData||!forecastData.length) return alerts;
  forecastData.slice(0,7).forEach(function(d){
    if(thresholds.tempHeat && d.temp >= thresholds.tempHeat)
      alerts.push({icon:"🔥", level:d.temp>=35?"danger":"warn", title:(d.temp>=35?"Extreme Heat":"Hot Day")+" — "+d.date, body:"High of "+d.temp+"°C. "+(d.temp>=35?"Avoid midday sun.":"Apply sunscreen.")});
    if(thresholds.rain && d.rain >= thresholds.rain && d.rainMm >= 5)
      alerts.push({icon:"🌧️", level:d.rain>=80&&d.rainMm>=10?"danger":"warn", title:(d.rain>=80?"Heavy Rain Warning":"Rain Likely")+" — "+d.date, body:d.rainMm+"mm, "+d.rain+"% chance."+(d.rain>=80?" Possible flooding.":"")});
    if(thresholds.wind && d.windMph >= thresholds.wind)
      alerts.push({icon:"💨", level:d.windMph>=40?"danger":"warn", title:(d.windMph>=40?"Gale Warning":"Strong Wind")+" — "+d.date, body:"Winds "+d.windMph+"mph, gusts "+d.gustMph+"mph."});
    if(thresholds.storm && d.humidity>=50 && d.temp>=28 && d.condition.includes("⛈"))
      alerts.push({icon:"⛈️", level:"danger", title:"Storm Risk — "+d.date, body:"Thunderstorm conditions: "+d.temp+"°C, "+d.humidity+"% humidity."});
    if(thresholds.uv && d.uvMax!=null && d.uvMax >= thresholds.uv)
      alerts.push({icon:"🕶️", level:"warn", title:"Very High UV — "+d.date, body:"UV index "+d.uvMax+". Sun protection essential."});
  });
  return alerts;
}

async function requestPushPermission(){
  if(!("Notification" in window)) return "unsupported";
  if(Notification.permission === "granted") return "granted";
  var result = await Notification.requestPermission();
  return result;
}

function fireBrowserNotification(title, body, icon){
  if(Notification.permission !== "granted") return;
  try{ new Notification(title, {body:body, icon:icon||"/favicon.ico"}); }catch(e){}
}

function wetBulb(T, Td, P){
  var rh = 100 * Math.exp((17.625*Td/(243.04+Td)) - (17.625*T/(243.04+T)));
  return T * Math.atan(0.151977 * Math.pow(rh+8.313659, 0.5))
    + Math.atan(T+rh) - Math.atan(rh-1.676331)
    + 0.00391838 * Math.pow(rh, 1.5) * Math.atan(0.023101*rh) - 4.686035;
}

function liftedIndex(T500, Td850, T850){
  var Tparcel = T850 - 9.8 * ((850-500)/100);
  return T500 - Tparcel;
}

function beaufortFromKnots(kt){
  for(var i=0;i<BEAUFORT_SCALE.length;i++){
    var b=BEAUFORT_SCALE[i];
    if(kt>=b.knots[0]&&kt<=b.knots[1])return b;
  }
  return BEAUFORT_SCALE[BEAUFORT_SCALE.length-1];
}

function marineGoNo(vessel,beaufort,waveH,sailType){
  var maxB=vessel.maxB+(sailType==="offshore"?1:sailType==="racing"?-1:0);
  var maxW=vessel.maxWave*(sailType==="offshore"?1.2:sailType==="racing"?0.8:1);
  if(beaufort.n>=maxB+2||waveH>maxW*1.5)return{status:"stop",color:"#ff2200",reason:"Conditions well beyond "+vessel.label+" limits — do not sail"};
  if(beaufort.n>=maxB+1||waveH>maxW)return{status:"stop",color:"#ff2200",reason:"Bf "+beaufort.n+" "+beaufort.label+" and "+waveH.toFixed(1)+"m waves exceed "+vessel.label+" limits"};
  if(beaufort.n>=maxB||waveH>maxW*0.75)return{status:"caution",color:"#ffcc00",reason:"Approaching limits — experienced crew only, monitor closely"};
  if(beaufort.n>=maxB-1)return{status:"caution",color:"#ffaa00",reason:"Bf "+beaufort.n+" "+beaufort.label+" — suitable for confident sailors"};
  return{status:"go",color:"#44cc66",reason:"Conditions within "+vessel.label+" safe operating range"};
}

function getTides(lat,lon,date){
  var d=new Date(date);
  var M2period=12.4206;
  var S2period=12.0;
  var phase=(lon/360)*24;
  var times=[];
  for(var h=0;h<25;h+=0.5){
    var M2=Math.cos(2*Math.PI*(h-phase)/M2period);
    var S2=Math.cos(2*Math.PI*(h-phase)/S2period)*0.3;
    var height=((M2+S2+1)/2).toFixed(2);
    times.push({hour:h,height:parseFloat(height)});
  }
  var extremes=[];
  for(var i=1;i<times.length-1;i++){
    var prev=times[i-1].height,curr=times[i].height,next=times[i+1].height;
    if(curr>prev&&curr>next) extremes.push({type:"High",hour:times[i].hour,height:curr});
    if(curr<prev&&curr<next) extremes.push({type:"Low", hour:times[i].hour,height:curr});
  }
  return extremes.slice(0,4);
}

function fmtHour(h){
  var hh=Math.floor(h);var mm=Math.round((h-hh)*60);
  return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0");
}

function calcGDD(tMax, tMin, base){
  var avg = (tMax + tMin) / 2;
  return Math.max(0, avg - base);
}

function calcET0(tMax, tMin, windMph, humidity, solarProxy){
  var tMean = (tMax + tMin) / 2;
  var windMs = windMph * 0.44704;
  var es = 0.6108 * Math.exp(17.27 * tMean / (tMean + 237.3));
  var ea = es * humidity / 100;
  var vpd = es - ea;
  var et0 = (0.0023 * solarProxy * (tMean + 17.8) * Math.sqrt(tMax - tMin)) + (0.00094 * windMs * vpd * 100);
  return Math.max(0, +et0.toFixed(1));
}

function blightRisk(days){
  var risk = 0;
  days.slice(0,3).forEach(function(d){
    if(d.temp >= 10 && d.temp <= 25 && d.humidity >= 75) risk++;
    if(d.temp >= 10 && d.temp <= 25 && d.humidity >= 90) risk += 2;
  });
  if(risk >= 4) return {level:"High", color:"#ff2200", desc:"Smith Period criteria met — blight likely"};
  if(risk >= 2) return {level:"Moderate", color:"#ff8800", desc:"Favourable conditions developing — monitor"};
  return {level:"Low", color:"#44cc66", desc:"Blight risk low — conditions unfavourable"};
}

function huttonRisk(days){
  var hits = 0;
  days.slice(0,2).forEach(function(d){
    if(d.low >= 10 && d.humidity >= 85) hits++;
  });
  if(hits >= 2) return {level:"Hutton Warning", color:"#ff2200", desc:"Two consecutive Hutton days — fungicide application advised"};
  if(hits >= 1) return {level:"Watch", color:"#ffaa00", desc:"One Hutton day — watch for second consecutive day"};
  return {level:"Clear", color:"#44cc66", desc:"Hutton criteria not met"};
}

function sprayWindow(d){
  if(d.rain >= 50 || d.rainMm >= 3)  return {status:"stop",   color:"#ff2200", reason:"Rain forecast — spray washoff risk"};
  if(d.windMph >= 15)                 return {status:"stop",   color:"#ff2200", reason:"Wind "+d.windMph+"mph — above 13mph spray limit (PPPR)"};
  if(d.temp <= 2)                     return {status:"stop",   color:"#ff2200", reason:"Temp "+d.temp.toFixed(1)+"°C — below minimum efficacy threshold"};
  if(d.temp >= 25 && d.humidity < 40) return {status:"delay",  color:"#ff8800", reason:"Hot & dry — rapid evaporation, leaf scorch risk"};
  if(d.windMph >= 10)                 return {status:"caution",color:"#ffcc00", reason:"Wind "+d.windMph+"mph — drift risk, use low-drift nozzles"};
  if(d.humidity >= 90)                return {status:"caution",color:"#ffcc00", reason:"High humidity "+d.humidity+"% — poor drying, disease spread risk"};
  if(d.temp < 6)                      return {status:"caution",color:"#ffcc00", reason:"Cool temp — reduced herbicide uptake"};
  return {status:"go", color:"#44cc66", reason:"Good spray window — conditions within PPPR guidelines"};
}

function fieldAccess(d){
  if(d.rainMm >= 15) return {status:"stop",    color:"#ff2200", reason:"Heavy rain "+d.rainMm+"mm — waterlogging and compaction risk"};
  if(d.rainMm >= 5)  return {status:"delay",   color:"#ff8800", reason:"Significant rain "+d.rainMm+"mm — soil likely saturated"};
  if(d.temp <= -2)   return {status:"caution", color:"#ffcc00", reason:"Frozen ground — check soil before trafficking"};
  if(d.rain >= 70)   return {status:"caution", color:"#ffcc00", reason:d.rain+"% rain probability — delay if possible"};
  return {status:"go", color:"#44cc66", reason:"Field conditions likely suitable for machinery"};
}

function harvestWindow(d){
  if(d.rainMm >= 2 || d.rain >= 60) return {status:"stop",    color:"#ff2200", reason:"Rain risk — harvesting not possible"};
  if(d.humidity >= 80)               return {status:"delay",   color:"#ff8800", reason:"Humidity "+d.humidity+"% — grain/crop drying conditions poor"};
  if(d.windMph >= 30)                return {status:"delay",   color:"#ff8800", reason:"Wind "+d.windMph+"mph — combine/picker operation unsafe"};
  if(d.humidity >= 70)               return {status:"caution", color:"#ffcc00", reason:"Moderate humidity — monitor grain moisture closely"};
  return {status:"go", color:"#44cc66", reason:"Good harvest window — dry conditions favourable"};
}

function irrigationNeed(et0, rainMm, temp){
  var deficit = Math.max(0, et0 - rainMm);
  if(deficit >= 4 || temp >= 28)  return {level:"High",     color:"#ff6600", mm:Math.ceil(deficit+2), desc:"Significant soil moisture deficit — irrigate"};
  if(deficit >= 2)                 return {level:"Moderate", color:"#ffaa00", mm:Math.ceil(deficit),   desc:"Moderate deficit developing — consider irrigating"};
  if(deficit >= 0.5)               return {level:"Low",      color:"#ffdd88", mm:1,                    desc:"Minor deficit — monitor soil moisture"};
  return {level:"None", color:"#44cc66", mm:0, desc:"Rainfall sufficient — no irrigation needed"};
}

function grazingSuitable(d){
  if(d.rainMm >= 10) return {status:"stop",    color:"#ff2200", reason:"Wet conditions — poaching risk, rest fields"};
  if(d.temp <= -3)   return {status:"stop",    color:"#ff2200", reason:"Frozen ground — livestock welfare risk"};
  if(d.windMph >= 35)return {status:"delay",   color:"#ff8800", reason:"Strong winds — animal welfare concern"};
  if(d.rainMm >= 4)  return {status:"caution", color:"#ffcc00", reason:"Wet — monitor ground conditions, rotate fields"};
  if(d.temp <= 0)    return {status:"caution", color:"#ffcc00", reason:"Near freezing — check water supply and shelter"};
  return {status:"go", color:"#44cc66", reason:"Suitable grazing conditions"};
}

function soilTemp(airTemp, low){
  return +((airTemp * 0.6 + low * 0.4) - 1.5).toFixed(1);
}

function drillingWindow(soilT, d){
  if(d.rainMm >= 8)  return {status:"stop",    color:"#ff2200", reason:"Too wet — soil structure damage risk"};
  if(soilT < 3)      return {status:"stop",    color:"#ff2200", reason:"Soil temp "+soilT+"°C — below germination threshold for most crops"};
  if(soilT < 5)      return {status:"delay",   color:"#ff8800", reason:"Soil temp "+soilT+"°C — marginal for autumn drilling, check soil type"};
  if(d.rainMm >= 4)  return {status:"delay",   color:"#ff8800", reason:"Wet conditions — wait for soil to dry"};
  if(soilT >= 5 && soilT < 7) return {status:"caution",color:"#ffcc00",reason:"Soil temp "+soilT+"°C — suitable but cool, use treated seed"};
  return {status:"go", color:"#44cc66", reason:"Soil temp "+soilT+"°C — good drilling conditions"};
}

// ── Scoring helpers ───────────────────────────────────────────────────────────

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Risk label + colour from 0-10 score
function illnessRiskMeta(score) {
  if (score >= 9) return { label: "Extreme",   color: "#ff0000", bg: "rgba(255,0,0,0.14)"   };
  if (score >= 7) return { label: "Very High",  color: "#ff4400", bg: "rgba(255,68,0,0.12)"  };
  if (score >= 5) return { label: "High",       color: "#ff8800", bg: "rgba(255,136,0,0.10)" };
  if (score >= 3) return { label: "Moderate",   color: "#ffcc00", bg: "rgba(255,204,0,0.09)" };
  if (score >= 1) return { label: "Low",        color: "#88cc44", bg: "rgba(136,204,68,0.08)" };
  return                  { label: "Very Low",  color: "#44cc88", bg: "rgba(68,204,136,0.06)" };
}

// Month helper (0 = Jan)
function monthOf(dateStr) {
  // dateStr is like "Mon 16 Jun" — extract month name
  var months = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
  var parts = dateStr.split(" ");
  for (var i = 0; i < parts.length; i++) {
    if (months[parts[i]] !== undefined) return months[parts[i]];
  }
  return new Date().getMonth();
}

// ── Individual scoring functions (return 0–10) ────────────────────────────────

function scoreCommonCold(d, month) {
  // High risk: cold/cool temps, high humidity, autumn/winter/spring
  var s = 0;
  var seasonal = (month <= 3 || month >= 9) ? 3 : (month <= 5 || month >= 7) ? 1 : 0;
  s += seasonal;
  if (d.temp < 5)       s += 3;
  else if (d.temp < 10) s += 2;
  else if (d.temp < 15) s += 1;
  if (d.humidity >= 75) s += 2;
  else if (d.humidity >= 60) s += 1;
  if (d.rainMm >= 3)    s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreFlu(d, month) {
  // Peak Nov–Mar, drops sharply in summer; cold, dry indoor air worsens spread
  var s = 0;
  var seasonal = (month >= 10 || month <= 2) ? 4 : (month === 3 || month === 9) ? 2 : 0;
  s += seasonal;
  if (d.temp < 2)       s += 3;
  else if (d.temp < 8)  s += 2;
  else if (d.temp < 14) s += 1;
  if (d.humidity < 40)  s += 2; // dry air = virus survives longer
  else if (d.humidity < 55) s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreGrassPollen(d, month) {
  // Peak May–Aug UK; warm, dry, sunny, low wind spreads pollen further
  var s = 0;
  var seasonal = (month >= 4 && month <= 7) ? 5 : (month === 3 || month === 8) ? 2 : 0;
  s += seasonal;
  if (d.temp >= 18 && d.temp <= 28) s += 2;
  else if (d.temp >= 14)            s += 1;
  if (d.rain < 20 && d.rainMm < 1) s += 2;
  else if (d.rain < 40)             s += 1;
  if (d.windMph >= 5 && d.windMph <= 20) s += 1; // light breeze disperses pollen
  if (d.humidity < 60)              s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreTreePollen(d, month) {
  // Feb–May (birch, oak, ash); warm dry spring days
  var s = 0;
  var seasonal = (month >= 1 && month <= 4) ? 5 : (month === 5) ? 2 : 0;
  s += seasonal;
  if (d.temp >= 10 && d.temp <= 22) s += 2;
  if (d.rain < 20 && d.rainMm < 1) s += 2;
  if (d.humidity < 65)              s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreRagweedPollen(d, month) {
  // Aug–Oct; warm dry late summer (more relevant US but present in southern UK)
  var s = 0;
  var seasonal = (month >= 7 && month <= 9) ? 5 : (month === 10) ? 1 : 0;
  s += seasonal;
  if (d.temp >= 15 && d.temp <= 28) s += 2;
  if (d.rain < 25 && d.rainMm < 1) s += 2;
  if (d.windMph >= 8)               s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreMold(d, month) {
  // Year-round but peaks Aug–Nov; wet, warm, humid conditions
  var s = 0;
  var seasonal = (month >= 7 && month <= 10) ? 2 : 0;
  s += seasonal;
  if (d.humidity >= 80) s += 3;
  else if (d.humidity >= 65) s += 2;
  else if (d.humidity >= 55) s += 1;
  if (d.rainMm >= 5)    s += 2;
  else if (d.rainMm >= 2) s += 1;
  if (d.temp >= 10 && d.temp <= 25) s += 1; // mold grows in moderate warmth
  return clamp(Math.round(s), 0, 10);
}

function scoreDustDander(d, month) {
  // Higher indoors when windows closed (winter); dry air worsens
  var s = 0;
  var seasonal = (month <= 2 || month >= 10) ? 2 : 1;
  s += seasonal;
  if (d.humidity < 40)  s += 3; // very dry = dust airborne
  else if (d.humidity < 55) s += 2;
  else if (d.humidity < 65) s += 1;
  if (d.windMph <= 5)   s += 2; // still air = dust settles indoors
  if (d.temp < 8)       s += 1; // windows shut
  return clamp(Math.round(s), 0, 10);
}

function scoreAsthma(d, month) {
  // Triggered by: cold air, high pollen, pollution, humidity extremes, thunderstorms
  var s = 0;
  var grassP  = scoreGrassPollen(d, month);
  var moldP   = scoreMold(d, month);
  s += Math.round(grassP * 0.3 + moldP * 0.2);
  if (d.temp < 5)        s += 2;
  else if (d.temp < 10)  s += 1;
  if (d.humidity >= 85 || d.humidity < 35) s += 2;
  else if (d.humidity >= 70)               s += 1;
  if (d.condition && d.condition.includes("⛈")) s += 2; // thunderstorm asthma
  if (d.windMph >= 25)   s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreCOPD(d, month) {
  // Cold, damp, windy days; high pollution (proxied by pressure/inversion)
  var s = 0;
  if (d.temp < 2)        s += 3;
  else if (d.temp < 8)   s += 2;
  else if (d.temp < 14)  s += 1;
  if (d.windMph >= 20)   s += 2; // cold wind = extra strain
  if (d.humidity >= 80)  s += 2;
  else if (d.humidity >= 70) s += 1;
  if (d.pressure <= 1000) s += 1; // low pressure = less O2 available
  var seasonal = (month <= 2 || month >= 10) ? 1 : 0;
  s += seasonal;
  return clamp(Math.round(s), 0, 10);
}

function scoreMigraine(d) {
  // Triggers: pressure change, bright sun, heat, strong wind, humidity spikes
  var s = 2; // base
  if (d.condition && (d.condition.includes("☀") || d.condition.includes("🌡"))) s += 2;
  if (d.temp >= 28)      s += 2;
  else if (d.temp >= 24) s += 1;
  if (d.windMph >= 20)   s += 1;
  if (d.humidity >= 75 && d.temp >= 20) s += 1;
  if (d.pressure < 1000) s += 2; // low pressure = vasodilation
  else if (d.pressure < 1008) s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreArthritis(d) {
  // Cold, damp, low pressure all worsen joint pain
  var s = 0;
  if (d.temp < 5)        s += 3;
  else if (d.temp < 10)  s += 2;
  else if (d.temp < 15)  s += 1;
  if (d.humidity >= 80)  s += 2;
  else if (d.humidity >= 65) s += 1;
  if (d.pressure < 1000) s += 3;
  else if (d.pressure < 1010) s += 2;
  else if (d.pressure < 1015) s += 1;
  if (d.rainMm >= 3)     s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreSinus(d, month) {
  // Dry air, pollen season, cold/flu season, sudden temp swings
  var s = 0;
  if (d.humidity < 40)   s += 3;
  else if (d.humidity < 55) s += 2;
  else if (d.humidity >= 80) s += 1; // very humid also irritates
  s += Math.round(scoreGrassPollen(d, month) * 0.25);
  s += Math.round(scoreMold(d, month) * 0.2);
  if (d.temp < 5 || d.temp > 28) s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreMosquito(d, month) {
  // Active Apr–Oct; peak at dusk, warm humid still evenings, standing water after rain
  var s = 0;
  var seasonal = (month >= 3 && month <= 9) ? 3 : 0;
  s += seasonal;
  if (d.temp >= 20)      s += 3;
  else if (d.temp >= 15) s += 1;
  if (d.humidity >= 70)  s += 2;
  if (d.windMph <= 8)    s += 2; // still air = more activity
  if (d.rainMm >= 5)     s += 1; // standing water = breeding
  return clamp(Math.round(s), 0, 10);
}

function scoreOutdoorPest(d, month) {
  // Wasps, midges, flies — warm, humid summers
  var s = 0;
  var seasonal = (month >= 5 && month <= 8) ? 3 : (month === 4 || month === 9) ? 1 : 0;
  s += seasonal;
  if (d.temp >= 18)      s += 2;
  else if (d.temp >= 12) s += 1;
  if (d.humidity >= 65)  s += 1;
  if (d.windMph <= 10)   s += 2; // still air = more activity
  return clamp(Math.round(s), 0, 10);
}

function scoreIndoorPest(d, month) {
  // Mice/rats move indoors autumn/winter; cockroaches warm humid kitchens
  var s = 0;
  var seasonal = (month >= 9 || month <= 2) ? 3 : 0; // autumn/winter
  s += seasonal;
  if (d.temp < 10)       s += 2; // cold drives pests inside
  if (d.humidity >= 70)  s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreThirst(d) {
  // Hot, dry, windy days increase dehydration risk
  var s = 0;
  if (d.temp >= 32)      s += 4;
  else if (d.temp >= 28) s += 3;
  else if (d.temp >= 24) s += 2;
  else if (d.temp >= 20) s += 1;
  if (d.humidity < 40)   s += 3;
  else if (d.humidity < 55) s += 2;
  else if (d.humidity < 65) s += 1;
  if (d.windMph >= 20)   s += 1;
  return clamp(Math.round(s), 0, 10);
}

function scoreDrySkin(d, month) {
  // Low humidity, cold, windy, winter heating
  var s = 0;
  if (d.humidity < 35)   s += 4;
  else if (d.humidity < 50) s += 3;
  else if (d.humidity < 60) s += 2;
  else if (d.humidity < 70) s += 1;
  if (d.temp < 5)        s += 2;
  else if (d.temp < 12)  s += 1;
  if (d.windMph >= 20)   s += 1;
  var seasonal = (month <= 2 || month >= 10) ? 1 : 0;
  s += seasonal;
  return clamp(Math.round(s), 0, 10);
}

    { id: "mold",      icon: "🍄", label: "Mould Spores",    category: "pollen",   score: scoreMold(d, m),         tip: "High after rain. Use HEPA filters indoors. Avoid leaf litter." },

    { id: "asthma",    icon: "🫁", label: "Asthma",          category: "respiratory", score: scoreAsthma(d, m),   tip: "Carry reliever inhaler. Avoid known triggers. Monitor peak flow." },

    { id: "migraine",  icon: "🧠", label: "Migraine",        category: "pain",     score: scoreMigraine(d),        tip: "Wear sunglasses. Stay hydrated. Monitor barometric pressure changes." },
    { id: "arthritis", icon: "🦴", label: "Arthritis Pain",  category: "pain",     score: scoreArthritis(d),       tip: "Keep warm and mobile. Cold damp days increase joint inflammation." },

    { id: "outdoorpest",icon:"🐝", label: "Outdoor Pests",   category: "pest",     score: scoreOutdoorPest(d, m),  tip: "Check for wasp nests. Avoid eating outdoors when risk is high." },
    { id: "indoorpest",icon: "🐭", label: "Indoor Pests",    category: "pest",     score: scoreIndoorPest(d, m),   tip: "Seal gaps in walls and floors. Store food in sealed containers." },
    { id: "thirst",    icon: "💧", label: "Dehydration Risk",category: "wellbeing",score: scoreThirst(d),           tip: "Drink water before you feel thirsty. 2–3L per day in hot weather." },
    { id: "dryskin",   icon: "🧴", label: "Dry Skin Risk",   category: "wellbeing",score: scoreDrySkin(d, m),      tip: "Use SPF moisturiser. Avoid very hot showers. Apply emollient daily." },
  ];
}

  { id: "all",         label: "All",           icon: "📋" },

  );
}

  return React.createElement('div', {

function nowcastIntensity(mm){

  if(mm<4)return {label:"Moderate",color:"#ffcc44"};
  if(mm<10)return {label:"Heavy",color:"#ff9933"};
  return {label:"Torrential",color:"#ff4444"};
}

var TRAIL_TYPES = [
  {id:"lowland",  icon:"🌿", label:"Lowland / Easy",   maxWindMph:40, desc:"Paths, parks, gentle terrain"},
  {id:"hill",     icon:"⛰️", label:"Hill Walking",      maxWindMph:35, desc:"Moderate elevation, exposed ridges"},
  {id:"mountain", icon:"🏔️", label:"Mountain / Fell",   maxWindMph:28, desc:"High ground, technical terrain"},
  {id:"camping",  icon:"⛺", label:"Wild Camping",       maxWindMph:35, desc:"Overnight backcountry camping"},
];

// Feels-like at altitude using standard lapse rate (~0.65°C per 100m)
function altTemp(airTemp, altM) {
  return +(airTemp - (altM / 100) * 0.65).toFixed(1);
}

// Wind at altitude increases roughly with height (simple estimate)
function altWind(windMph, altM) {
  return Math.round(windMph * (1 + altM / 5000));
}

// Lightning risk window
function lightningRiskHike(d) {
  var risk = d.condition.includes("⛈") || (d.temp >= 22 && d.humidity >= 65 && d.rain >= 50);
  var moderate = d.temp >= 18 && d.humidity >= 60 && d.rain >= 35;
  if (risk)     return {level:"High",     color:"#ff2200", desc:"Thunderstorm conditions — avoid summits, ridges, lone trees"};
  if (moderate) return {level:"Moderate", color:"#ff8800", desc:"Convective conditions developing — watch sky, have escape route"};
  return              {level:"Low",       color:"#44cc66", desc:"No significant lightning risk"};
}

// Exposure / hypothermia risk from wind chill + wet
function hypothermiaRisk(tempC, windMph, rainMm) {
  var wc = tempC <= 10 ? tempC - (windMph * 0.08) : tempC;
  var wetFactor = rainMm >= 5 ? -4 : rainMm >= 1 ? -2 : 0;
  var effective = wc + wetFactor;
  if (effective <= -10) return {level:"Severe",   color:"#ff0000", desc:"Severe hypothermia risk — waterproofs and insulation essential, consider postponing"};
  if (effective <= -2)  return {level:"High",     color:"#ff4400", desc:"High risk — full waterproofs, windproof layers, hat and gloves required"};
  if (effective <= 5)   return {level:"Moderate", color:"#ff8800", desc:"Cool and exposed — layers needed, avoid cotton"};
  if (effective <= 10)  return {level:"Low",      color:"#ffcc00", desc:"Cool — light layers and wind-shell recommended"};
  return                       {level:"Minimal",  color:"#44cc66", desc:"Comfortable walking temperature"};
}

// Trail surface condition
function trailCondition(rainMm, rain3day, tempC, low) {
  var total = rainMm + (rain3day || 0);
  var frost  = low <= 0;
  if (frost && tempC <= 0) return {status:"Icy",      color:"#88ccff", icon:"🧊", desc:"Ice likely on path surfaces — crampons/traction aids essential"};
  if (total >= 20)         return {status:"Boggy",    color:"#ff4400", icon:"💦", desc:"Waterlogged — very muddy, stream crossings may be dangerous"};
  if (total >= 10)         return {status:"Muddy",    color:"#ff8800", icon:"🌧️",desc:"Significant mud — waterproof boots essential"};
  if (total >= 4)          return {status:"Wet",      color:"#ffcc00", icon:"💧", desc:"Wet trails — good grip footwear recommended"};
  if (frost && tempC > 0)  return {status:"Soft",     color:"#ffdd88", icon:"🌤️",desc:"Ground soft from overnight frost — may be slippery on slopes"};
  return                          {status:"Good",     color:"#44cc66", icon:"✅", desc:"Dry, firm trail surface — good walking conditions"};
}

// Visibility / navigation risk
function navVisibility(d) {
  if (d.condition.includes("🌫") || d.humidity >= 96)
    return {level:"Mist/Fog", color:"#ff4400", desc:"Navigation by compass/GPS essential — do not rely on landmarks"};
  if (d.rain >= 60 && d.windMph >= 20)
    return {level:"Poor",     color:"#ff8800", desc:"Reduced visibility in rain and wind — map and compass required"};
  if (d.humidity >= 85 || d.rain >= 40)
    return {level:"Moderate", color:"#ffcc00", desc:"Low cloud likely on high ground — stay on marked paths"};
  return   {level:"Good",     color:"#44cc66", desc:"Good visibility — clear walking conditions"};
}

// Sunrise / sunset (simple approximation)
function sunTimes(lat, dayOfYear) {
  try {
    var safeLat = Math.min(Math.max(lat || 51.5, -65), 65);
    var P = Math.asin(0.39795 * Math.cos(0.2163108 + 2 * Math.atan(0.9671396 * Math.tan(0.00860 * (dayOfYear - 186)))));
    var cosArg = (Math.sin(0.8333 * Math.PI / 180) + Math.sin(safeLat * Math.PI / 180) * Math.sin(P)) / (Math.cos(safeLat * Math.PI / 180) * Math.cos(P));
    cosArg = Math.min(Math.max(cosArg, -1), 1); // clamp to valid acos domain
    var D = 24 - (24 / Math.PI) * Math.acos(cosArg);
    if (isNaN(D) || !isFinite(D)) D = 12;
    var rise = 12 - D / 2;
    var set  = 12 + D / 2;
    function fmt(h) { var hh = Math.floor(h), mm = Math.round((h - hh) * 60); if (mm >= 60){hh++;mm=0;} return String(Math.max(0,hh)%24).padStart(2,"0")+":"+String(mm).padStart(2,"0"); }
    return { rise: fmt(rise), set: fmt(set), daylight: Math.max(0,D).toFixed(1) };
  } catch(e) {
    return { rise: "06:00", set: "20:00", daylight: "14.0" };
  }
}

// Overall hiking go/no-go for a trail type
function hikingGoNo(trailType, d, altM) {
  var sp = TRAIL_TYPES.find(function(t){return t.id===trailType;})||TRAIL_TYPES[0];
  var windAtAlt = altWind(d.windMph, altM);
  var gustAtAlt = altWind(d.gustMph, altM);
  var tempAtAlt = altTemp(d.temp, altM);
  var lr = lightningRiskHike(d);
  if (lr.level === "High")
    return {status:"stop",   color:"#ff2200", reason:"Lightning risk — avoid exposed ridges and summits"};
  if (gustAtAlt >= sp.maxWindMph + 10)
    return {status:"stop",   color:"#ff2200", reason:"Gusts "+gustAtAlt+"mph at altitude — dangerous on exposed ground"};
  if (windAtAlt >= sp.maxWindMph)
    return {status:"stop",   color:"#ff2200", reason:"Wind "+windAtAlt+"mph at altitude — exceeds safe limit for "+sp.label};
  if (gustAtAlt >= sp.maxWindMph)
    return {status:"delay",  color:"#ff8800", reason:"Gusts approaching limit — avoid ridges, plan sheltered route"};
  if (d.condition.includes("🌫") && (trailType==="mountain"||trailType==="hill"))
    return {status:"delay",  color:"#ff8800", reason:"Fog on high ground — navigation by map and compass only"};
  if (tempAtAlt <= -5)
    return {status:"delay",  color:"#ff8800", reason:"Temperature "+tempAtAlt+"°C at altitude — full winter kit required"};
  if (d.rainMm >= 10)
    return {status:"caution",color:"#ffcc00", reason:"Heavy rain — waterproofs essential, check stream levels"};
  if (windAtAlt >= sp.maxWindMph * 0.75)
    return {status:"caution",color:"#ffcc00", reason:"Strong wind at altitude — head cover, windproof layers required"};
  if (lr.level === "Moderate")
    return {status:"caution",color:"#ffcc00", reason:"Convective risk — watch for building cloud, have escape route"};
  return   {status:"go",     color:"#44cc66", reason:"Conditions suitable for "+sp.label};
}

// Drinking water need estimate (ml/hr) based on temp and exertion
function hydrationNeed(tempC, windMph) {
  var base = 500;
  if (tempC >= 25) base += 250;
  else if (tempC >= 18) base += 100;
  if (windMph >= 20) base -= 50; // less sweat in wind
  return base;
}

// Pack weight recommendation note
function packNote(d, trailType, nights) {
  var notes = [];
  if (d.rainMm >= 2 || d.rain >= 40)  notes.push("Pack cover + waterproofs");
  if (d.temp <= 5 || d.low <= 2)       notes.push("Extra insulation layer");
  if (d.uvMax >= 6)                     notes.push("Sun hat + SPF50");
  if (trailType === "camping")          notes.push("Insulated sleeping mat");
  if (nights > 0)                       notes.push("Headtorch + spare batteries");
  if (d.windMph >= 20)                  notes.push("Windproof outer shell");
  return notes;
}

// Density altitude calculation (ICAO standard atmosphere)
function densityAlt(tempC, pressureMb, altM) {
  var stdTemp  = 15 - (altM * 0.0065);   // ISA temp at altitude
  var pressAlt = (1013.25 - pressureMb) * 30 + altM * 3.28084; // pressure alt in ft
  var da       = pressAlt + 120 * (tempC - stdTemp);
  return Math.round(da);
}

// Crosswind component
function crosswindComponent(windMph, windDir, runwayHdg) {
  var angle = Math.abs(windDir - runwayHdg);
  if (angle > 180) angle = 360 - angle;
  var cross = Math.abs(Math.round(windMph * Math.sin(angle * Math.PI / 180)));
  var head  = Math.round(windMph * Math.cos(angle * Math.PI / 180));
  return { cross: cross, head: head, angle: Math.round(angle) };
}

// Dewpoint depression and icing risk
function icingRisk(tempC, dewpointC) {
  var depression = tempC - dewpointC;
  if (tempC >= -20 && tempC <= 0 && depression <= 3)
    return {level:"Severe",   color:"#ff0000", desc:"Severe icing — avoid flight in cloud/precipitation"};
  if (tempC >= -20 && tempC <= 2 && depression <= 6)
    return {level:"Moderate", color:"#ff6600", desc:"Moderate icing risk — carb heat, de-ice systems required"};
  if (tempC <= 5 && depression <= 10)
    return {level:"Light",    color:"#ffcc00", desc:"Light icing possible — monitor closely in cloud"};
  return {level:"Nil",      color:"#44cc66", desc:"Icing risk low"};
}

// Carburetor icing risk (temp 10–25°C, humidity >70%)
function carbIcingRisk(tempC, humidity) {
  if (tempC >= 0 && tempC <= 25 && humidity >= 80)
    return {level:"High",     color:"#ff6600", desc:"High carb ice risk — use carb heat continuously"};
  if (tempC >= 0 && tempC <= 30 && humidity >= 60)
    return {level:"Moderate", color:"#ffcc00", desc:"Moderate carb ice risk — check carb heat regularly"};
  return {level:"Low",      color:"#44cc66", desc:"Carb icing unlikely"};
}

// Turbulence estimate from wind shear and surface heating
function turbulenceLevel(windMph, gustMph, tempC, humidity, cloudCover) {
  var gustFactor = gustMph - windMph;
  var thermalActivity = tempC >= 20 && humidity < 60 && cloudCover < 50;
  var shear = gustFactor >= 15 || windMph >= 30;
  if (gustFactor >= 20 || windMph >= 40)
    return {level:"Severe",   color:"#ff0000", desc:"Severe turbulence — avoid flight if possible"};
  if (shear || thermalActivity)
    return {level:"Moderate", color:"#ff8800", desc:"Moderate turbulence — tighten harness, reduce speed"};
  if (gustFactor >= 8 || (tempC >= 15 && humidity < 65))
    return {level:"Light",    color:"#ffcc00", desc:"Light turbulence — bumpy but manageable"};
  return {level:"Nil/Smooth",color:"#44cc66", desc:"Smooth air expected"};
}

// Visibility category (ICAO)
function visCat(humidity, rain, condition) {
  if (condition.includes("🌫") || humidity >= 97)
    return {cat:"CAT III / Fog",  nm:"<200m RVR",  color:"#ff0000", vfr:false, desc:"Fog — instrument approach only, VFR flight prohibited"};
  if (rain >= 70 && humidity >= 92)
    return {cat:"CAT II",        nm:"<800m",       color:"#ff4400", vfr:false, desc:"Very poor — IFR only, VFR not possible"};
  if (rain >= 50 || humidity >= 88)
    return {cat:"CAT I",         nm:"<5000m",      color:"#ff8800", vfr:false, desc:"Poor — marginal VFR, IFR preferred"};
  if (rain >= 30 || humidity >= 80)
    return {cat:"MVFR",          nm:"5–8km",       color:"#ffcc00", vfr:true,  desc:"Marginal VFR — caution required, maintain cloud clearance"};
  return    {cat:"VMC",          nm:">10km",       color:"#44cc66", vfr:true,  desc:"Good visibility — VFR conditions"};
}

// Cloud base estimate from dewpoint depression
function cloudBaseEst(tempC, dewpointC) {
  var depression = tempC - dewpointC;
  var ftAGL = Math.round(depression * 400); // ~400ft per °C depression
  if (ftAGL < 0) ftAGL = 0;
  return ftAGL;
}

// VFR minima check (UK CAA ANO — Class G, day VMC)
function vfrMinima(visCatObj, cloudBaseFt, windMph, gustMph) {
  if (!visCatObj.vfr)
    return {status:"stop",   color:"#ff0000", reason:"Visibility below VFR minima — IFR only or no flight"};
  if (cloudBaseFt < 500)
    return {status:"stop",   color:"#ff0000", reason:"Cloud base "+cloudBaseFt+"ft — below Class G VFR minima (500ft)"};
  if (windMph >= 40 || gustMph >= 50)
    return {status:"stop",   color:"#ff0000", reason:"Wind "+windMph+"mph / gusts "+gustMph+"mph — exceeds most light aircraft limits"};
  if (cloudBaseFt < 1000)
    return {status:"delay",  color:"#ff8800", reason:"Cloud base "+cloudBaseFt+"ft — very low, restricted manoeuvring"};
  if (visCatObj.cat === "MVFR")
    return {status:"caution",color:"#ffcc00", reason:"Marginal VMC — maintain 1000ft/1500m cloud clearance"};
  if (windMph >= 25)
    return {status:"caution",color:"#ffcc00", reason:"Strong crosswind potential — check runway alignment"};
  return {status:"go",     color:"#44cc66", reason:"VFR conditions — standard cloud clearances apply"};
}

// Drone-specific rules (UK CAE/CAA)
function droneGoNo(windMph, gustMph, visibility, rain, tempC) {
  if (gustMph >= 28)
    return {status:"stop",   color:"#ff0000", reason:"Gusts "+gustMph+"mph — above typical sUAS limit (~24mph)"};
  if (windMph >= 24)
    return {status:"stop",   color:"#ff0000", reason:"Wind "+windMph+"mph — exceeds most drone wind limits"};
  if (rain >= 50 || visibility === "CAT III / Fog" || visibility === "CAT II")
    return {status:"stop",   color:"#ff0000", reason:"Precipitation or fog — do not fly unless IP67+ rated"};
  if (gustMph >= 20)
    return {status:"delay",  color:"#ff8800", reason:"Gusts "+gustMph+"mph — marginal, check manufacturer limit"};
  if (windMph >= 18)
    return {status:"caution",color:"#ffcc00", reason:"Moderate wind — battery drain elevated, monitor RTH"};
  if (tempC <= 0)
    return {status:"caution",color:"#ffcc00", reason:"Near-freezing — battery performance reduced significantly"};
  return {status:"go",     color:"#44cc66", reason:"Conditions within typical drone operating envelope"};
}

// QNH / QFE / QNE explanation
function altimeterSetting(pressureMb) {
  return {
    qnh: Math.round(pressureMb),
    qfe: Math.round(pressureMb - 3), // approx for airfield ~100ft amsl
    qne: 1013,
    note: pressureMb >= 1020 ? "High pressure — altimeter will read lower than actual" :
          pressureMb <= 1000 ? "Low pressure — altimeter will read higher than actual" :
          "Near-standard pressure"
  };
}

// METAR-style summary (not real METAR but formatted similarly)
function metarSummary(d, cloudBaseFt, visObj) {
  var wdir = d.windDir || "VRB";
  var wspd = Math.round(d.windMph * 0.868976); // to knots
  var gust = Math.round(d.gustMph * 0.868976);
  var gustStr = (gust - wspd) >= 3 ? "G"+String(gust).padStart(2,"0") : "";
  var windStr = (typeof wdir === "number" ? String(Math.round(wdir/10)*10).padStart(3,"0") : wdir)+String(wspd).padStart(2,"0")+gustStr+"KT";
  var visStr  = visObj.nm;
  var cloud   = cloudBaseFt < 500 ? "OVC"+String(Math.round(cloudBaseFt/100)).padStart(3,"0") :
                cloudBaseFt < 1500 ? "BKN"+String(Math.round(cloudBaseFt/100)).padStart(3,"0") :
                cloudBaseFt < 3000 ? "SCT"+String(Math.round(cloudBaseFt/100)).padStart(3,"0") : "FEW030";
  var tempStr = Math.round(d.temp)+"/"+(Math.round(d.temp - ((100-d.humidity)/5)));
  var qnh     = "Q"+Math.round(d.pressure);
  return windStr+" "+visStr+" "+cloud+" "+tempStr+" "+qnh;
}
