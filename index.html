<body>
<div id="root"></div>
<script type="text/babel">
var useState   = React.useState;
var useEffect  = React.useEffect;
var useRef     = React.useRef;

// Firebase handles — declared here so Babel script can access them
var fbAuth = firebase.auth();
var fbDb   = firebase.firestore();
var googleProvider = new firebase.auth.GoogleAuthProvider();

// ── Nav items ────────────────────────────────────────────────────────────────
var NAV_ITEMS = [
  {id:"overview", label:"Weather Overview", icon:"🌍"},
  {id:"ten",      label:"10-Day Forecast",  icon:"📅"},
  {id:"hourly",   label:"Hourly Forecast",  icon:"🕐"},
  {id:"graphs",   label:"Weather Graphs",   icon:"📈"},
  {id:"radar",    label:"Map and Radar",    icon:"🗺️"},
  {id:"extremes", label:"Weather Extremes", icon:"🌡️"},
];

// ── Unit helpers ─────────────────────────────────────────────────────────────
function cvtTemp(c,u){return u==="F"?Math.round(c*9/5+32):c;}
function fmtTemp(c,u){return cvtTemp(c,u)+"°"+u;}
function cvtSpd(m,u){return u==="kmh"?Math.round(m*1.60934):m;}
function fmtSpd(m,u){return cvtSpd(m,u)+(u==="kmh"?" km/h":" mph");}
function cvtRain(mm,u){return u==="in"?(mm*0.0393701).toFixed(2):mm.toFixed(1);}
function fmtRain(mm,u){if(mm===0)return "0"+(u==="in"?'"':"mm");return cvtRain(mm,u)+(u==="in"?'"':"mm");}
function cvtPres(mb,u){if(u==="pa")return Math.round(mb*100);if(u==="bar")return (mb/1000).toFixed(4);if(u==="ba")return Math.round(mb*1000);return mb;}
function fmtPres(mb,u){var v=cvtPres(mb,u);if(u==="pa")return v+" Pa";if(u==="bar")return v+" bar";if(u==="ba")return v+" ba";return v+" mbar";}

// ── Colour helpers ───────────────────────────────────────────────────────────
function tc(t){return t>=36?"#ff1500":t>=33?"#ff3d00":t>=30?"#ff6600":t>=27?"#ff8800":t>=24?"#ffaa00":t>=21?"#ffcc00":t>=18?"#c8d400":t>=15?"#7bbf44":"#4a9fd4";}
function rc(r){return r>=70?"#4488ff":r>=40?"#66aaff":r>=20?"#88ccff":"#aaddff";}
function hc(h){return h>=80?"#7755cc":h>=60?"#9977dd":h>=40?"#bbaaee":"#ddccff";}
function wc(w){return w>=30?"#ff7722":w>=20?"#ffaa44":w>=10?"#ffcc88":"#fff0cc";}
function pc(p){return p>=1030?"#ff6600":p>=1020?"#ffaa00":p>=1010?"#88ddff":p>=1000?"#6699cc":"#9955cc";}
function bgc(t){return t>=33?"rgba(255,45,0,0.18)":t>=30?"rgba(255,100,0,0.14)":t>=27?"rgba(255,140,0,0.11)":t>=24?"rgba(255,170,0,0.09)":t>=21?"rgba(255,200,0,0.08)":t>=18?"rgba(180,210,0,0.08)":"rgba(74,159,212,0.06)";}

// FIX 4: Corrected UV classification - 0-2 Low, 3-5 Moderate, 6-7 High, 8-10 Very High, 11+ Extreme
function uvCol(uv){return uv>=11?"#ff1500":uv>=8?"#ff6600":uv>=6?"#ffaa00":uv>=3?"#ffcc00":uv>0?"#7bbf44":"#555";}
function uvLbl(uv){return uv>=11?"Extreme":uv>=8?"Very High":uv>=6?"High":uv>=3?"Moderate":uv>0?"Low":"None";}
function uvProtect(uv){return uv>=11?"Extreme — avoid all sun exposure":uv>=8?"Very High — protection essential":uv>=6?"High — protection essential":uv>=3?"Moderate — apply sunscreen":uv>0?"Low risk":"No UV";}

// ── Wind ─────────────────────────────────────────────────────────────────────
function windCat(mph){
  if(mph<5)return "Very Light";if(mph<10)return "Light Breeze";if(mph<15)return "Moderate Breeze";
  if(mph<20)return "Fresh Breeze";if(mph<30)return "Strong Breeze";if(mph<40)return "Gale";
  if(mph<50)return "Strong Gale";if(mph<60)return "Violent Gale";if(mph<73)return "Very Violent Gale";
  return "Hurricane";
}

// ── Feel-like ────────────────────────────────────────────────────────────────
function condBonus(cond,temp,shade){
  var isRain=cond.includes("🌧")||cond.includes("🌧🌧")||cond.includes("⛈")||cond.includes("🌦")||cond.includes("💧");
  var eff=shade?(isRain?cond:"☁️"):cond;
  if(eff.includes("⛈"))return -5;if(eff.includes("🌧🌧"))return -5;if(eff.includes("🌧"))return -4;
  if(eff.includes("🌦"))return -4;if(eff.includes("💧"))return -3;
  if(eff.includes("☁"))return -2;if(eff.includes("⛅"))return 0;if(eff.includes("🌤"))return 1;
  if(eff.includes("🌡"))return temp>40?8:temp>35?7:temp>30?6:temp>25?5:4;
  if(eff.includes("☀"))return temp>40?8:temp>35?7:temp>30?6:temp>25?5:temp>20?4:3;
  return 0;
}
function humBonus(h){if(h<=10)return -2;if(h<=20)return -1;if(h<=30)return 0;if(h<=40)return 1;if(h<=50)return 2;if(h<=60)return 3;if(h<=70)return 4;if(h<=80)return 6;if(h<=90)return 8;return 10;}
function windBonus(m){if(m<5)return 1;if(m<10)return 0;if(m<15)return -1;if(m<20)return -3;if(m<30)return -5;if(m<40)return -6;if(m<50)return -8;if(m<60)return -13;return -30;}
function sunFeel(t,m,h,c){return Math.round(t+condBonus(c,t,false)+humBonus(h)+windBonus(m));}
function shadeFeel(t,m,h,c){return Math.round(t+condBonus(c,t,true)+humBonus(h)+windBonus(m));}
function hasSun(c){return c.includes("☀")||c.includes("🌡")||c.includes("🌤")||c.includes("⛅");}

// FIX 3: Improved condition from WMO code using cloud cover and rain intensity
// condFromCode now accepts cloudCover and precipitation amount for better icons
function condFromCode(code,temp,cloudPct,precipMm){
  var cloud=cloudPct!=null?cloudPct:50;
  var precip=precipMm!=null?precipMm:0;
  // Thunderstorm codes
  if(code>=95)return "⛈️";
  // Heavy snow
  if(code>=71&&code<=77)return "❄️";
  // Rain/drizzle codes
  if(code>=60&&code<=67){
    // Drizzle (60-67 with low amounts or drizzle codes 51-57)
    if(code>=60&&code<=61)return "💧";
    if(code>=62&&code<=65){
      // moderate/heavy rain - check cloud cover
      if(cloud>=60)return precip>=3?"🌧️🌧️":"🌧️";
      return "🌦️";
    }
    if(code>=66&&code<=67)return "🌧️"; // freezing rain
  }
  if(code>=51&&code<=57){
    if(code>=55)return "🌧️";
    return "💧";
  }
  // Showers (80-86)
  if(code>=80&&code<=82){
    if(cloud>=60)return precip>=3?"🌧️🌧️":"🌧️";
    return "🌦️";
  }
  if(code>=83&&code<=86)return "❄️";
  // Fog
  if(code>=40&&code<=48)return "🌫️";
  // Clear/cloudy
  if(code===0)return temp>=30?"🌡️":"☀️";
  if(code<=2)return "⛅";
  if(code<=3)return "☁️";
  return "☁️";
}

// ── Period breakdown ─────────────────────────────────────────────────────────
function getDayPeriods(d){
  var isRainy=d.rain>40;
  return {
    morning:{time:"06:00-12:00",temp:Math.round(d.low+(d.temp-d.low)*0.4),condition:d.condition,rain:isRainy?Math.round(d.rain*0.6):Math.max(0,d.rain-10),rainMm:parseFloat((d.rainMm*0.4).toFixed(1)),windMph:Math.round(d.windMph*0.9),note:isRainy?"Possible showers":"Generally dry"},
    afternoon:{time:"12:00-18:00",temp:d.temp,condition:d.condition,rain:d.rain,rainMm:d.rainMm,windMph:d.windMph,note:d.note},
    evening:{time:"18:00-00:00",temp:Math.round(d.temp*0.75+d.low*0.25),condition:d.condition,rain:isRainy?Math.round(d.rain*0.7):Math.max(0,d.rain-15),rainMm:parseFloat((d.rainMm*0.5).toFixed(1)),windMph:Math.round(d.windMph*1.1),note:"Cooling down"},
  };
}

// ── Hourly builder ───────────────────────────────────────────────────────────
function buildHourly(forecastData,hourlyRaw,dayIndex){
  if(hourlyRaw&&hourlyRaw.times&&hourlyRaw.times.length>0){
    var seen={},dates=[];
    hourlyRaw.times.forEach(function(t){var d=t.split("T")[0];if(!seen[d]){seen[d]=true;dates.push(d);}});
    var target=dates[dayIndex];
    if(!target)return [];
    var hrs=[];
    hourlyRaw.times.forEach(function(t,i){
      if(t.split("T")[0]!==target)return;
      var h=parseInt(t.split("T")[1].split(":")[0]);
      var temp=Math.round((hourlyRaw.temps[i]||0)*10)/10;
      var code=hourlyRaw.codes[i]||0;
      var cloud=Math.round(hourlyRaw.cloud[i]||0);
      var rainMmHr=parseFloat((hourlyRaw.rainMm[i]||0).toFixed(1));
      var cond=condFromCode(code,Math.round(temp),cloud,rainMmHr);
      if((h<6||h>=21)&&(cond.includes("☀")||cond.includes("🌡")))cond="🌙";
      var mph=hourlyRaw.windMph[i]||0;
      var gust=hourlyRaw.gusts[i]||Math.round(mph*1.3);
      var hum=Math.round(hourlyRaw.humidity[i]||55);
      var pres=Math.round(hourlyRaw.pressure[i]||1013);
      var uv=Math.round(hourlyRaw.uv[i]||0);
      var rainC=Math.round(hourlyRaw.rain[i]||0);
      var dewp=hourlyRaw.dewpoint?Math.round(hourlyRaw.dewpoint[i]):Math.round(temp-((100-hum)/5));
      var vis=hourlyRaw.vis&&hourlyRaw.vis[i]!==null?(hourlyRaw.vis[i]>=20000?"Excellent (20km+)":hourlyRaw.vis[i]>=10000?"Good (10-20km)":hourlyRaw.vis[i]>=5000?"Moderate (5-10km)":"Poor (<5km)"):"Good";
      var dirs=["N","NE","NE","E","SE","SE","S","SW","SW","W","NW","NW"];
      var windDir=dirs[Math.floor((dayIndex*4+h/6))%12];
      var fl=Math.round(temp+condBonus(cond,temp,false)+humBonus(hum)+windBonus(mph));
      hrs.push({hour:h,timeStr:(h<10?"0":"")+h+":00",temp:temp,feelsLike:fl,condition:cond,windMph:mph,gustMph:gust,windDir:windDir,humidity:hum,dewPoint:dewp,pressure:pres,rainChance:rainC,rainMm:rainMmHr,uv:uv,cloud:cloud,visibility:vis});
    });
    return hrs;
  }
  // fallback generated
  var d=forecastData[dayIndex];
  if(!d)return [];
  var hrs=[];
  for(var h=0;h<24;h++){
    var prog=Math.sin(((h-15)/24)*Math.PI*2+Math.PI*0.5);
    prog=Math.max(0,Math.min(1,(prog+1)/2));
    var temp=Math.round((d.low+(d.temp-d.low)*Math.pow(prog,1.4))*10)/10;
    var isN=h<6||h>=21;
    var wf=h>=11&&h<=18?1.15:isN?0.75:1.0;
    var mph=Math.round(d.windMph*wf);
    var gust=Math.round(d.gustMph*wf);
    var hum=Math.min(99,Math.max(10,Math.round(d.humidity+(isN?12:h>=12&&h<=16?-10:0))));
    var rainC=d.rain;
    var rainMm=0;
    if(d.rainHours>0){var rp=d.condition.includes("⛈")?(h>=14&&h<=18):(h>=8&&h<=14);if(rp)rainC=Math.min(99,d.rain+20);rainMm=parseFloat((d.rainMm*(rp?0.12:0.02)).toFixed(1));}
    var pres=Math.round(d.pressure+(d.temp>28&&h>=12&&h<=16?-1:0));
    var cond=d.condition;
    if(isN)cond=d.condition.includes("⛈")||d.condition.includes("🌧")||d.condition.includes("💧")?"🌧️":"🌙";
    var sp=h>=6&&h<=20?(1-Math.abs((h-13)/7)):0;
    // FIX 4: improved UV max based on actual UV index data (use d.uvMax if available)
    var maxUv=d.uvMax!=null?d.uvMax:(d.temp>=40?12:d.temp>=35?10:d.temp>=30?9:d.temp>=25?7:d.temp>=20?5:4);
    var uv=cond.includes("☁")?Math.round(maxUv*0.3*sp):Math.round(maxUv*sp*sp);
    var cloud=cond.includes("☀")||cond.includes("🌡")?10:cond.includes("🌤")?30:cond.includes("⛅")?55:cond.includes("☁")?85:90;
    var vis=hum>80?"Poor (<5km)":hum>65?"Moderate (5-10km)":hum>45?"Good (10-20km)":"Excellent (20km+)";
    var dewp=Math.round(temp-((100-hum)/5));
    var dirs=["N","NE","NE","E","SE","SE","S","SW","SW","W","NW","NW"];
    var windDir=dirs[Math.floor((dayIndex*4+h/6))%12];
    var fl=Math.round(temp+condBonus(cond,temp,false)+humBonus(hum)+windBonus(mph));
    hrs.push({hour:h,timeStr:(h<10?"0":"")+h+":00",temp:temp,feelsLike:fl,condition:cond,windMph:mph,gustMph:gust,windDir:windDir,humidity:hum,dewPoint:dewp,pressure:pres,rainChance:Math.min(99,Math.round(rainC)),rainMm:rainMm,uv:uv,cloud:cloud,visibility:vis});
  }
  return hrs;
}

// ── Settings ─────────────────────────────────────────────────────────────────
function SettingsPanel(props){
  var units=props.units,setUnits=props.setUnits,onClose=props.onClose;
  var row={display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.06)"};
  function Btn(p){
    var on=p.cur===p.val;
    return React.createElement("button",{onClick:function(){p.set(p.val);},style:{padding:"4px 11px",borderRadius:14,border:"1px solid",borderColor:on?"#ff7700":"rgba(255,255,255,0.15)",background:on?"rgba(255,119,0,0.22)":"rgba(255,255,255,0.04)",color:on?"#ffaa44":"#888",fontSize:12,cursor:"pointer"}},p.children);
  }
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.72)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:60}}>
      <div style={{background:"#0e1624",border:"1px solid rgba(255,119,0,0.35)",borderRadius:16,padding:"22px 24px",width:"min(420px,92vw)",boxShadow:"0 8px 40px rgba(0,0,0,0.8)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{fontSize:15,color:"#ff9944",letterSpacing:2,textTransform:"uppercase"}}>Settings</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#888",fontSize:20,cursor:"pointer"}}>x</button>
        </div>
        <div style={row}><span style={{fontSize:13,color:"#e8dcc8"}}>Temperature</span><div style={{display:"flex",gap:5}}><Btn val="C" cur={units.temp} set={function(v){setUnits(function(u){return Object.assign({},u,{temp:v});});}}>C</Btn><Btn val="F" cur={units.temp} set={function(v){setUnits(function(u){return Object.assign({},u,{temp:v});});}}>F</Btn></div></div>
        <div style={row}><span style={{fontSize:13,color:"#e8dcc8"}}>Wind Speed</span><div style={{display:"flex",gap:5}}><Btn val="mph" cur={units.speed} set={function(v){setUnits(function(u){return Object.assign({},u,{speed:v});});}}>mph</Btn><Btn val="kmh" cur={units.speed} set={function(v){setUnits(function(u){return Object.assign({},u,{speed:v});});}}>km/h</Btn></div></div>
        <div style={row}><span style={{fontSize:13,color:"#e8dcc8"}}>Precipitation</span><div style={{display:"flex",gap:5}}><Btn val="mm" cur={units.rain} set={function(v){setUnits(function(u){return Object.assign({},u,{rain:v});});}}>mm</Btn><Btn val="in" cur={units.rain} set={function(v){setUnits(function(u){return Object.assign({},u,{rain:v});});}}>in</Btn></div></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0"}}><span style={{fontSize:13,color:"#e8dcc8"}}>Pressure</span><div style={{display:"flex",gap:5}}><Btn val="mbar" cur={units.pressure} set={function(v){setUnits(function(u){return Object.assign({},u,{pressure:v});});}}>mbar</Btn><Btn val="pa" cur={units.pressure} set={function(v){setUnits(function(u){return Object.assign({},u,{pressure:v});});}}>Pa</Btn><Btn val="bar" cur={units.pressure} set={function(v){setUnits(function(u){return Object.assign({},u,{pressure:v});});}}>bar</Btn><Btn val="ba" cur={units.pressure} set={function(v){setUnits(function(u){return Object.assign({},u,{pressure:v});});}}>ba</Btn></div></div>
      </div>
    </div>
  );
}

// ── Nav Dropdown ─────────────────────────────────────────────────────────────
function NavDropdown(props){
  var activePage=props.activePage,setActivePage=props.setActivePage;
  var open=useState(false);
  var isOpen=open[0],setOpen=open[1];
  var ref=useRef(null);
  useEffect(function(){
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",h);
    return function(){document.removeEventListener("mousedown",h);};
  },[]);
  var active=NAV_ITEMS.find(function(n){return n.id===activePage;})||NAV_ITEMS[0];
  return (
    <div ref={ref} style={{position:"relative",flexShrink:0}}>
      <button onClick={function(){setOpen(function(o){return !o;});}} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 12px",borderRadius:12,cursor:"pointer",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.18)",color:"#e8dcc8",fontSize:13,whiteSpace:"nowrap"}}>
        <span>{active.icon}</span>
        <span style={{maxWidth:110,overflow:"hidden",textOverflow:"ellipsis"}}>{active.label}</span>
        <span style={{fontSize:10,color:"#888"}}>{isOpen?"▲":"▼"}</span>
      </button>
      {isOpen&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,background:"#0e1624",border:"1px solid rgba(255,119,0,0.3)",borderRadius:12,overflow:"hidden",zIndex:150,boxShadow:"0 8px 32px rgba(0,0,0,0.8)",minWidth:210}}>
          {NAV_ITEMS.map(function(item){
            var isAct=item.id===activePage;
            return (
              <button key={item.id} onClick={function(){setActivePage(item.id);setOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 14px",background:isAct?"rgba(255,119,0,0.15)":"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.04)",color:isAct?"#ffaa44":"#bbb",fontSize:13,cursor:"pointer",textAlign:"left",outline:isAct?"1px solid rgba(255,119,0,0.4)":"none"}}>
                <span style={{fontSize:16}}>{item.icon}</span>
                <span>{item.label}</span>
                {isAct&&<span style={{marginLeft:"auto",color:"#ff7700",fontSize:10}}>●</span>}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Day card (shared) ─────────────────────────────────────────────────────────
function DayCard(props){
  var d=props.d,i=props.i,sel=props.sel,setSel=props.setSel,u=props.u,detailView=props.detailView,setDetailView=props.setDetailView;
  var color=tc(d.temp),isC=d.type==="confirmed",isN=d.type==="near",isSel=sel===i;
  var shade=shadeFeel(d.temp,d.windMph,d.humidity,d.condition);
  var sun=sunFeel(d.temp,d.windMph,d.humidity,d.condition);
  var sunny=hasSun(d.condition);
  var storm=d.humidity>=50&&d.temp>=28;
  var cat=windCat(d.windMph);
  var periods=getDayPeriods(d);
  return (
    <div onClick={function(){setSel(sel===i?null:i);}} style={{background:isSel?bgc(d.temp):"rgba(255,255,255,0.03)",border:"1px solid "+(isC?color+"66":isN?color+"44":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"13px 11px 11px",cursor:"pointer",transition:"all 0.2s",transform:isSel?"scale(1.03)":"scale(1)",boxShadow:isSel?"0 6px 24px "+color+"28":"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}>
        <div>

      )}
    </div>
  );
}

// ── Graph bar chart (shared) ──────────────────────────────────────────────────
function BarChart(props){
  var forecastData=props.forecastData,graph=props.graph,u=props.u,sel=props.sel,setSel=props.setSel,isLondon=props.isLondon;
  var n=forecastData.length;
  var CHART_H=143;
  var maxT=n>0?Math.max.apply(null,forecastData.map(function(d){return d.temp;})):40;
  var minT=n>0?Math.min.apply(null,forecastData.map(function(d){return d.temp;})):10;
  var maxP=n>0?Math.max.apply(null,forecastData.map(function(d){return d.pressure;})):1035;
  var minP=n>0?Math.min.apply(null,forecastData.map(function(d){return d.pressure;})):995;
  var maxRmm=n>0?Math.max.apply(null,forecastData.map(function(d){return d.rainMm;})):1;
  var MONTH_RECORDS=[
    {temp:32.8,label:"MAY REC 32.8",color:"rgba(255,160,0,0.85)",startIdx:0,endIdx:6},
    {temp:35.6,label:"JUN REC 35.6",color:"rgba(255,80,0,0.85)",startIdx:7,endIdx:36},
    {temp:40.2,label:"JUL REC 40.2",color:"rgba(200,0,255,0.85)",startIdx:37,endIdx:61},
  ];
  var gd;
  if(graph==="rain"){gd={values:forecastData.map(function(d){return d.rain;}),colors:forecastData.map(function(d){return rc(d.rain);}),max:100};}
  else if(graph==="rainmm"){gd={values:forecastData.map(function(d){return d.rainMm;}),colors:forecastData.map(function(d){return rc(d.rain);}),max:Math.max(maxRmm,1)};}
  else if(graph==="humidity"){gd={values:forecastData.map(function(d){return d.humidity;}),colors:forecastData.map(function(d){return hc(d.humidity);}),max:100};}
  else if(graph==="wind"){gd={values:forecastData.map(function(d){return d.windMph;}),colors:forecastData.map(function(d){return wc(d.windMph);}),max:Math.max(40,Math.max.apply(null,forecastData.map(function(d){return d.windMph;})))};}
  else if(graph==="pressure"){gd={values:forecastData.map(function(d){return d.pressure;}),colors:forecastData.map(function(d){return pc(d.pressure);}),max:maxP};}
  else{gd={values:forecastData.map(function(d){return d.temp;}),colors:forecastData.map(function(d){return tc(d.temp);}),max:maxT};}
  return (
    <div style={{position:"relative",height:155}}>
      {graph==="temp"&&isLondon&&MONTH_RECORDS.map(function(rec,ri){
        var bPx=((rec.temp-minT)/(maxT-minT))*CHART_H+6;
        var bPct=(bPx/155)*100;
        var lPct=(rec.startIdx/n)*100;
        var rPct=((n-1-rec.endIdx)/n)*100;
        var lbl=rec.label+(u.temp==="F"?" ("+cvtTemp(rec.temp,"F")+"F)":"C");
        return <div key={ri} style={{position:"absolute",bottom:bPct+"%",left:lPct+"%",right:rPct+"%",borderTop:"1px dashed "+rec.color,zIndex:2,pointerEvents:"none"}}><span style={{fontSize:9,color:rec.color,position:"absolute",right:0,top:-13,background:"rgba(10,10,26,0.85)",padding:"1px 5px",borderRadius:3,whiteSpace:"nowrap"}}>{lbl}</span></div>;
      })}
      {graph==="pressure"&&[1000,1010,1020,1030].map(function(ref){
        var pct=Math.min(Math.max(((ref-minP)/(maxP-minP))*90+6,2),98);
        return <div key={ref} style={{position:"absolute",bottom:pct+"%",left:0,right:0,borderTop:"1px dashed rgba(255,255,255,0.13)",zIndex:2,pointerEvents:"none"}}><span style={{fontSize:9,color:"#555",position:"absolute",left:0,top:-11,background:"rgba(10,10,26,0.85)",padding:"1px 4px",borderRadius:2}}>{fmtPres(ref,u.pressure)}</span></div>;
      })}
      <div style={{display:"flex",alignItems:"flex-end",gap:2,height:"100%"}}>
        {forecastData.map(function(d,i){
          var val=gd.values[i],col=gd.colors[i];
          var h=Math.max(4,graph==="pressure"?((val-minP)/(maxP-minP))*90+6:(val/gd.max)*90+6);
          var isSel=sel===i,isC=d.type==="confirmed",isN=d.type==="near";
          return <div key={i} onClick={function(){setSel(sel===i?null:i);}} style={{flex:1,height:h+"%",background:isC?"linear-gradient(to top,"+col+",rgba(255,255,255,0.5))":isN?"linear-gradient(to top,"+col+"ee,"+col+"88)":"linear-gradient(to top,"+col+"cc,"+col+"55)",borderRadius:"3px 3px 0 0",cursor:"pointer",outline:isSel?"2px solid "+col:"none",boxShadow:isC?"0 0 8px "+col+"77":isSel?"0 0 6px "+col+"55":"none",opacity:isSel?1:0.88,transition:"all 0.15s",minWidth:0}}/>;
        })}
      </div>
      {sel!==null&&(function(){
        var d=forecastData[sel],bx=(sel/(n-1))*100,fl=bx>62;
        return <div style={{position:"absolute",bottom:"calc(100% - 143px)",left:fl?"auto":"calc("+bx+"% + 4px)",right:fl?"calc("+(100-bx)+"% + 4px)":"auto",background:"rgba(12,16,30,0.97)",border:"1px solid "+tc(d.temp)+"55",borderRadius:10,padding:"11px 13px",minWidth:190,zIndex:10,boxShadow:"0 4px 24px rgba(0,0,0,0.65)",pointerEvents:"none"}}>
          <div style={{fontSize:13,fontWeight:"bold",color:"#fff",marginBottom:7}}>{d.date} {d.condition}</div>
          <div style={{display:"flex",gap:16,marginBottom:8}}>
            <div><div style={{fontSize:9,color:"#666",textTransform:"uppercase",letterSpacing:1}}>High</div><div style={{fontSize:20,fontWeight:"bold",color:tc(d.temp)}}>{fmtTemp(d.temp,u.temp)}</div></div>
            <div><div style={{fontSize:9,color:"#666",textTransform:"uppercase",letterSpacing:1}}>Low</div><div style={{fontSize:20,fontWeight:"bold",color:"#7bbf44"}}>{fmtTemp(d.low,u.temp)}</div></div>
          </div>
          <div style={{fontSize:11,color:"#aaa",display:"flex",flexDirection:"column",gap:4,lineHeight:1.4}}>
            <span>Pressure: <b style={{color:pc(d.pressure)}}>{fmtPres(d.pressure,u.pressure)}</b></span>
            <span>Rain: <b style={{color:rc(d.rain)}}>{d.rain}%</b> / <b style={{color:rc(d.rain)}}>{fmtRain(d.rainMm,u.rain)}</b>{d.rainHours>0&&<span style={{color:"#666",fontSize:10}}> {d.rainHours}h</span>}</span>
            <span>Humidity: <b style={{color:hc(d.humidity)}}>{d.humidity}%</b></span>
            <span>Wind: <b style={{color:wc(d.windMph)}}>{fmtSpd(d.windMph,u.speed)}</b> <span style={{color:"#777",fontSize:10}}>{windCat(d.windMph)}</span></span>
            <span style={{color:"#888",fontSize:10}}>Gusts: <b style={{color:wc(d.gustMph)}}>{fmtSpd(d.gustMph,u.speed)}</b></span>
            <span style={{color:"#9a8c7a"}}>{d.note}</span>
          </div>
        </div>;
      })()}
    </div>
  );
}

// ── FIX 3: Current Weather Section ───────────────────────────────────────────
function CurrentWeather(props){
  var forecastData=props.forecastData,hourlyRaw=props.hourlyRaw,locationName=props.locationName,u=props.u,lat=props.lat,lon=props.lon;
  var cur=useState(null);var iCur=cur[0];var setCur=cur[1];
  var loading=useState(true);var iLoading=loading[0];var setLoading=loading[1];

  useEffect(function(){
    if(!lat||!lon){setLoading(false);return;}
    setLoading(true);
    // Fetch current conditions from Open-Meteo current weather endpoint
    fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,windgusts_10m,relativehumidity_2m,surface_pressure,cloudcover,uv_index,precipitation,is_day&timezone=auto")
    .then(function(r){return r.json();})
    .then(function(j){
      var c=j.current;
      if(!c){setLoading(false);return;}
      var code=c.weathercode||0;
      var cloud=c.cloudcover||0;
      var precip=c.precipitation||0;
      var isDay=c.is_day!==0;
      var temp=Math.round(c.temperature_2m||0);
      var cond=condFromCode(code,temp,cloud,precip);
      if(!isDay&&(cond.includes("☀")||cond.includes("🌡")))cond="🌙";
      var mph=Math.round((c.windspeed_10m||0)*0.621371);
      var gust=Math.round((c.windgusts_10m||mph*1.3)*0.621371);
      var uv=Math.round(c.uv_index||0);
      var hum=Math.round(c.relativehumidity_2m||50);
      var pres=Math.round(c.surface_pressure||1013);
      var fl=Math.round(c.apparent_temperature||temp);
      // Heat index for display
      var hi=null;
      if(hasSun(cond)&&temp>=27){
        hi=sunFeel(temp,mph,hum,cond);
      }
      // Thunder density placeholder (Open-Meteo doesn't give strike density)
      var strikeDensity=null;
      if(cond.includes("⛈")){
        // estimate based on instability proxy: high temp + high humidity
        var instability=Math.max(0,(temp-25)*0.3+(hum-50)*0.1);
        strikeDensity=Math.round(instability*10)/10;
      }
      setCur({temp:temp,feelsLike:fl,condition:cond,windMph:mph,gustMph:gust,humidity:hum,pressure:pres,uv:uv,cloud:cloud,precip:precip,isDay:isDay,heatIndex:hi,strikeDensity:strikeDensity,code:code});
      setLoading(false);
    })
    .catch(function(){setLoading(false);});
  },[lat,lon]);

  if(iLoading)return <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:"20px",marginBottom:24,textAlign:"center",color:"#555",fontSize:12}}>Loading current conditions...</div>;
  if(!iCur)return null;

  var col=tc(iCur.temp);
  var condLabel=iCur.condition.includes("⛈")?"Thunderstorm":
    iCur.condition.includes("🌧️🌧️")?"Heavy Rain":
    iCur.condition.includes("🌧")?"Moderate Rain":
    iCur.condition.includes("🌦")?"Light Rain with Sun":
    iCur.condition.includes("💧")?"Light Drizzle":
    iCur.condition.includes("❄")?"Snow":
    iCur.condition.includes("🌫")?"Foggy":
    iCur.condition.includes("☁")?"Overcast":
    iCur.condition.includes("⛅")?"Partly Cloudy":
    iCur.condition.includes("🌤")?"Mostly Sunny":
    iCur.condition.includes("🌡")?"Hot & Sunny":
    iCur.condition.includes("☀")?"Sunny":
    iCur.condition.includes("🌙")?"Clear Night":"Clear";

  return (
    <div style={{background:"linear-gradient(135deg,rgba(255,119,0,0.06),rgba(74,159,212,0.04))",border:"1px solid rgba(255,119,0,0.2)",borderRadius:16,padding:"20px",marginBottom:24}}>
      <div style={{fontSize:10,letterSpacing:4,color:"#ff7700",textTransform:"uppercase",marginBottom:12}}>Current Conditions — {locationName}</div>
      <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",marginBottom:14}}>
        <span style={{fontSize:52,lineHeight:1}}>{iCur.condition}</span>
        <div>
          <div style={{fontSize:44,fontWeight:"bold",color:col,lineHeight:1}}>{fmtTemp(iCur.temp,u.temp)}</div>
          <div style={{fontSize:13,color:"#888",marginTop:2}}>{condLabel}</div>
          <div style={{fontSize:12,color:"#999",marginTop:1}}>Feels like <span style={{color:tc(iCur.feelsLike)}}>{fmtTemp(iCur.feelsLike,u.temp)}</span></div>
        </div>
        {iCur.heatIndex!=null&&(
          <div style={{background:"rgba(255,80,0,0.12)",border:"1px solid rgba(255,80,0,0.3)",borderRadius:12,padding:"10px 14px"}}>
            <div style={{fontSize:9,color:"#ff9944",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Heat Index (In Sun)</div>
            <div style={{fontSize:26,fontWeight:"bold",color:tc(iCur.heatIndex)}}>{fmtTemp(iCur.heatIndex,u.temp)}</div>
          </div>
        )}
        {iCur.strikeDensity!=null&&(
          <div style={{background:"rgba(255,200,0,0.1)",border:"1px solid rgba(255,200,0,0.3)",borderRadius:12,padding:"10px 14px"}}>
            <div style={{fontSize:9,color:"#ffcc00",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Est. Strike Density</div>
            <div style={{fontSize:22,fontWeight:"bold",color:"#ffcc00"}}>{iCur.strikeDensity} <span style={{fontSize:11,color:"#888"}}>fl/km²</span></div>
            <div style={{fontSize:10,color:"#888"}}>⚠️ Stay indoors</div>
          </div>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8}}>
        {[
          {label:"Wind",val:fmtSpd(iCur.windMph,u.speed),sub:"Gusts "+fmtSpd(iCur.gustMph,u.speed),col:wc(iCur.windMph),icon:"💨"},
          {label:"Humidity",val:iCur.humidity+"%",sub:"Dew "+fmtTemp(Math.round(iCur.temp-((100-iCur.humidity)/5)),u.temp),col:hc(iCur.humidity),icon:"💧"},
          {label:"Pressure",val:fmtPres(iCur.pressure,u.pressure),sub:iCur.pressure>=1020?"High":iCur.pressure>=1010?"Normal":"Low",col:pc(iCur.pressure),icon:"📊"},
          {label:"UV Index",val:iCur.uv+" — "+uvLbl(iCur.uv),sub:uvProtect(iCur.uv),col:uvCol(iCur.uv),icon:"☀️"},
          {label:"Cloud Cover",val:iCur.cloud+"%",sub:iCur.cloud<20?"Clear sky":iCur.cloud<50?"Partly cloudy":"Overcast",col:"#aaa",icon:"☁️"},
          {label:"Rainfall",val:iCur.precip>0?fmtRain(iCur.precip,u.rain):"None",sub:"Current hour",col:rc(iCur.precip>0?80:0),icon:"🌧️"},
        ].map(function(item,i){
          return <div key={i} style={{background:"rgba(0,0,0,0.25)",borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:"#555",marginBottom:3}}>{item.icon} {item.label}</div>
            <div style={{fontSize:13,fontWeight:"bold",color:item.col,lineHeight:1.2}}>{item.val}</div>
            <div style={{fontSize:9,color:"#555",marginTop:2}}>{item.sub}</div>
          </div>;
        })}
      </div>
    </div>
  );
}

// ── Weather Overview ──────────────────────────────────────────────────────────
function WeatherOverview(props){

  var u=units;

  var graph=useState("temp");var iGraph=graph[0];var setGraph=graph[1];

  var isLondon=locationName.includes("London");
  var tabs=[{id:"temp",label:"Temp"},{id:"rain",label:"Rain %"},{id:"rainmm",label:"Rainfall"},{id:"humidity",label:"Humidity"},{id:"wind",label:"Wind"},{id:"pressure",label:"Pressure"}];
  var panel={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:16,padding:"20px 16px 14px",marginBottom:26};
  return (
    <div>
      <CurrentWeather forecastData={forecastData} hourlyRaw={hourlyRaw} locationName={locationName} u={u} lat={lat} lon={lon}/>
      <div style={panel}>
        <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          {tabs.map(function(t){var on=iGraph===t.id;return <button key={t.id} onClick={function(){setGraph(t.id);setSel(null);}} style={{padding:"5px 10px",borderRadius:20,border:"1px solid",borderColor:on?"#ff7700":"rgba(255,255,255,0.12)",background:on?"rgba(255,119,0,0.18)":"rgba(255,255,255,0.03)",color:on?"#ffaa44":"#888",fontSize:11,cursor:"pointer"}}>{t.label}</button>;})}
          {iSel!==null&&<div style={{marginLeft:"auto",fontSize:11,color:"#aaa"}}><span style={{color:"#fff",fontWeight:"bold"}}>{forecastData[iSel].date}</span> <span style={{color:tc(forecastData[iSel].temp)}}>{fmtTemp(forecastData[iSel].temp,u.temp)}</span></div>}
        </div>
        <BarChart forecastData={forecastData} graph={iGraph} u={u} sel={iSel} setSel={setSel} isLondon={isLondon}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:10,color:"#666"}}>
          <span>{forecastData[0]?forecastData[0].date:""}</span>
          <span>{forecastData[Math.floor(forecastData.length/2)]?forecastData[Math.floor(forecastData.length/2)].date:""}</span>
          <span>{forecastData[forecastData.length-1]?forecastData[forecastData.length-1].date:""}</span>
        </div>

// ── Weather Graphs ────────────────────────────────────────────────────────────
function WeatherGraphs(props){
  var forecastData=props.forecastData,hourlyRaw=props.hourlyRaw,u=props.u;
  var ag=useState("temp");var iAg=ag[0];var setAg=ag[1];
  var hov=useState(null);var iHov=hov[0];var setHov=hov[1];
  var uh=useState(false);var iUh=uh[0];var setUh=uh[1];
  var hasHourly=hourlyRaw&&hourlyRaw.times&&hourlyRaw.times.length>0;
  var points=[];
  if(iUh&&hasHourly){
    var sl=Math.min(hourlyRaw.times.length,13*24);
    for(var ii=0;ii<sl;ii++){
      var t=hourlyRaw.times[ii];
      var lbl=t.split("T")[1].slice(0,5)+" "+t.split("T")[0].slice(5);
      var val=iAg==="temp"?Math.round(hourlyRaw.temps[ii]):iAg==="rain"?Math.round(hourlyRaw.rain[ii]||0):iAg==="wind"?Math.round(hourlyRaw.windMph[ii]||0):iAg==="gust"?Math.round(hourlyRaw.gusts[ii]||0):iAg==="hum"?Math.round(hourlyRaw.humidity[ii]||0):iAg==="pressure"?Math.round(hourlyRaw.pressure[ii]||1013):iAg==="cloud"?Math.round(hourlyRaw.cloud[ii]||0):iAg==="uv"?Math.round(hourlyRaw.uv[ii]||0):0;
      points.push({label:lbl,val:val,time:t});
    }
  }else{
    forecastData.forEach(function(d){
      var val=iAg==="temp"?d.temp:iAg==="rain"?d.rain:iAg==="wind"?d.windMph:iAg==="gust"?d.gustMph:iAg==="hum"?d.humidity:iAg==="pressure"?d.pressure:iAg==="cloud"?Math.round(d.humidity*0.7):iAg==="uv"?(d.uvMax!=null?d.uvMax:d.temp>=40?12:d.temp>=35?10:d.temp>=30?9:d.temp>=25?7:d.temp>=20?4:2):0;
      points.push({label:d.date,val:val,condition:d.condition});
    });
  }
  var vals=points.map(function(p){return p.val;});
  var maxV=vals.length>0?Math.max.apply(null,vals):1;
  var minV=vals.length>0?Math.min.apply(null,vals):0;
  var range=Math.max(maxV-minV,1);
  var peaks=[],troughs=[];
  for(var pi=1;pi<points.length-1;pi++){var pv=points[pi-1].val,cv=points[pi].val,nv=points[pi+1].val;if(cv>pv&&cv>nv&&cv>minV+range*0.6)peaks.push(pi);if(cv<pv&&cv<nv&&cv<minV+range*0.4)troughs.push(pi);}
  function colV(v){if(iAg==="temp")return tc(v);if(iAg==="rain"||iAg==="cloud")return rc(v);if(iAg==="wind"||iAg==="gust")return wc(v);if(iAg==="hum")return hc(v);if(iAg==="pressure")return pc(v);if(iAg==="uv")return uvCol(v);return "#88aacc";}
  function fmtV(v){if(iAg==="temp")return fmtTemp(v,u.temp);if(iAg==="rain"||iAg==="hum"||iAg==="cloud")return v+"%";if(iAg==="wind"||iAg==="gust")return fmtSpd(v,u.speed);if(iAg==="pressure")return fmtPres(v,u.pressure);if(iAg==="uv")return v+" UV";return ""+v;}
  var gTabs=[{id:"temp",label:"Temp",icon:"🌡"},{id:"rain",label:"Rain%",icon:"🌧"},{id:"wind",label:"Wind",icon:"💨"},{id:"gust",label:"Gusts",icon:"🌬"},{id:"hum",label:"Humidity",icon:"💧"},{id:"pressure",label:"Pressure",icon:"📊"},{id:"cloud",label:"Cloud",icon:"☁️"},{id:"uv",label:"UV",icon:"☀️"}];
  var svgW=900,svgH=220,padL=44,padR=16,padT=32,padB=28;
  var chartW=svgW-padL-padR,chartH=svgH-padT-padB;
  var step=chartW/Math.max(points.length-1,1);
  function xOf(i){return padL+i*step;}
  function yOf(v){return padT+chartH-((v-minV)/range)*chartH;}
  var pathD=points.map(function(p,i){return (i===0?"M":"L")+xOf(i).toFixed(1)+","+yOf(p.val).toFixed(1);}).join(" ");
  var areaD=pathD+" L"+xOf(points.length-1).toFixed(1)+","+(padT+chartH)+" L"+padL+","+(padT+chartH)+" Z";
  var ySteps=4,yLabels=[];

        <button onClick={function(){setUh(true);setHov(null);}} style={{padding:"4px 12px",borderRadius:10,border:"1px solid",borderColor:iUh?"#ff7700":"rgba(255,255,255,0.12)",background:iUh?"rgba(255,119,0,0.18)":"rgba(255,255,255,0.03)",color:iUh?"#ffaa44":"#888",fontSize:11,cursor:"pointer",opacity:hasHourly?1:0.4}}>Hourly{!hasHourly?" (search a location)":""}</button>
      </div>
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"10px 4px 6px",marginBottom:16,overflowX:"auto"}}>
        <svg viewBox={"0 0 "+svgW+" "+svgH} style={{width:"100%",minWidth:320,height:"auto",display:"block"}} onMouseLeave={function(){setHov(null);}}>
          {yLabels.map(function(yl,i){return <g key={i}><line x1={padL} y1={yl.y} x2={svgW-padR} y2={yl.y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/><text x={padL-4} y={yl.y+4} textAnchor="end" fontSize="9" fill="#555">{fmtV(yl.val)}</text></g>;})}
          <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={colV(maxV)} stopOpacity="0.3"/><stop offset="100%" stopColor={colV(maxV)} stopOpacity="0.02"/></linearGradient></defs>
          <path d={areaD} fill="url(#ag)"/>
          <path d={pathD} fill="none" stroke={colV(maxV)} strokeWidth="2" strokeLinejoin="round"/>
          {peaks.map(function(pi){return <g key={"pk"+pi}><circle cx={xOf(pi)} cy={yOf(points[pi].val)} r="4" fill={colV(points[pi].val)} opacity="0.9"/><text x={xOf(pi)} y={yOf(points[pi].val)-8} textAnchor="middle" fontSize="9" fill={colV(points[pi].val)} fontWeight="bold">{fmtV(points[pi].val)}</text><text x={xOf(pi)} y={yOf(points[pi].val)-18} textAnchor="middle" fontSize="8" fill="#888">Peak</text></g>;})}
          {troughs.map(function(ti){return <g key={"tr"+ti}><circle cx={xOf(ti)} cy={yOf(points[ti].val)} r="3" fill="#4a9fd4" opacity="0.9"/><text x={xOf(ti)} y={yOf(points[ti].val)+16} textAnchor="middle" fontSize="9" fill="#4a9fd4">{fmtV(points[ti].val)}</text></g>;})}
          {iHov!==null&&<g><line x1={xOf(iHov)} y1={padT} x2={xOf(iHov)} y2={padT+chartH} stroke="rgba(255,255,255,0.2)" strokeWidth="1" strokeDasharray="4,3"/><circle cx={xOf(iHov)} cy={yOf(points[iHov].val)} r="5" fill={colV(points[iHov].val)} stroke="#fff" strokeWidth="1.5"/></g>}
          {points.map(function(p,i){return <rect key={i} x={xOf(i)-step/2} y={padT} width={step} height={chartH} fill="transparent" onMouseEnter={function(){setHov(i);}} onClick={function(){setHov(iHov===i?null:i);}} style={{cursor:"crosshair"}}/>;} )}
          {points.map(function(p,i){if(i%xEvery!==0)return null;var lb=iUh?p.label.split(" ")[0]:p.label.split(" ").slice(0,2).join(" ");return <text key={i} x={xOf(i)} y={svgH-4} textAnchor="middle" fontSize="8" fill="#555" transform={"rotate(-30,"+xOf(i)+","+(svgH-4)+")"}>{lb}</text>;})}
        </svg>
        {iHov!==null&&<div style={{textAlign:"center",padding:"6px 0 2px",fontSize:12,color:"#ccc"}}><span style={{color:"#888"}}>{points[iHov].label}</span><span style={{color:colV(points[iHov].val),fontWeight:"bold",marginLeft:10,fontSize:16}}>{fmtV(points[iHov].val)}</span>{!iUh&&points[iHov].condition&&<span style={{marginLeft:8,fontSize:18}}>{points[iHov].condition}</span>}</div>}
      </div>
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"12px 14px",marginBottom:16}}>

        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {forecastData.slice(0,14).map(function(d,i){var isC=d.type==="confirmed",isN=d.type==="near",col=tc(d.temp);return <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 6px",borderRadius:10,minWidth:46,flex:"1 1 46px",background:isC?"rgba(255,119,0,0.1)":isN?"rgba(74,159,212,0.07)":"rgba(255,255,255,0.02)",border:"1px solid "+(isC?col+"44":isN?col+"22":"rgba(255,255,255,0.06)")}}><div style={{fontSize:9,color:"#666",textAlign:"center"}}>{d.date.split(" ").slice(0,2).join(" ")}</div><div style={{fontSize:20}}>{d.condition}</div><div style={{fontSize:12,fontWeight:"bold",color:col}}>{fmtTemp(d.temp,u.temp)}</div><div style={{fontSize:10,color:"#5a7a5a"}}>{fmtTemp(d.low,u.temp)}</div>{d.rain>=40&&<div style={{fontSize:9,color:rc(d.rain)}}>{d.rain}%</div>}</div>;})}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8}}>
        {(function(){
          var temps=forecastData.map(function(d){return d.temp;});
          var lows=forecastData.map(function(d){return d.low;});
          var maxT2=Math.max.apply(null,temps),minT2=Math.min.apply(null,temps);
          var maxL=Math.max.apply(null,lows);
          var avg=Math.round(temps.reduce(function(a,b){return a+b;},0)/temps.length);
          var rainy=forecastData.filter(function(d){return d.rain>=50;}).length;
          var sunny2=forecastData.filter(function(d){return d.condition.includes("☀")||d.condition.includes("🌡")||d.condition.includes("🌤");}).length;
          var totalR=forecastData.reduce(function(a,d){return a+d.rainMm;},0);
          var stats=[
            {icon:"🔥",label:"Peak High",val:fmtTemp(maxT2,u.temp),col:tc(maxT2)},
            {icon:"❄️",label:"Lowest High",val:fmtTemp(minT2,u.temp),col:tc(minT2)},
            {icon:"📊",label:"Avg High",val:fmtTemp(avg,u.temp),col:tc(avg)},
            {icon:"🌙",label:"Warmest Low",val:fmtTemp(maxL,u.temp),col:tc(maxL)},
            {icon:"🌧️",label:"Rainy Days",val:rainy+" days",col:"#66aaff"},
            {icon:"☀️",label:"Sunny Days",val:sunny2+" days",col:"#ffcc00"},
            {icon:"💦",label:"Total Rain",val:fmtRain(totalR,u.rain),col:"#88ccff"},
          ];
          return stats.map(function(s,i){return <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"10px 12px"}}><div style={{fontSize:16,marginBottom:4}}>{s.icon}</div><div style={{fontSize:9,color:"#666",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{s.label}</div><div style={{fontSize:18,fontWeight:"bold",color:s.col}}>{s.val}</div></div>;});
        })()}
      </div>
    </div>
  );
}

// ── FIX 1: Map and Radar — zooms to searched location ────────────────────────
function MapRadar(props){

  var mapLon=lon||-0.1278;
  var zoom=9;

  // Windy overlay IDs
  var layers=[
    {id:"rain",      label:"🌧️ Rain Radar",    detail:"Animated precipitation radar"},
    {id:"wind",      label:"💨 Wind",           detail:"Animated wind flow"},
    {id:"temp",      label:"🌡️ Temperature",    detail:"Surface temperature"},
    {id:"clouds",    label:"☁️ Cloud Cover",    detail:"Cloud layer"},
    {id:"pressure",  label:"📊 Pressure",       detail:"Surface pressure + isobars"},
    {id:"snowcover", label:"❄️ Snow Cover",     detail:"Snow depth"},
    {id:"thunder",   label:"⛈️ Thunder",        detail:"Lightning/storm activity"},
    {id:"cape",      label:"⚡ Storm Energy",   detail:"Convective instability (CAPE)"},

  var windyUrl="https://embed.windy.com/embed2.html"
    +"?lat="+mapLat
    +"&lon="+mapLon
    +"&detailLat="+mapLat
    +"&detailLon="+mapLon
    +"&width=650&height=450"
    +"&zoom="+zoom
    +"&level=surface"
    +"&overlay="+iLayer
    +"&product=ecmwf"
    +"&menu=&message=true&marker=true&calendar=now&pressure=true"
    +"&type=map&location=coordinates&detail=&metricWind=mph&metricTemp=%C2%B0C&radarRange=-1";

  var activeLayer=layers.find(function(l){return l.id===iLayer;})||layers[0];

  return (
    <div>
      <div style={{fontSize:11,letterSpacing:3,color:"#ff7700",textTransform:"uppercase",marginBottom:16}}>Map and Radar</div>

        })}
      </div>

      {/* Location + layer info bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:10}}>
        <div style={{fontSize:11,color:"#666"}}>
          📍 <span style={{color:"#ccc"}}>{locationName}</span>
          <span style={{color:"#444",fontSize:10,marginLeft:6}}>({mapLat.toFixed(3)}°, {mapLon.toFixed(3)}°)</span>
        </div>
        <div style={{fontSize:11,color:"#ff9944"}}>{activeLayer.label} — <span style={{color:"#7a6e5e"}}>{activeLayer.detail}</span></div>
      </div>

      {/* Windy embed — animated live weather map */}
      <div style={{borderRadius:14,overflow:"hidden",border:"1px solid rgba(255,119,0,0.2)",marginBottom:14,background:"#0a0f1e",position:"relative"}}>
        <iframe
          key={iLayer+"_"+mapLat+"_"+mapLon}
          src={windyUrl}
          style={{width:"100%",height:"480px",border:"none",display:"block"}}
          title="Windy Weather Map"
          allowFullScreen={true}
          loading="lazy"
        />

      {/* Tip */}
      <div style={{background:"rgba(255,119,0,0.05)",border:"1px solid rgba(255,119,0,0.12)",borderRadius:10,padding:"9px 13px",marginBottom:16,fontSize:11,color:"#7a6e5e",lineHeight:1.6}}>
        💡 <b style={{color:"#ff9944"}}>Tip:</b> Use the play button inside the map to animate the forecast forward in time. Click the location pin to see a detailed weather popup for {locationName}. Switch layers above to view different weather variables.
      </div>

      {/* Forecast mini-cards */}
      {forecastData.length>0&&(
        <div>
          <div style={{fontSize:10,letterSpacing:2,color:"#555",textTransform:"uppercase",marginBottom:8}}>6-Day Forecast Snapshot</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
            {forecastData.slice(0,6).map(function(d,i){
              return <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"10px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#666",marginBottom:3}}>{d.date.split(" ").slice(0,2).join(" ")}</div>
                <div style={{fontSize:22}}>{d.condition}</div>

        </div>

}

// ── Weather Extremes ──────────────────────────────────────────────────────────
function WeatherExtremes(props){
  var forecastData=props.forecastData,locationName=props.locationName,u=props.u;
  var lr=useState([]);var iLr=lr[0];var setLr=lr[1];
  var loading=useState(false);var iLoading=loading[0];var setLoading=loading[1];
  var loaded=useState(false);var iLoaded=loaded[0];var setLoaded=loaded[1];
  var error=useState("");var iError=error[0];var setError=error[1];

  async function fetchLive(){
    setLoading(true);setError("");setLr([]);
    try{
      var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:"Search the web for weather records broken in 2025 or 2026. Find: hottest temperature, coldest, heaviest rainfall, strongest wind, any national records broken. Respond ONLY with valid JSON and nothing else, no markdown: {\"records\":[{\"title\":\"string\",\"value\":\"string\",\"location\":\"string\",\"date\":\"string\",\"context\":\"string\",\"icon\":\"emoji\",\"color\":\"hex\"}]}"}]})});
      var data=await res.json();
      var raw=(data.content||[]).map(function(c){return c.type==="text"?c.text:"";}).join("");
      var clean=raw.split("```json").join("").split("```").join("").trim();
      var parsed=JSON.parse(clean);
      setLr(parsed.records||[]);
      setLoaded(true);
    }catch(e){
      setError("Could not fetch live data. Showing all-time records below.");
      setLoaded(true);
    }
    setLoading(false);
  }

  var allTime=[
    {title:"Highest Temperature",value:"56.7°C / 134°F",location:"Death Valley, USA",date:"10 Jul 1913",context:"The highest reliably recorded surface air temperature on Earth.",icon:"🔥",color:"#ff1500"},
    {title:"Lowest Temperature",value:"-89.2°C / -128.6°F",location:"Vostok Station, Antarctica",date:"21 Jul 1983",context:"Recorded at the Soviet Antarctic research station during midwinter.",icon:"🧊",color:"#88ccff"},
    {title:"Most Rain in 24 Hours",value:"1,825mm / 71.8 in",location:"Cilaos, Reunion Island",date:"7-8 Jan 1966",context:"During Tropical Cyclone Denise — the highest 24-hour rainfall total ever recorded.",icon:"🌊",color:"#4488ff"},
    {title:"Strongest Wind Gust",value:"408 km/h / 253 mph",location:"Barrow Island, Australia",date:"10 Apr 1996",context:"Recorded during Tropical Cyclone Olivia — highest surface wind gust ever measured.",icon:"🌀",color:"#00ccff"},
    {title:"Hottest Month (Global)",value:"+1.51°C above pre-industrial",location:"Global Average",date:"July 2023",context:"July 2023 was the hottest month in recorded global history.",icon:"🌍",color:"#ff6600"},
    {title:"Most Snow in 24 Hours",value:"192cm / 75.8 in",location:"Silver Lake, Colorado, USA",date:"14-15 Apr 1921",context:"The greatest single-day snowfall ever recorded at any weather station.",icon:"❄️",color:"#aaddff"},
    {title:"Longest Drought",value:"173 months without rain",location:"Arica, Chile",date:"Oct 1903 - Jan 1918",context:"The Atacama Desert city went over 14 consecutive years without measurable rainfall.",icon:"🏜️",color:"#cc8833"},
    {title:"Largest Hailstone",value:"20cm diameter, 878g",location:"Vivian, South Dakota, USA",date:"23 Jul 2010",context:"The largest hailstone ever officially recorded anywhere in the world.",icon:"⛏️",color:"#aabbcc"},
  ];

  var localEx=[];
  if(forecastData.length>0){
    var mT=forecastData.reduce(function(a,d){return d.temp>a.temp?d:a;});
    var mL=forecastData.reduce(function(a,d){return d.low<a.low?d:a;});
    var mR=forecastData.reduce(function(a,d){return d.rainMm>a.rainMm?d:a;});
    var mW=forecastData.reduce(function(a,d){return d.windMph>a.windMph?d:a;});
    localEx=[
      {title:"Forecast Peak Temp",value:fmtTemp(mT.temp,u.temp),location:locationName,date:mT.date,context:"Highest temperature in the 13-day forecast.",icon:"🌡️",color:tc(mT.temp)},
      {title:"Coldest Night",value:fmtTemp(mL.low,u.temp),location:locationName,date:mL.date,context:"Coldest overnight temperature in the forecast period.",icon:"🌙",color:"#88ccff"},
      {title:"Heaviest Rain Day",value:fmtRain(mR.rainMm,u.rain)+" ("+mR.rain+"%)",location:locationName,date:mR.date,context:"Day with most expected rainfall in the forecast.",icon:"🌧️",color:"#4488ff"},
      {title:"Strongest Wind",value:fmtSpd(mW.windMph,u.speed),location:locationName,date:mW.date,context:"Peak wind forecast. Gusts to "+fmtSpd(mW.gustMph,u.speed)+".",icon:"💨",color:wc(mW.windMph)},
    ];
  }

  function Card(r,i){
    return <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid "+(r.color||"#555")+"44",borderRadius:12,padding:"14px",display:"flex",flexDirection:"column",gap:5}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><span style={{fontSize:28}}>{r.icon}</span><div><div style={{fontSize:11,fontWeight:"bold",color:"#e8dcc8",lineHeight:1.3}}>{r.title}</div><div style={{fontSize:9,color:"#555",marginTop:1}}>{r.location}</div></div></div>
      <div style={{fontSize:20,fontWeight:"bold",color:r.color||"#fff",lineHeight:1}}>{r.value}</div>
      <div style={{fontSize:9,color:"#666"}}>{r.date}</div>
      <div style={{fontSize:11,color:"#7a6e5e",lineHeight:1.5}}>{r.context}</div>
    </div>;
  }

  return (
    <div>
      <div style={{fontSize:11,letterSpacing:3,color:"#ff7700",textTransform:"uppercase",marginBottom:16}}>Weather Extremes</div>
      {localEx.length>0&&<div style={{marginBottom:24}}><div style={{fontSize:11,color:"#ff9944",letterSpacing:2,marginBottom:10}}>YOUR LOCATION FORECAST EXTREMES</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:8}}>{localEx.map(function(r,i){return Card(r,i);})}</div></div>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12}}>
        <div style={{fontSize:11,color:"#ff9944",letterSpacing:2}}>CURRENT WORLD RECORDS BEING BROKEN</div>
        {!iLoaded&&<button onClick={fetchLive} disabled={iLoading} style={{padding:"6px 14px",borderRadius:10,border:"1px solid rgba(255,119,0,0.4)",background:"rgba(255,119,0,0.12)",color:"#ffaa44",fontSize:11,cursor:iLoading?"wait":"pointer"}}>{iLoading?"Searching...":"Search Live Records"}</button>}
        {iLoaded&&<button onClick={function(){setLoaded(false);setLr([]);setError("");}} style={{padding:"6px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.04)",color:"#888",fontSize:11,cursor:"pointer"}}>Refresh</button>}
      </div>
      {!iLoaded&&!iLoading&&<div style={{textAlign:"center",padding:"28px",color:"#555",border:"1px dashed rgba(255,255,255,0.07)",borderRadius:12,marginBottom:16,fontSize:12}}>Click "Search Live Records" to fetch current world weather extremes via AI web search.</div>}
      {iLoading&&<div style={{textAlign:"center",padding:"28px",color:"#666",fontSize:12}}>Searching the web for current world weather records...</div>}
      {iError&&<div style={{color:"#ff9944",fontSize:11,padding:"8px 12px",background:"rgba(255,119,0,0.07)",borderRadius:8,marginBottom:12}}>{iError}</div>}
      {iLoaded&&iLr.length>0&&<div style={{marginBottom:24}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:8,marginBottom:6}}>{iLr.map(function(r,i){return Card(r,i);})}</div><div style={{fontSize:9,color:"#333",textAlign:"center"}}>Sourced via live web search</div></div>}
      <div style={{marginBottom:8}}><div style={{fontSize:11,color:"#ff9944",letterSpacing:2,marginBottom:10}}>ALL-TIME WORLD RECORDS</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:8}}>{allTime.map(function(r,i){return Card(r,i);})}</div></div>
    </div>
  );
}

// ── FIX 2: Location Search with multiple results dropdown ─────────────────────
function LocationSearchDropdown(props){
  var results=props.results,onSelect=props.onSelect,onClose=props.onClose;
  if(!results||results.length===0)return null;
  return (
    <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#0e1624",border:"1px solid rgba(255,119,0,0.35)",borderRadius:12,zIndex:300,boxShadow:"0 8px 32px rgba(0,0,0,0.8)",overflow:"hidden"}}>
      <div style={{padding:"8px 12px",fontSize:10,color:"#666",letterSpacing:2,textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        {results.length} location{results.length>1?"s":""} found — select one
      </div>
      {results.map(function(place,i){
        var nameStr=place.name+(place.admin1?", "+place.admin1:"")+(place.country?", "+place.country:"");
        var subStr=[place.admin2,place.admin3].filter(Boolean).join(", ");
        return (
          <button key={i} onClick={function(){onSelect(place);onClose();}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 14px",background:"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.04)",color:"#bbb",fontSize:13,cursor:"pointer",textAlign:"left"}}>
            <span style={{fontSize:20,flexShrink:0}}>📍</span>
            <div>

// ── Push Notification helpers ─────────────────────────────────────────────────
var VAPID_PUBLIC = ""; // optional: add your VAPID key here for push
function buildAlertList(forecastData, prefs){
  var thresholds = prefs || {tempHeat:30, rain:60, wind:25, uv:8, storm:true};
  var alerts = [];
  if(!forecastData||!forecastData.length) return alerts;
  forecastData.slice(0,7).forEach(function(d){
    if(thresholds.tempHeat && d.temp >= thresholds.tempHeat)
      alerts.push({icon:"🔥", level:d.temp>=35?"danger":"warn", title:(d.temp>=35?"Extreme Heat":"Hot Day")+" — "+d.date, body:"High of "+d.temp+"°C. "+(d.temp>=35?"Avoid midday sun.":"Apply sunscreen.")});
    if(thresholds.rain && d.rain >= thresholds.rain && d.rainMm >= 5)
      alerts.push({icon:"🌧️", level:d.rain>=80&&d.rainMm>=10?"danger":"warn", title:(d.rain>=80?"Heavy Rain Warning":"Rain Likely")+" — "+d.date, body:d.rainMm+"mm, "+d.rain+"% chance."+(d.rain>=80?" Possible flooding.":"")});
    if(thresholds.wind && d.windMph >= thresholds.wind)
      alerts.push({icon:"💨", level:d.windMph>=40?"danger":"warn", title:(d.windMph>=40?"Gale Warning":"Strong Wind")+" — "+d.date, body:"Winds "+d.windMph+"mph, gusts "+d.gustMph+"mph."});
    if(thresholds.storm && d.humidity>=50 && d.temp>=28 && d.condition.includes("⛈"))
      alerts.push({icon:"⛈️", level:"danger", title:"Storm Risk — "+d.date, body:"Thunderstorm conditions: "+d.temp+"°C, "+d.humidity+"% humidity."});
    if(thresholds.uv && d.uvMax!=null && d.uvMax >= thresholds.uv)
      alerts.push({icon:"🕶️", level:"warn", title:"Very High UV — "+d.date, body:"UV index "+d.uvMax+". Sun protection essential."});
  });
  return alerts;
}

async function requestPushPermission(){
  if(!("Notification" in window)) return "unsupported";
  if(Notification.permission === "granted") return "granted";
  var result = await Notification.requestPermission();
  return result;
}

function fireBrowserNotification(title, body, icon){
  if(Notification.permission !== "granted") return;
  try{ new Notification(title, {body:body, icon:icon||"/favicon.ico"}); }catch(e){}
}

// ── Saved Locations Panel ─────────────────────────────────────────────────────
function SavedLocationsPanel(props){
  var user=props.user,onSelect=props.onSelect,currentPlace=props.currentPlace,onClose=props.onClose;
  var LS_KEY="twc_saved_locations";

  function loadLocal(){try{return JSON.parse(localStorage.getItem(LS_KEY)||"[]");}catch(e){return[];}}
  function saveLocal(arr){try{localStorage.setItem(LS_KEY,JSON.stringify(arr));}catch(e){}}

  var saved=useState(loadLocal());var iSaved=saved[0];var setSaved=saved[1];
  var syncing=useState(false);var iSyncing=syncing[0];var setSyncing=syncing[1];

  // Sync from Firestore when logged in
  useEffect(function(){
    if(!user)return;
    setSyncing(true);
    fbDb.collection("users").doc(user.uid).collection("savedLocations").orderBy("savedAt","desc").get()
      .then(function(snap){
        var fsLocs=snap.docs.map(function(d){return d.data();});
        // Merge with local, deduplicate by name
        var merged=fsLocs.slice();
        var names=new Set(fsLocs.map(function(l){return l.name;}));
        loadLocal().forEach(function(l){if(!names.has(l.name))merged.push(l);});
        setSaved(merged);
        saveLocal(merged);
      })
      .catch(function(){})
      .finally(function(){setSyncing(false);});
  },[user]);

  function addCurrent(){
    if(!currentPlace||!currentPlace.name)return;
    var loc={name:currentPlace.name,lat:currentPlace.lat,lon:currentPlace.lon,savedAt:Date.now()};
    var updated=[loc].concat(iSaved.filter(function(l){return l.name!==loc.name;}));
    setSaved(updated);
    saveLocal(updated);
    if(user){
      fbDb.collection("users").doc(user.uid).collection("savedLocations").doc(btoa(loc.name).slice(0,20)).set(loc).catch(function(){});
    }
  }

  function removeItem(name){
    var updated=iSaved.filter(function(l){return l.name!==name;});
    setSaved(updated);
    saveLocal(updated);
    if(user){
      fbDb.collection("users").doc(user.uid).collection("savedLocations").doc(btoa(name).slice(0,20)).delete().catch(function(){});
    }
  }

  var isAlreadySaved=currentPlace&&iSaved.some(function(l){return l.name===currentPlace.name;});

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.72)",zIndex:250,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:60,padding:"60px 16px 0"}}>
      <div style={{background:"#0e1624",border:"1px solid rgba(255,119,0,0.35)",borderRadius:16,padding:"22px 20px",width:"min(440px,98vw)",boxShadow:"0 8px 40px rgba(0,0,0,0.8)",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:14,color:"#ff9944",letterSpacing:2,textTransform:"uppercase"}}>📍 Saved Locations</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#888",fontSize:20,cursor:"pointer"}}>×</button>
        </div>
        {!user&&<div style={{fontSize:11,color:"#666",marginBottom:12,lineHeight:1.6}}>Saved locally on this device. Sign in to sync across devices.</div>}
        {user&&<div style={{fontSize:11,color:"#4a9fd4",marginBottom:12}}>{iSyncing?"Syncing…":"✓ Synced to your account"}</div>}
        {currentPlace&&!isAlreadySaved&&(
          <button onClick={addCurrent} style={{padding:"10px",borderRadius:10,border:"1px dashed rgba(255,119,0,0.4)",background:"rgba(255,119,0,0.07)",color:"#ffaa44",fontSize:12,cursor:"pointer",marginBottom:12}}>
            + Save current: {currentPlace.name}
          </button>
        )}
        {currentPlace&&isAlreadySaved&&(
          <div style={{padding:"8px 12px",borderRadius:10,background:"rgba(74,159,212,0.07)",color:"#4a9fd4",fontSize:12,marginBottom:12}}>✓ Current location is saved</div>
        )}
        <div style={{overflowY:"auto",flex:1}}>
          {iSaved.length===0&&<div style={{color:"#444",fontSize:12,textAlign:"center",padding:"28px 0"}}>No saved locations yet.</div>}
          {iSaved.map(function(loc,i){
            return (
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",marginBottom:6,background:"rgba(255,255,255,0.03)"}}>
                <button onClick={function(){onSelect(loc);onClose();}} style={{flex:1,background:"none",border:"none",color:"#e8dcc8",fontSize:13,cursor:"pointer",textAlign:"left",fontFamily:"Georgia,serif"}}>
                  📍 {loc.name}
                </button>
                <button onClick={function(){removeItem(loc.name);}} style={{background:"none",border:"none",color:"#554",fontSize:16,cursor:"pointer",padding:"2px 6px",borderRadius:6}}>🗑</button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}
