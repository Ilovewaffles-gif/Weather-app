// ── Share Card Modal ──────────────────────────────────────────────────────────
function ShareCardModal(props){
  var forecastData=props.forecastData,locationName=props.locationName,u=props.u,onClose=props.onClose;
  var cardRef=useRef(null);
  var generating=useState(false);var iGenerating=generating[0];var setGenerating=generating[1];
  var shareUrl=useState("");var iShareUrl=shareUrl[0];var setShareUrl=shareUrl[1];
  var copied=useState(false);var iCopied=copied[0];var setCopied=copied[1];

  var today=forecastData&&forecastData[0];
  var tomorrow=forecastData&&forecastData[1];
  var dayAfter=forecastData&&forecastData[2];

  async function handleDownload(){
    if(!cardRef.current||typeof html2canvas==="undefined"){alert("Screenshot library not loaded yet, try again.");return;}
    setGenerating(true);
    try{
      var canvas=await html2canvas(cardRef.current,{backgroundColor:"#0a0a1a",scale:2,logging:false,useCORS:true});
      var link=document.createElement("a");
      link.download="weather-"+locationName.replace(/[^a-zA-Z0-9]/g,"-")+".png";
      link.href=canvas.toDataURL("image/png");
      link.click();
    }catch(e){alert("Could not generate image.");}
    setGenerating(false);
  }

  async function handleCopyImage(){
    if(!cardRef.current||typeof html2canvas==="undefined") return;
    setGenerating(true);
    try{
      var canvas=await html2canvas(cardRef.current,{backgroundColor:"#0a0a1a",scale:2,logging:false,useCORS:true});
      canvas.toBlob(async function(blob){
        try{
          await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
          setCopied(true);setTimeout(function(){setCopied(false);},2500);
        }catch(e){alert("Copy not supported in this browser — use Download instead.");}
      },"image/png");
    }catch(e){}
    setGenerating(false);
  }

  function handleShareLink(){
    var url=window.location.origin+window.location.pathname+"?location="+encodeURIComponent(locationName);
    setShareUrl(url);
    if(navigator.share){navigator.share({title:"Weather for "+locationName,url:url}).catch(function(){});}
    else{navigator.clipboard.writeText(url).then(function(){setCopied(true);setTimeout(function(){setCopied(false);},2000);}).catch(function(){});}
  }

  if(!today)return null;

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.82)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 16px",overflowY:"auto"}}>
      <div style={{background:"#0e1624",border:"1px solid rgba(255,119,0,0.35)",borderRadius:18,padding:"22px 20px",width:"min(480px,98vw)",boxShadow:"0 12px 48px rgba(0,0,0,0.9)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:14,color:"#ff9944",letterSpacing:2,textTransform:"uppercase"}}>Share Forecast</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#888",fontSize:22,cursor:"pointer"}}>x</button>
        </div>
        {/* Share card — this is what gets screenshotted */}
        <div ref={cardRef} style={{background:"linear-gradient(135deg,#0a0a1a 0%,#0d1525 60%,#0a0f1e 100%)",border:"1px solid rgba(255,119,0,0.25)",borderRadius:16,padding:"20px",marginBottom:16,fontFamily:"Georgia,serif"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <div style={{fontSize:9,letterSpacing:4,color:"#ff7700",textTransform:"uppercase",marginBottom:3}}>The Weather Centre</div>
              <div style={{fontSize:16,color:"#fff",fontWeight:"bold"}}>📍 {locationName}</div>
              <div style={{fontSize:10,color:"#666",marginTop:2}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
            </div>
            <div style={{fontSize:48,lineHeight:1}}>{today.condition}</div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            {[today,tomorrow,dayAfter].filter(Boolean).map(function(d,i){
              return <div key={i} style={{flex:1,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 8px",textAlign:"center",border:"1px solid rgba(255,255,255,0.08)"}}>
                <div style={{fontSize:9,color:"#888",marginBottom:4}}>{i===0?"Today":i===1?"Tomorrow":d.date.split(" ").slice(0,2).join(" ")}</div>
                <div style={{fontSize:22,marginBottom:4}}>{d.condition}</div>
                <div style={{fontSize:16,fontWeight:"bold",color:tc(d.temp)}}>{fmtTemp(d.temp,u.temp)}</div>
                <div style={{fontSize:10,color:"#5a7a5a"}}>{fmtTemp(d.low,u.temp)}</div>
                <div style={{fontSize:10,color:rc(d.rain),marginTop:3}}>{d.rain}% rain</div>
              </div>;
            })}
          </div>
          <div style={{display:"flex",gap:14,justifyContent:"center",fontSize:11,color:"#7a6e5e",borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:10}}>
            <span>💨 {fmtSpd(today.windMph,u.speed)}</span>
            <span>💧 {today.humidity}%</span>
            <span>☁️ {today.rain}%</span>
            {today.uvMax!=null&&<span>☀️ UV {today.uvMax}</span>}
          </div>
          <div style={{textAlign:"center",fontSize:8,color:"#333",marginTop:8,letterSpacing:2}}>THE WEATHER CENTRE</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={handleDownload} disabled={iGenerating} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"#ff7700",color:"#fff",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>
            {iGenerating?"Generating...":"Download PNG"}
          </button>
          <button onClick={handleCopyImage} disabled={iGenerating} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.05)",color:"#e8dcc8",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>
            {iCopied?"Copied!":"Copy Image"}
          </button>
          <button onClick={handleShareLink} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(74,159,212,0.3)",background:"rgba(74,159,212,0.08)",color:"#88ccff",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>
            Share Link
          </button>
        </div>
        {iShareUrl&&<div style={{marginTop:10,padding:"8px 12px",background:"rgba(255,255,255,0.04)",borderRadius:8,fontSize:11,color:"#888",wordBreak:"break-all"}}>{iShareUrl} {iCopied?"(copied!)":""}</div>}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  var fd=useState([]);var iFd=fd[0];var setFd=fd[1];
  var hr=useState(null);var iHr=hr[0];var setHr=hr[1];
  var ln=useState("Loading...");var iLn=ln[0];var setLn=ln[1];
  var dr=useState("");var iDr=dr[0];var setDr=dr[1];
  var st=useState("");var iSt=st[0];var setSt=st[1];
  var searching=useState(false);var iSearching=searching[0];var setSearching=searching[1];
  var err=useState("");var iErr=err[0];var setErr=err[1];
  var ap=useState("overview");var iAp=ap[0];var setAp=ap[1];
  var units=useState({temp:"C",speed:"mph",rain:"mm",pressure:"mbar"});var iUnits=units[0];var setUnits=units[1];
  var searchResults=useState([]);var iSearchResults=searchResults[0];var setSearchResults=searchResults[1];
  var showResults=useState(false);var iShowResults=showResults[0];var setShowResults=showResults[1];
  var searchRef=useRef(null);
  var latState=useState(51.5074);var iLat=latState[0];var setLat=latState[1];
  var lonState=useState(-0.1278);var iLon=lonState[0];var setLon=lonState[1];
  var userState=useState(null);var iUser=userState[0];var setUser=userState[1];
  var showAuth=useState(false);var iShowAuth=showAuth[0];var setShowAuth=showAuth[1];
  var showSaved=useState(false);var iShowSaved=showSaved[0];var setShowSaved=showSaved[1];
  var showAlerts=useState(false);var iShowAlerts=showAlerts[0];var setShowAlerts=showAlerts[1];
  var showSettings=useState(false);var iShowSettings=showSettings[0];var setShowSettings=showSettings[1];
  var showShare=useState(false);var iShowShare=showShare[0];var setShowShare=showShare[1];
  var currentPlace=useRef(null);
  var alertPrefsState=useState({tempHeat:30,rain:60,wind:25,uv:8,storm:true,showFeelLike:true,showStormBadge:true,showUV:true,autoNotify:false});
  var iAlertPrefs=alertPrefsState[0];var setAlertPrefs=alertPrefsState[1];

  useEffect(function(){
    var unsub=fbAuth.onAuthStateChanged(function(u){setUser(u||null);});
    return unsub;
  },[]);

  useEffect(function(){
    var params=new URLSearchParams(window.location.search);
    var locParam=params.get("location");
    if(locParam){fetchByName(locParam);return;}
    var last=null;
    try{last=JSON.parse(localStorage.getItem("twc_last_location"));}catch(e){}
    if(last&&last.name){fetchWeatherByCoords(last.lat,last.lon,last.name);return;}
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        function(pos){
          fetch("https://nominatim.openstreetmap.org/reverse?lat="+pos.coords.latitude+"&lon="+pos.coords.longitude+"&format=json")
            .then(function(r){return r.json();})
            .then(function(j){
              var name=(j.address&&(j.address.city||j.address.town||j.address.village||j.address.county))||"Your Location";
              var country=j.address&&j.address.country_code?j.address.country_code.toUpperCase():"";
              fetchWeatherByCoords(pos.coords.latitude,pos.coords.longitude,name+(country?", "+country:""));
            })
            .catch(function(){fetchWeatherByCoords(pos.coords.latitude,pos.coords.longitude,"Your Location");});
        },
        function(){fetchByName("London");}
      );
    }else{fetchByName("London");}
  },[]);

  useEffect(function(){
    if(!iAlertPrefs.autoNotify||!iFd.length)return;
    var alerts=buildAlertList(iFd,iAlertPrefs);
    alerts.slice(0,2).forEach(function(a,i){setTimeout(function(){fireBrowserNotification("Weather Centre: "+a.title,a.body);},1000+i*800);});
  },[iFd,iAlertPrefs]);

  useEffect(function(){
    function handleClick(e){if(searchRef.current&&!searchRef.current.contains(e.target))setShowResults(false);}
    document.addEventListener("mousedown",handleClick);
    return function(){document.removeEventListener("mousedown",handleClick);};
  },[]);

  async function searchLocation(name){
    setSearching(true);setErr("");setSearchResults([]);setShowResults(false);
    try{
      var gR=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(name)+"&count=8&language=en&format=json");
      var gJ=await gR.json();
      if(!gJ.results||!gJ.results.length){setErr("Location not found.");setSearching(false);return;}
      if(gJ.results.length===1){await fetchWeather(gJ.results[0]);}
      else{setSearchResults(gJ.results);setShowResults(true);setSearching(false);}
    }catch(e){setErr("Could not search. Check your connection.");setSearching(false);}
  }
  async function fetchByName(name){
    setSearching(true);setErr("");
    try{
      var gR=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(name)+"&count=1&language=en&format=json");
      var gJ=await gR.json();
      if(!gJ.results||!gJ.results.length){setErr("Location not found.");setSearching(false);return;}
      await fetchWeather(gJ.results[0]);
    }catch(e){setErr("Could not load forecast.");setSearching(false);}
  }
  async function fetchWeatherByCoords(lat,lon,name){
    setSearching(true);setErr("");
    try{await fetchWeather({latitude:lat,longitude:lon,name:name,admin1:"",country_code:""});}
    catch(e){setErr("Could not load forecast.");setSearching(false);}
  }
  async function fetchWeather(place){
    setSearching(true);setErr("");
    try{
      var wR=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+place.latitude+"&longitude="+place.longitude+
        "&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,precipitation_hours,windspeed_10m_max,windgusts_10m_max,relative_humidity_2m_mean,surface_pressure_mean,weathercode,uv_index_max"+
        "&hourly=temperature_2m,weathercode,precipitation_probability,precipitation,windspeed_10m,windgusts_10m,relativehumidity_2m,surface_pressure,cloudcover,uv_index,dewpoint_2m,visibility"+
        "&timezone=auto&forecast_days=13");
      var wJ=await wR.json();
      var days=wJ.daily,hrs=wJ.hourly;
      var data=days.time.map(function(t,i){
        var temp=Math.round(days.temperature_2m_max[i]);
        var code=days.weathercode[i]||0;
        var cloudEst=55,precipSum=days.precipitation_sum[i]||0;
        if(days.precipitation_probability_max[i]>=70)cloudEst=85;
        else if(days.precipitation_probability_max[i]>=40)cloudEst=60;
        else if(days.precipitation_probability_max[i]<=10)cloudEst=15;
        var cond=condFromCode(code,temp,cloudEst,precipSum);
        var mph=Math.round((days.windspeed_10m_max[i]||0)*0.621371);
        var ds=new Date(t+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
        var uvMax=days.uv_index_max&&days.uv_index_max[i]!=null?Math.round(days.uv_index_max[i]):null;
        return{date:ds,temp:temp,low:Math.round(days.temperature_2m_min[i]),type:i<3?"confirmed":i<7?"near":"estimated",condition:cond,note:"Live forecast via Open-Meteo",wind:mph<5?"very light":mph<10?"light":mph<20?"moderate":"fresh",windMph:mph,gustMph:Math.round((days.windgusts_10m_max[i]||mph*1.3)*0.621371),rain:days.precipitation_probability_max[i]||0,humidity:Math.round(days.relative_humidity_2m_mean[i]||55),pressure:Math.round(days.surface_pressure_mean[i]||1013),rainMm:parseFloat((days.precipitation_sum[i]||0).toFixed(1)),rainHours:Math.round(days.precipitation_hours[i]||0),uvMax:uvMax};
      });
      setHr({times:hrs.time,temps:hrs.temperature_2m,codes:hrs.weathercode,windMph:hrs.windspeed_10m.map(function(v){return Math.round((v||0)*0.621371);}),gusts:hrs.windgusts_10m.map(function(v){return Math.round((v||0)*0.621371);}),rain:hrs.precipitation_probability,rainMm:hrs.precipitation,humidity:hrs.relativehumidity_2m,pressure:hrs.surface_pressure,cloud:hrs.cloudcover,uv:hrs.uv_index,dewpoint:hrs.dewpoint_2m,vis:hrs.visibility});
      setFd(data);
      setLat(place.latitude);setLon(place.longitude);
      var displayName=place.name+(place.admin1?", "+place.admin1:"")+(place.country_code?", "+place.country_code:"");
      setLn(displayName);
      currentPlace.current={name:displayName,lat:place.latitude,lon:place.longitude};
      try{localStorage.setItem("twc_last_location",JSON.stringify({name:displayName,lat:place.latitude,lon:place.longitude}));}catch(e){}
      var first=new Date(days.time[0]+"T12:00:00"),last=new Date(days.time[days.time.length-1]+"T12:00:00");
      setDr(first.toLocaleDateString("en-GB",{day:"numeric",month:"short"})+" - "+last.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}));
    }catch(e){setErr("Could not load forecast. Check your connection and try again.");}
    setSearching(false);
  }

  function doSearch(){if(iSt.trim())searchLocation(iSt.trim());}
  function onKey(e){if(e.key==="Enter")doSearch();}

  var alertCount=buildAlertList(iFd,iAlertPrefs).length;
  var u=iUnits;
  var pageSty={fontFamily:"Georgia,'Times New Roman',serif",background:"linear-gradient(160deg,#0a0a1a 0%,#0d1525 40%,#0a0f1e 100%)",minHeight:"100vh",color:"#e8dcc8",overflowX:"hidden"};
  var wrapSty={position:"relative",zIndex:1,maxWidth:960,margin:"0 auto",padding:"24px 16px 60px"};

  return (
    <div style={pageSty}>
      {iShowAuth&&<AuthModal onClose={function(){setShowAuth(false);}} onLogin={function(u){setUser(u);}}/>}
      {iShowSaved&&<SavedLocationsPanel user={iUser} currentPlace={currentPlace.current} onClose={function(){setShowSaved(false);}} onSelect={function(loc){fetchWeatherByCoords(loc.lat,loc.lon,loc.name);}}/>}
      {iShowAlerts&&<AlertsPanel forecastData={iFd} locationName={iLn} u={u} user={iUser} alertPrefs={iAlertPrefs} onClose={function(){setShowAlerts(false);}}/>}
      {iShowSettings&&<UserSettingsPanel user={iUser} units={u} setUnits={setUnits} alertPrefs={iAlertPrefs} setAlertPrefs={setAlertPrefs} onClose={function(){setShowSettings(false);}} onOpenAuth={function(){setShowAuth(true);}}/>}
      {iShowShare&&<ShareCardModal forecastData={iFd} locationName={iLn} u={u} onClose={function(){setShowShare(false);}}/>}
      <div style={wrapSty}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
          <NavDropdown activePage={iAp} setActivePage={setAp}/>
          <div ref={searchRef} style={{flex:1,minWidth:120,position:"relative"}}>
            <input value={iSt} onChange={function(e){setSt(e.target.value);}} onKeyDown={onKey}
              placeholder="Search any location worldwide..."
              style={{width:"100%",padding:"10px 12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.05)",color:"#fff",fontSize:13,outline:"none"}}/>
            {iShowResults&&<LocationSearchDropdown results={iSearchResults} onSelect={fetchWeather} onClose={function(){setShowResults(false);}}/>}
          </div>
          <button onClick={doSearch} disabled={iSearching} style={{padding:"10px 14px",borderRadius:12,border:"none",background:iSearching?"#555":"#ff7700",color:"#fff",fontSize:13,fontWeight:"bold",cursor:iSearching?"wait":"pointer",whiteSpace:"nowrap",flexShrink:0}}>{iSearching?"Loading...":"Search"}</button>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={function(){setShowSaved(true);}} style={{padding:"8px 11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.13)",background:"rgba(255,255,255,0.04)",color:"#aaa",fontSize:12,cursor:"pointer",flexShrink:0}}>Saved</button>
          <button onClick={function(){setShowAlerts(true);}} style={{padding:"8px 11px",borderRadius:10,border:"1px solid "+(alertCount>0?"rgba(255,80,0,0.4)":"rgba(255,255,255,0.13)"),background:alertCount>0?"rgba(255,60,0,0.1)":"rgba(255,255,255,0.04)",color:alertCount>0?"#ff9944":"#aaa",fontSize:12,cursor:"pointer",flexShrink:0}}>
            Alerts{alertCount>0&&<span style={{marginLeft:5,background:"#ff4400",color:"#fff",borderRadius:9,fontSize:10,padding:"1px 6px",fontFamily:"Georgia,serif"}}>{alertCount}</span>}
          </button>
          <button onClick={function(){setShowShare(true);}} style={{padding:"8px 11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.13)",background:"rgba(255,255,255,0.04)",color:"#aaa",fontSize:12,cursor:"pointer",flexShrink:0}}>Share</button>
          <button onClick={function(){setShowSettings(true);}} style={{padding:"8px 11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.13)",background:"rgba(255,255,255,0.04)",color:"#aaa",fontSize:12,cursor:"pointer",flexShrink:0}}>Settings</button>
          <div style={{marginLeft:"auto"}}>
            {iUser
              ?<button onClick={function(){setShowSettings(true);}} style={{background:"none",border:"none",color:"#4a9fd4",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>👤 {iUser.displayName||iUser.email}</button>
              :<button onClick={function(){setShowAuth(true);}} style={{padding:"8px 14px",borderRadius:10,border:"1px solid rgba(255,119,0,0.35)",background:"rgba(255,119,0,0.1)",color:"#ffaa44",fontSize:12,cursor:"pointer"}}>Sign in / Sign up</button>
            }
          </div>
        </div>
        {iErr&&<div style={{color:"#ff6666",fontSize:12,marginBottom:12,textAlign:"center"}}>{iErr}</div>}
        {iFd.length===0&&!iErr&&<div style={{textAlign:"center",padding:"80px 20px",color:"#555"}}><div style={{fontSize:40,marginBottom:16}}>🌍</div><div style={{fontSize:14,color:"#666"}}>Detecting your location…</div></div>}
        {iFd.length>0&&(
          <div>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{fontSize:11,letterSpacing:6,color:"#ff7700",textTransform:"uppercase",marginBottom:8}}>Forecast — {iLn}</div>
              <h1 style={{fontSize:"clamp(18px,4vw,34px)",fontWeight:"normal",margin:"0 0 4px",color:"#fff",lineHeight:1.1}}>{iDr}</h1>
              <div style={{fontSize:12,color:"#9a8c7a",marginBottom:12}}>Daily maxima · Tap any card or bar for details</div>
              <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap",fontSize:11,color:"#9a8c7a"}}>
                {[{col:"#ff7700",label:"Confirmed",solid:true},{col:"#4a9fd4",label:"Near-term",solid:false},{col:"#555",label:"Estimated",solid:false}].map(function(l,i){return <span key={i} style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:9,height:9,borderRadius:l.solid?2:"50%",background:l.col,display:"inline-block"}}/>{l.label}</span>;})}
              </div>
            </div>
            {iAp==="overview"&&<WeatherOverview forecastData={iFd} locationName={iLn} u={u} hourlyRaw={iHr} lat={iLat} lon={iLon}/>}
            {iAp==="ten"&&<TenDayForecast forecastData={iFd} u={u}/>}
            {iAp==="hourly"&&<HourlyForecast forecastData={iFd} hourlyRaw={iHr} u={u}/>}
            {iAp==="graphs"&&<WeatherGraphs forecastData={iFd} hourlyRaw={iHr} u={u}/>}
            {iAp==="radar"&&<MapRadar locationName={iLn} forecastData={iFd} lat={iLat} lon={iLon}/>}
            {iAp==="extremes"&&<WeatherExtremes forecastData={iFd} locationName={iLn} u={u}/>}
          </div>
        )}
        <div style={{textAlign:"center",marginTop:24,fontSize:11,color:"#4a4a5a",lineHeight:1.7}}>The Weather Centre — powered by Open-Meteo</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
