// ── Unit helpers ─────────────────────────────────────────────────────────────
function cvtTemp(c,u){return u==="F"?Math.round(c*9/5+32):c;}
function fmtTemp(c,u){return cvtTemp(c,u)+"°"+u;}
function cvtSpd(m,u){return u==="kmh"?Math.round(m*1.60934):m;}
function fmtSpd(m,u){return cvtSpd(m,u)+(u==="kmh"?" km/h":" mph");}
function cvtRain(mm,u){return u==="in"?(mm*0.0393701).toFixed(2):mm.toFixed(1);}
function fmtRain(mm,u){if(mm===0)return "0"+(u==="in"?'"':"mm");return cvtRain(mm,u)+(u==="in"?'"':"mm");}
function cvtPres(mb,u){if(u==="pa")return Math.round(mb*100);if(u==="bar")return (mb/1000).toFixed(4);if(u==="ba")return Math.round(mb*1000);return mb;}
function fmtPres(mb,u){var v=cvtPres(mb,u);if(u==="pa")return v+" Pa";if(u==="bar")return v+" bar";if(u==="ba")return v+" ba";return v+" mbar";}

// ── Colour helpers ───────────────────────────────────────────────────────────
function tc(t){return t>=36?"#ff1500":t>=33?"#ff3d00":t>=30?"#ff6600":t>=27?"#ff8800":t>=24?"#ffaa00":t>=21?"#ffcc00":t>=18?"#c8d400":t>=15?"#7bbf44":"#4a9fd4";}
function rc(r){return r>=70?"#4488ff":r>=40?"#66aaff":r>=20?"#88ccff":"#aaddff";}
function hc(h){return h>=80?"#7755cc":h>=60?"#9977dd":h>=40?"#bbaaee":"#ddccff";}
function wc(w){return w>=30?"#ff7722":w>=20?"#ffaa44":w>=10?"#ffcc88":"#fff0cc";}
function pc(p){return p>=1030?"#ff6600":p>=1020?"#ffaa00":p>=1010?"#88ddff":p>=1000?"#6699cc":"#9955cc";}
function bgc(t){return t>=33?"rgba(255,45,0,0.18)":t>=30?"rgba(255,100,0,0.14)":t>=27?"rgba(255,140,0,0.11)":t>=24?"rgba(255,170,0,0.09)":t>=21?"rgba(255,200,0,0.08)":t>=18?"rgba(180,210,0,0.08)":"rgba(74,159,212,0.06)";}

// FIX 4: Corrected UV classification - 0-2 Low, 3-5 Moderate, 6-7 High, 8-10 Very High, 11+ Extreme
function uvCol(uv){return uv>=11?"#ff1500":uv>=8?"#ff6600":uv>=6?"#ffaa00":uv>=3?"#ffcc00":uv>0?"#7bbf44":"#555";}
function uvLbl(uv){return uv>=11?"Extreme":uv>=8?"Very High":uv>=6?"High":uv>=3?"Moderate":uv>0?"Low":"None";}
function uvProtect(uv){return uv>=11?"Extreme — avoid all sun exposure":uv>=8?"Very High — protection essential":uv>=6?"High — protection essential":uv>=3?"Moderate — apply sunscreen":uv>0?"Low risk":"No UV";}

// ── Wind ─────────────────────────────────────────────────────────────────────
function windCat(mph){
  if(mph<5)return "Very Light";if(mph<10)return "Light Breeze";if(mph<15)return "Moderate Breeze";
  if(mph<20)return "Fresh Breeze";if(mph<30)return "Strong Breeze";if(mph<40)return "Gale";
  if(mph<50)return "Strong Gale";if(mph<60)return "Violent Gale";if(mph<73)return "Very Violent Gale";
  return "Hurricane";
}

// ── Feel-like ────────────────────────────────────────────────────────────────
function condBonus(cond,temp,shade){
  var isRain=cond.includes("🌧")||cond.includes("🌧🌧")||cond.includes("⛈")||cond.includes("🌦")||cond.includes("💧");
  var eff=shade?(isRain?cond:"☁️"):cond;
  if(eff.includes("⛈"))return -5;if(eff.includes("🌧🌧"))return -5;if(eff.includes("🌧"))return -4;
  if(eff.includes("🌦"))return -4;if(eff.includes("💧"))return -3;
  if(eff.includes("☁"))return -2;if(eff.includes("⛅"))return 0;if(eff.includes("🌤"))return 1;
  if(eff.includes("🌡"))return temp>40?8:temp>35?7:temp>30?6:temp>25?5:4;
  if(eff.includes("☀"))return temp>40?8:temp>35?7:temp>30?6:temp>25?5:temp>20?4:3;
  return 0;
}
function humBonus(h){if(h<=10)return -2;if(h<=20)return -1;if(h<=30)return 0;if(h<=40)return 1;if(h<=50)return 2;if(h<=60)return 3;if(h<=70)return 4;if(h<=80)return 6;if(h<=90)return 8;return 10;}
function windBonus(m){if(m<5)return 1;if(m<10)return 0;if(m<15)return -1;if(m<20)return -3;if(m<30)return -5;if(m<40)return -6;if(m<50)return -8;if(m<60)return -13;return -30;}
function sunFeel(t,m,h,c){return Math.round(t+condBonus(c,t,false)+humBonus(h)+windBonus(m));}
function shadeFeel(t,m,h,c){return Math.round(t+condBonus(c,t,true)+humBonus(h)+windBonus(m));}
function hasSun(c){return c.includes("☀")||c.includes("🌡")||c.includes("🌤")||c.includes("⛅");}

// FIX 3: Improved condition from WMO code using cloud cover and rain intensity
// condFromCode now accepts cloudCover and precipitation amount for better icons
function condFromCode(code,temp,cloudPct,precipMm){
  var cloud=cloudPct!=null?cloudPct:50;
  var precip=precipMm!=null?precipMm:0;
  // Thunderstorm codes
  if(code>=95)return "⛈️";
  // Heavy snow
  if(code>=71&&code<=77)return "❄️";
  // Rain/drizzle codes
  if(code>=60&&code<=67){
    // Drizzle (60-67 with low amounts or drizzle codes 51-57)
    if(code>=60&&code<=61)return "💧";
    if(code>=62&&code<=65){
      // moderate/heavy rain - check cloud cover
      if(cloud>=60)return precip>=3?"🌧️🌧️":"🌧️";
      return "🌦️";
    }
    if(code>=66&&code<=67)return "🌧️"; // freezing rain
  }
  if(code>=51&&code<=57){
    if(code>=55)return "🌧️";
    return "💧";
  }
  // Showers (80-86)
  if(code>=80&&code<=82){
    if(cloud>=60)return precip>=3?"🌧️🌧️":"🌧️";
    return "🌦️";
  }
  if(code>=83&&code<=86)return "❄️";
  // Fog
  if(code>=40&&code<=48)return "🌫️";
  // Clear/cloudy
  if(code===0)return temp>=30?"🌡️":"☀️";
  if(code<=2)return "⛅";
  if(code<=3)return "☁️";
  return "☁️";
}

// ── Period breakdown ─────────────────────────────────────────────────────────
function getDayPeriods(d){
  var isRainy=d.rain>40;
  return {
    morning:{time:"06:00-12:00",temp:Math.round(d.low+(d.temp-d.low)*0.4),condition:d.condition,rain:isRainy?Math.round(d.rain*0.6):Math.max(0,d.rain-10),rainMm:parseFloat((d.rainMm*0.4).toFixed(1)),windMph:Math.round(d.windMph*0.9),note:isRainy?"Possible showers":"Generally dry"},
    afternoon:{time:"12:00-18:00",temp:d.temp,condition:d.condition,rain:d.rain,rainMm:d.rainMm,windMph:d.windMph,note:d.note},
    evening:{time:"18:00-00:00",temp:Math.round(d.temp*0.75+d.low*0.25),condition:d.condition,rain:isRainy?Math.round(d.rain*0.7):Math.max(0,d.rain-15),rainMm:parseFloat((d.rainMm*0.5).toFixed(1)),windMph:Math.round(d.windMph*1.1),note:"Cooling down"}};
}

// ── Hourly builder ───────────────────────────────────────────────────────────
function buildHourly(forecastData,hourlyRaw,dayIndex){
  if(hourlyRaw&&hourlyRaw.times&&hourlyRaw.times.length>0){
    var seen={},dates=[];
    hourlyRaw.times.forEach(function(t){var d=t.split("T")[0];if(!seen[d]){seen[d]=true;dates.push(d);}});
    var target=dates[dayIndex];
    if(!target)return [];
    var hrs=[];
    hourlyRaw.times.forEach(function(t,i){
      if(t.split("T")[0]!==target)return;
      var h=parseInt(t.split("T")[1].split(":")[0]);
      var temp=Math.round((hourlyRaw.temps[i]||0)*10)/10;
      var code=hourlyRaw.codes[i]||0;
      var cloud=Math.round(hourlyRaw.cloud[i]||0);
      var rainMmHr=parseFloat((hourlyRaw.rainMm[i]||0).toFixed(1));
      var cond=condFromCode(code,Math.round(temp),cloud,rainMmHr);
      if((h<6||h>=21)&&(cond.includes("☀")||cond.includes("🌡")))cond="🌙";
      var mph=hourlyRaw.windMph[i]||0;
      var gust=hourlyRaw.gusts[i]||Math.round(mph*1.3);
      var hum=Math.round(hourlyRaw.humidity[i]||55);
      var pres=Math.round(hourlyRaw.pressure[i]||1013);
      var uv=Math.round(hourlyRaw.uv[i]||0);
      var rainC=Math.round(hourlyRaw.rain[i]||0);
      var dewp=hourlyRaw.dewpoint?Math.round(hourlyRaw.dewpoint[i]):Math.round(temp-((100-hum)/5));
      var vis=hourlyRaw.vis&&hourlyRaw.vis[i]!==null?(hourlyRaw.vis[i]>=20000?"Excellent (20km+)":hourlyRaw.vis[i]>=10000?"Good (10-20km)":hourlyRaw.vis[i]>=5000?"Moderate (5-10km)":"Poor (<5km)"):"Good";
      var dirs=["N","NE","NE","E","SE","SE","S","SW","SW","W","NW","NW"];
      var windDir=dirs[Math.floor((dayIndex*4+h/6))%12];
      var fl=Math.round(temp+condBonus(cond,temp,false)+humBonus(hum)+windBonus(mph));
      hrs.push({hour:h,timeStr:(h<10?"0":"")+h+":00",temp:temp,feelsLike:fl,condition:cond,windMph:mph,gustMph:gust,windDir:windDir,humidity:hum,dewPoint:dewp,pressure:pres,rainChance:rainC,rainMm:rainMmHr,uv:uv,cloud:cloud,visibility:vis});
    });
    return hrs;
  }
  // fallback generated
  var d=forecastData[dayIndex];
  if(!d)return [];
  var hrs=[];
  for(var h=0;h<24;h++){
    var prog=Math.sin(((h-15)/24)*Math.PI*2+Math.PI*0.5);
    prog=Math.max(0,Math.min(1,(prog+1)/2));
    var temp=Math.round((d.low+(d.temp-d.low)*Math.pow(prog,1.4))*10)/10;
    var isN=h<6||h>=21;
    var wf=h>=11&&h<=18?1.15:isN?0.75:1.0;
    var mph=Math.round(d.windMph*wf);
    var gust=Math.round(d.gustMph*wf);
    var hum=Math.min(99,Math.max(10,Math.round(d.humidity+(isN?12:h>=12&&h<=16?-10:0))));
    var rainC=d.rain;
    var rainMm=0;
    if(d.rainHours>0){var rp=d.condition.includes("⛈")?(h>=14&&h<=18):(h>=8&&h<=14);if(rp)rainC=Math.min(99,d.rain+20);rainMm=parseFloat((d.rainMm*(rp?0.12:0.02)).toFixed(1));}
    var pres=Math.round(d.pressure+(d.temp>28&&h>=12&&h<=16?-1:0));
    var cond=d.condition;
    if(isN)cond=d.condition.includes("⛈")||d.condition.includes("🌧")||d.condition.includes("💧")?"🌧️":"🌙";
    var sp=h>=6&&h<=20?(1-Math.abs((h-13)/7)):0;
    // FIX 4: improved UV max based on actual UV index data (use d.uvMax if available)
    var maxUv=d.uvMax!=null?d.uvMax:(d.temp>=40?12:d.temp>=35?10:d.temp>=30?9:d.temp>=25?7:d.temp>=20?5:4);
    var uv=cond.includes("☁")?Math.round(maxUv*0.3*sp):Math.round(maxUv*sp*sp);
    var cloud=cond.includes("☀")||cond.includes("🌡")?10:cond.includes("🌤")?30:cond.includes("⛅")?55:cond.includes("☁")?85:90;
    var vis=hum>80?"Poor (<5km)":hum>65?"Moderate (5-10km)":hum>45?"Good (10-20km)":"Excellent (20km+)";
    var dewp=Math.round(temp-((100-hum)/5));
    var dirs=["N","NE","NE","E","SE","SE","S","SW","SW","W","NW","NW"];
    var windDir=dirs[Math.floor((dayIndex*4+h/6))%12];
    var fl=Math.round(temp+condBonus(cond,temp,false)+humBonus(hum)+windBonus(mph));
    hrs.push({hour:h,timeStr:(h<10?"0":"")+h+":00",temp:temp,feelsLike:fl,condition:cond,windMph:mph,gustMph:gust,windDir:windDir,humidity:hum,dewPoint:dewp,pressure:pres,rainChance:Math.min(99,Math.round(rainC)),rainMm:rainMm,uv:uv,cloud:cloud,visibility:vis});
  }
  return hrs;
}
</script>

<script>

// ── Push Notification helpers ─────────────────────────────────────────────────
var VAPID_PUBLIC = ""; // optional: add your VAPID key here for push
function buildAlertList(forecastData, prefs){
  var thresholds = prefs || {tempHeat:30, rain:60, wind:25, uv:8, storm:true};
  var alerts = [];
  if(!forecastData||!forecastData.length) return alerts;
  forecastData.slice(0,7).forEach(function(d){
    if(thresholds.tempHeat && d.temp >= thresholds.tempHeat)
      alerts.push({icon:"🔥", level:d.temp>=35?"danger":"warn", title:(d.temp>=35?"Extreme Heat":"Hot Day")+" — "+d.date, body:"High of "+d.temp+"°C. "+(d.temp>=35?"Avoid midday sun.":"Apply sunscreen.")});
    if(thresholds.rain && d.rain >= thresholds.rain && d.rainMm >= 5)
      alerts.push({icon:"🌧️", level:d.rain>=80&&d.rainMm>=10?"danger":"warn", title:(d.rain>=80?"Heavy Rain Warning":"Rain Likely")+" — "+d.date, body:d.rainMm+"mm, "+d.rain+"% chance."+(d.rain>=80?" Possible flooding.":"")});
    if(thresholds.wind && d.windMph >= thresholds.wind)
      alerts.push({icon:"💨", level:d.windMph>=40?"danger":"warn", title:(d.windMph>=40?"Gale Warning":"Strong Wind")+" — "+d.date, body:"Winds "+d.windMph+"mph, gusts "+d.gustMph+"mph."});
    if(thresholds.storm && d.humidity>=50 && d.temp>=28 && d.condition.includes("⛈"))
      alerts.push({icon:"⛈️", level:"danger", title:"Storm Risk — "+d.date, body:"Thunderstorm conditions: "+d.temp+"°C, "+d.humidity+"% humidity."});
    if(thresholds.uv && d.uvMax!=null && d.uvMax >= thresholds.uv)
      alerts.push({icon:"🕶️", level:"warn", title:"Very High UV — "+d.date, body:"UV index "+d.uvMax+". Sun protection essential."});
  });
  return alerts;
}

async function requestPushPermission(){
  if(!("Notification" in window)) return "unsupported";
  if(Notification.permission === "granted") return "granted";
  var result = await Notification.requestPermission();
  return result;
}

function fireBrowserNotification(title, body, icon){
  if(Notification.permission !== "granted") return;
  try{ new Notification(title, {body:body, icon:icon||"/favicon.ico"}); }catch(e){}
}


// ── Meteorology Helpers ───────────────────────────────────────────────────────
function wetBulb(T, Td, P){
  // Stull (2011) approximation - accurate to 0.3°C
  var rh = 100 * Math.exp((17.625*Td/(243.04+Td)) - (17.625*T/(243.04+T)));
  return T * Math.atan(0.151977 * Math.pow(rh+8.313659, 0.5))
    + Math.atan(T+rh) - Math.atan(rh-1.676331)
    + 0.00391838 * Math.pow(rh, 1.5) * Math.atan(0.023101*rh) - 4.686035;
}

function liftedIndex(T500, Td850, T850){
  // Parcel lifted from 850hPa to 500hPa
  var Tparcel = T850 - 9.8 * ((850-500)/100); // dry adiabatic lapse
  return T500 - Tparcel;
}

function capeColour(v){ return v>=2500?"#ff1500":v>=1000?"#ff6600":v>=500?"#ffaa00":v>=250?"#ffcc00":v>0?"#aacc44":"#4a9fd4"; }
function cinColour(v){ var a=Math.abs(v); return a>=200?"#ff1500":a>=100?"#ff6600":a>=50?"#ffaa00":a>0?"#aacc44":"#4a9fd4"; }
function liColour(v){ return v<=-8?"#ff1500":v<=-6?"#ff4400":v<=-4?"#ff8800":v<=-2?"#ffcc00":v<=0?"#aacc44":"#4a9fd4"; }
function hColour(v){ return v>=450?"#ff1500":v>=300?"#ff6600":v>=150?"#ffaa00":v>0?"#ffdd88":"#4a9fd4"; }


// ── Construction Dashboard ────────────────────────────────────────────────────
var CONSTRUCTION_ACTIVITIES = [
  {
    id:"crane", icon:"🏗️", label:"Crane Operations",
    standard:"BS EN 13001 / LOLER",
    check:function(w){
      var wind=w.windMph, gust=w.gustMph, vis=w.vis, lightning=w.lightning;
      if(gust>=45) return{status:"stop",reason:"Gusts "+gust+"mph — immediate stop (limit: 45mph)",color:"#ff2200"};
      if(wind>=38) return{status:"stop",reason:"Wind "+wind+"mph exceeds operating limit (38mph)",color:"#ff2200"};
      if(lightning) return{status:"stop",reason:"Lightning risk — evacuate immediately",color:"#ff2200"};
      if(vis<200) return{status:"delay",reason:"Visibility "+vis+"m — below safe operating minimum",color:"#ff8800"};
      if(gust>=35) return{status:"caution",reason:"Gusts "+gust+"mph — approaching limit. Monitor closely",color:"#ffcc00"};
      if(wind>=28) return{status:"caution",reason:"Wind "+wind+"mph — reduced load capacity applies",color:"#ffcc00"};
      return{status:"go",reason:"Conditions within operating limits",color:"#44cc66"};
    }
  },
  {
    id:"concrete", icon:"🪨", label:"Concrete Pouring",
    standard:"CIRIA C660 / ACI 306",

}

// Approximate tidal prediction using simplified harmonic constituents
function getTides(lat,lon,date){
  // Simplified M2 + S2 tidal constituents approximation
  var d=new Date(date);
  var jd=(d.getTime()/86400000)+2440587.5;
  var T=(jd-2451545.0)/36525;
  var M2period=12.4206; // hours
  var S2period=12.0;
  // Phase varies by longitude (crude approximation)
  var phase=(lon/360)*24;
  var times=[];
  for(var h=0;h<25;h+=0.5){
    var M2=Math.cos(2*Math.PI*(h-phase)/M2period);
    var S2=Math.cos(2*Math.PI*(h-phase)/S2period)*0.3;
    var height=((M2+S2+1)/2).toFixed(2);
    times.push({hour:h,height:parseFloat(height)});
  }
  // Find highs and lows
  var extremes=[];
  for(var i=1;i<times.length-1;i++){
    var prev=times[i-1].height,curr=times[i].height,next=times[i+1].height;
    if(curr>prev&&curr>next) extremes.push({type:"High",hour:times[i].hour,height:curr});
    if(curr<prev&&curr<next) extremes.push({type:"Low", hour:times[i].hour,height:curr});
  }
  return extremes.slice(0,4);
}

function fmtHour(h){
  var hh=Math.floor(h);var mm=Math.round((h-hh)*60);
  return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0");
}

// Growing Degree Days base temperatures by farm type
var GDD_BASE = {arable:0, livestock:5, horticulture:5, mixed:0};

function calcGDD(tMax, tMin, base){
  var avg = (tMax + tMin) / 2;
  return Math.max(0, avg - base);
}

// Penman-Monteith simplified ET0 estimate (mm/day)
function calcET0(tMax, tMin, windMph, humidity, solarProxy){
  var tMean = (tMax + tMin) / 2;
  var windMs = windMph * 0.44704;
  var es = 0.6108 * Math.exp(17.27 * tMean / (tMean + 237.3));
  var ea = es * humidity / 100;
  var vpd = es - ea;
  var et0 = (0.0023 * solarProxy * (tMean + 17.8) * Math.sqrt(tMax - tMin)) + (0.00094 * windMs * vpd * 100);
  return Math.max(0, +et0.toFixed(1));
}

// Smith Period blight risk (temp 10-25°C, RH>90% for 2+ days)
function blightRisk(days){
  var risk = 0;
  days.slice(0,3).forEach(function(d){
    if(d.temp >= 10 && d.temp <= 25 && d.humidity >= 75) risk++;
    if(d.temp >= 10 && d.temp <= 25 && d.humidity >= 90) risk += 2;
  });
  if(risk >= 4) return {level:"High", color:"#ff2200", desc:"Smith Period criteria met — blight likely"};
  if(risk >= 2) return {level:"Moderate", color:"#ff8800", desc:"Favourable conditions developing — monitor"};
  return {level:"Low", color:"#44cc66", desc:"Blight risk low — conditions unfavourable"};
}

// Hutton Criteria (late blight): 2 consecutive days min≥10°C, RH≥90% for 6hrs
function huttonRisk(days){
  var hits = 0;
  days.slice(0,2).forEach(function(d){
    if(d.low >= 10 && d.humidity >= 85) hits++;
  });
  if(hits >= 2) return {level:"Hutton Warning", color:"#ff2200", desc:"Two consecutive Hutton days — fungicide application advised"};
  if(hits >= 1) return {level:"Watch", color:"#ffaa00", desc:"One Hutton day — watch for second consecutive day"};
  return {level:"Clear", color:"#44cc66", desc:"Hutton criteria not met"};
}

// Spray window assessment
function sprayWindow(d){
  if(d.rain >= 50 || d.rainMm >= 3)  return {status:"stop",   color:"#ff2200", reason:"Rain forecast — spray washoff risk"};
  if(d.windMph >= 15)                 return {status:"stop",   color:"#ff2200", reason:"Wind "+d.windMph+"mph — above 13mph spray limit (PPPR)"};
  if(d.temp <= 2)                     return {status:"stop",   color:"#ff2200", reason:"Temp "+d.temp.toFixed(1)+"°C — below minimum efficacy threshold"};
  if(d.temp >= 25 && d.humidity < 40) return {status:"delay",  color:"#ff8800", reason:"Hot & dry — rapid evaporation, leaf scorch risk"};
  if(d.windMph >= 10)                 return {status:"caution",color:"#ffcc00", reason:"Wind "+d.windMph+"mph — drift risk, use low-drift nozzles"};
  if(d.humidity >= 90)                return {status:"caution",color:"#ffcc00", reason:"High humidity "+d.humidity+"% — poor drying, disease spread risk"};
  if(d.temp < 6)                      return {status:"caution",color:"#ffcc00", reason:"Cool temp — reduced herbicide uptake"};
  return {status:"go", color:"#44cc66", reason:"Good spray window — conditions within PPPR guidelines"};
}

// Field access / trafficking
function fieldAccess(d){
  if(d.rainMm >= 15) return {status:"stop",    color:"#ff2200", reason:"Heavy rain "+d.rainMm+"mm — waterlogging and compaction risk"};
  if(d.rainMm >= 5)  return {status:"delay",   color:"#ff8800", reason:"Significant rain "+d.rainMm+"mm — soil likely saturated"};
  if(d.temp <= -2)   return {status:"caution", color:"#ffcc00", reason:"Frozen ground — check soil before trafficking"};
  if(d.rain >= 70)   return {status:"caution", color:"#ffcc00", reason:d.rain+"% rain probability — delay if possible"};
  return {status:"go", color:"#44cc66", reason:"Field conditions likely suitable for machinery"};
}

// Harvest window
function harvestWindow(d){
  if(d.rainMm >= 2 || d.rain >= 60) return {status:"stop",    color:"#ff2200", reason:"Rain risk — harvesting not possible"};
  if(d.humidity >= 80)               return {status:"delay",   color:"#ff8800", reason:"Humidity "+d.humidity+"% — grain/crop drying conditions poor"};
  if(d.windMph >= 30)                return {status:"delay",   color:"#ff8800", reason:"Wind "+d.windMph+"mph — combine/picker operation unsafe"};
  if(d.humidity >= 70)               return {status:"caution", color:"#ffcc00", reason:"Moderate humidity — monitor grain moisture closely"};
  return {status:"go", color:"#44cc66", reason:"Good harvest window — dry conditions favourable"};
}

// Irrigation need
function irrigationNeed(et0, rainMm, temp){
  var deficit = Math.max(0, et0 - rainMm);
  if(deficit >= 4 || temp >= 28)  return {level:"High",     color:"#ff6600", mm:Math.ceil(deficit+2), desc:"Significant soil moisture deficit — irrigate"};
  if(deficit >= 2)                 return {level:"Moderate", color:"#ffaa00", mm:Math.ceil(deficit),   desc:"Moderate deficit developing — consider irrigating"};
  if(deficit >= 0.5)               return {level:"Low",      color:"#ffdd88", mm:1,                    desc:"Minor deficit — monitor soil moisture"};
  return {level:"None", color:"#44cc66", mm:0, desc:"Rainfall sufficient — no irrigation needed"};
}

// Grazing suitability
function grazingSuitable(d){
  if(d.rainMm >= 10) return {status:"stop",    color:"#ff2200", reason:"Wet conditions — poaching risk, rest fields"};
  if(d.temp <= -3)   return {status:"stop",    color:"#ff2200", reason:"Frozen ground — livestock welfare risk"};
  if(d.windMph >= 35)return {status:"delay",   color:"#ff8800", reason:"Strong winds — animal welfare concern"};
  if(d.rainMm >= 4)  return {status:"caution", color:"#ffcc00", reason:"Wet — monitor ground conditions, rotate fields"};
  if(d.temp <= 0)    return {status:"caution", color:"#ffcc00", reason:"Near freezing — check water supply and shelter"};
  return {status:"go", color:"#44cc66", reason:"Suitable grazing conditions"};
}

// Soil temp estimate (surface soil lags air by ~2°C, slower to change)
function soilTemp(airTemp, low){
  return +((airTemp * 0.6 + low * 0.4) - 1.5).toFixed(1);
}

// Drilling suitability based on soil temp
function drillingWindow(soilT, d){
  if(d.rainMm >= 8)  return {status:"stop",    color:"#ff2200", reason:"Too wet — soil structure damage risk"};
  if(soilT < 3)      return {status:"stop",    color:"#ff2200", reason:"Soil temp "+soilT+"°C — below germination threshold for most crops"};
  if(soilT < 5)      return {status:"delay",   color:"#ff8800", reason:"Soil temp "+soilT+"°C — marginal for autumn drilling, check soil type"};
  if(d.rainMm >= 4)  return {status:"delay",   color:"#ff8800", reason:"Wet conditions — wait for soil to dry"};
  if(soilT >= 5 && soilT < 7) return {status:"caution",color:"#ffcc00",reason:"Soil temp "+soilT+"°C — suitable but cool, use treated seed"};
  return {status:"go", color:"#44cc66", reason:"Soil temp "+soilT+"°C — good drilling conditions"};
}

// Moon phase calculation (0=new, 0.5=full, 1=new again)
function moonPhase(date) {
  var d = new Date(date);
  var lp = 2551443; // lunar period in seconds
  var newMoon = new Date(2000, 0, 6, 18, 14); // reference new moon
  var phase = ((d - newMoon) / 1000) % lp;
  if(phase < 0) phase += lp;
  return phase / lp;
}

function moonPhaseName(phase) {
  if(phase < 0.03 || phase > 0.97) return {name:"New Moon",     icon:"🌑", solunar:"Major"};
  if(phase < 0.22)                  return {name:"Waxing Crescent",icon:"🌒",solunar:"Minor"};
  if(phase < 0.28)                  return {name:"First Quarter", icon:"🌓",solunar:"Major"};
  if(phase < 0.47)                  return {name:"Waxing Gibbous",icon:"🌔",solunar:"Minor"};
  if(phase < 0.53)                  return {name:"Full Moon",     icon:"🌕",solunar:"Major"};
  if(phase < 0.72)                  return {name:"Waning Gibbous",icon:"🌖",solunar:"Minor"};
  if(phase < 0.78)                  return {name:"Last Quarter",  icon:"🌗",solunar:"Major"};
  return                                    {name:"Waning Crescent",icon:"🌘",solunar:"Minor"};
}

// Solunar feeding periods (approx based on moon transit)
function solunarTimes(date, lat, lon) {
  var phase = moonPhase(date);
  // Moon transit time approximation
  var moonHour = (phase * 24 + lon/15) % 24;
  var major1 = moonHour % 24;
  var major2 = (moonHour + 12) % 24;
  var minor1 = (moonHour + 6) % 24;
  var minor2 = (moonHour + 18) % 24;
  function fmt(h) {
    var hh = Math.floor(h), mm = Math.round((h-hh)*60);
    if(mm >= 60){hh++;mm=0;}
    return String(hh%24).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  }
  return [
    {type:"Major", time:fmt(major1), duration:"2 hrs", icon:"⭐⭐"},
    {type:"Minor", time:fmt(minor1), duration:"1 hr",  icon:"⭐"},
    {type:"Major", time:fmt(major2), duration:"2 hrs", icon:"⭐⭐"},
    {type:"Minor", time:fmt(minor2), duration:"1 hr",  icon:"⭐"},
  ].sort(function(a,b){ return a.time.localeCompare(b.time); });
}

// Barometric trend from forecast data
function pressureTrend(days) {
  if(!days || days.length < 2) return {trend:"unknown", color:"#888"};
  var p0 = days[0].pressure || 1013;
  var p1 = days[1].pressure || 1013;
  var diff = p1 - p0;
  if(diff > 2)  return {trend:"rising",  change:"+"+diff.toFixed(0)+"mb", color:"#44cc66", fish:"Good — rising pressure stimulates feeding"};
  if(diff < -2) return {trend:"falling", change:diff.toFixed(0)+"mb",     color:"#ff8800", fish:"Brief flurry then slow — fish sense incoming front"};
  return         {trend:"stable",  change:"±"+Math.abs(diff).toFixed(0)+"mb", color:"#4a9fd4", fish:"Stable pressure — consistent feeding patterns"};
}

// Water temperature estimate (air - offset by water type and season)
function waterTemp(airTemp, waterType) {
  var month = new Date().getMonth();
  var seasonal = month >= 3 && month <= 8 ? 0 : -3; // summer vs winter offset
  var offset = waterType === "sea" ? -2 : -1.5;
  return +(airTemp + offset + seasonal).toFixed(1);
}

// River condition assessment
function riverCondition(rainMm, rain3day) {
  var total = rainMm + (rain3day || 0);
  if(total >= 20) return {status:"Flood Risk",  color:"#ff2200", clarity:"Very coloured — near unfishable", flow:"High"};
  if(total >= 10) return {status:"Coloured",    color:"#ff8800", clarity:"Coloured — fish close to bank", flow:"Medium-high"};
  if(total >= 4)  return {status:"Fining Down", color:"#ffcc00", clarity:"Slightly coloured — often productive", flow:"Medium"};
  return           {status:"Clear",       color:"#44cc66", clarity:"Clear — fish spooky, use lighter tackle", flow:"Normal"};
}

// Species rating for conditions
function speciesRating(fish, waterT, pressureTrendVal, day) {
  var score = 5;
  // Temperature score
  if(waterT >= fish.tempMin && waterT <= fish.tempMax) score += 2;
  else if(waterT < fish.tempMin - 4 || waterT > fish.tempMax + 4) score -= 3;
  else score -= 1;
  // Pressure score
  if(pressureTrendVal === fish.pressurePref) score += 2;
  else if(pressureTrendVal === "falling" && fish.pressurePref !== "falling") score -= 1;
  // Wind score
  if(day.windMph <= 10) score += 1;
  else if(day.windMph >= 25) score -= 2;
  // Overcast bonus for many species
  if(day.humidity >= 70 && day.rain < 30) score += 1;
  return Math.max(1, Math.min(10, score));
}

function ratingColor(r) {
  return r >= 8 ? "#44cc66" : r >= 6 ? "#88cc44" : r >= 4 ? "#ffcc00" : r >= 2 ? "#ff8800" : "#ff4400";
}

function ratingLabel(r) {
  return r >= 8 ? "Excellent" : r >= 6 ? "Good" : r >= 4 ? "Fair" : r >= 2 ? "Poor" : "Very Poor";
}

var SKI_SPORTS = [
  {id:"downhill",   icon:"⛷️",  label:"Downhill / Piste",   windMax:45, visMin:100, desc:"Groomed piste skiing"},
  {id:"snowboard",  icon:"🏂",  label:"Snowboarding",        windMax:45, visMin:100, desc:"Piste & park riding"},
  {id:"nordic",     icon:"🎿",  label:"Cross-Country",       windMax:35, visMin:200, desc:"Nordic / groomed trails"},
  {id:"backcountry",icon:"🏔️", label:"Backcountry / Off-Piste",windMax:30,visMin:300,desc:"Ungroomed, avalanche terrain"},
];

// Wind chill formula (°C, mph)
function windChill(tempC, windMph) {
  if(tempC > 10 || windMph < 3) return tempC;
  var v = windMph * 1.60934; // to km/h
  return +(13.12 + 0.6215*tempC - 11.37*Math.pow(v,0.16) + 0.3965*tempC*Math.pow(v,0.16)).toFixed(1);
}

// Frostbite risk from wind chill
function frostbiteRisk(wc) {
  if(wc <= -35) return {level:"Extreme",   color:"#ff0000", time:"< 5 min exposed skin", icon:"❄️❄️❄️"};
  if(wc <= -25) return {level:"High",      color:"#ff4400", time:"10–30 min",             icon:"❄️❄️"};
  if(wc <= -15) return {level:"Moderate",  color:"#ff8800", time:"30–60 min",             icon:"❄️"};
  if(wc <= -5)  return {level:"Low",       color:"#ffcc00", time:"Several hours",         icon:"🥶"};
  return              {level:"Minimal",   color:"#44cc66", time:"No significant risk",   icon:"✓"};
}

// Avalanche risk (simplified EAWS scale 1-5)
function avalancheRisk(day, prev) {
  var score = 1;
  // New snowfall
  if(day.rainMm >= 20) score += 3;
  else if(day.rainMm >= 10) score += 2;
  else if(day.rainMm >= 5) score += 1;
  // Wind loading
  if(day.windMph >= 35) score += 2;
  else if(day.windMph >= 20) score += 1;
  // Rapid warming
  if(prev && day.temp - prev.temp > 5) score += 1;
  // Temp near zero (wet snow)
  if(day.temp >= -2 && day.temp <= 2) score += 1;
  score = Math.min(5, Math.max(1, score));
  var levels = [
    null,
    {n:1, label:"Low",      color:"#44cc66", desc:"Generally safe conditions. Normal caution."},
    {n:2, label:"Limited",  color:"#aacc22", desc:"Heightened avalanche conditions on steep slopes."},
    {n:3, label:"Considerable",color:"#ffcc00",desc:"Dangerous conditions. Careful route assessment required."},
    {n:4, label:"High",     color:"#ff8800", desc:"Very dangerous. Avoid avalanche terrain."},
    {n:5, label:"Very High",color:"#ff2200", desc:"Extraordinary situation. Avoid all open slopes."},
  ];
  return levels[score];
}

// Piste condition from temp + recent snow
function pisteCondition(temp, rainMm, windMph) {
  if(temp > 3 && rainMm > 2)  return {cond:"Slushy",     color:"#ff8800", icon:"💧", desc:"Wet heavy snow — hard work, slow edges"};
  if(temp > 3)                return {cond:"Spring Snow", color:"#ffcc00", icon:"🌤", desc:"Afternoon softening — best in the morning"};
  if(rainMm >= 10)            return {cond:"Powder",      color:"#88ddff", icon:"❄️",desc:"Fresh snow — excellent off-piste, variable piste"};
  if(rainMm >= 3)             return {cond:"Packed Powder",color:"#4a9fd4",icon:"⛷️",desc:"Good all-round conditions"};
  if(temp < -10 && windMph > 20) return {cond:"Wind-Packed",color:"#ffaa00",icon:"💨",desc:"Hard wind slab — beware icy patches"};
  if(temp < -5)               return {cond:"Hard Pack",   color:"#ffcc44", icon:"🧊", desc:"Firm surface — sharp edges needed"};
  return                             {cond:"Groomed",     color:"#44cc66", icon:"✅", desc:"Well groomed, good grip"};
}

// Lift operational assessment (FIS/European standard)
function liftAssessment(windMph, gustMph, vis, temp) {
  var wc = windChill(temp, windMph);
  if(gustMph >= 55) return {status:"Closed",  color:"#ff2200", reason:"Gusts "+gustMph+"mph — above emergency closure threshold (55mph)"};
  if(windMph >= 45) return {status:"Closed",  color:"#ff2200", reason:"Wind "+windMph+"mph — exceeds lift operational limit (45mph)"};
  if(vis < 50)      return {status:"Closed",  color:"#ff2200", reason:"Visibility "+vis+"m — white-out conditions"};
  if(gustMph >= 40) return {status:"Reduced", color:"#ff8800", reason:"Gusts "+gustMph+"mph — high-speed lifts may close"};
  if(windMph >= 35) return {status:"Reduced", color:"#ff8800", reason:"Strong winds — gondolas and chairs may be limited"};
  if(vis < 150)     return {status:"Reduced", color:"#ff8800", reason:"Poor visibility "+vis+"m — runs may be closed"};
  if(wc <= -25)     return {status:"Caution", color:"#ffcc00", reason:"Extreme wind chill "+wc+"°C — limit exposure time"};
  return                   {status:"Open",    color:"#44cc66", reason:"Conditions within operational parameters"};
}

// Visibility proxy from humidity + condition
function visibilityEst(day) {
  if(day.condition && (day.condition.includes("🌫") || day.humidity >= 95)) return 50;
  if(day.rain >= 80 || day.humidity >= 90) return 150;
  if(day.rain >= 50 || day.humidity >= 80) return 400;
  return 1000;
}

// UV at altitude (increases ~10% per 1000m)
function altitudeUV(uvBase, altM) {
  var alt = altM || 1500; // default ski resort altitude
  return +(uvBase * (1 + alt/10000)).toFixed(1);
}

// Freeze-thaw risk
function freezeThaw(tempMax, tempMin) {
  if(tempMax > 0 && tempMin < 0) return {risk:"High",   color:"#ff8800", desc:"Thaw/refreeze overnight — black ice morning"};
  if(tempMax > 2 && tempMin < 2) return {risk:"Moderate",color:"#ffcc00",desc:"Possible freeze-thaw — check morning conditions"};
  return                                {risk:"Low",    color:"#44cc66", desc:"No significant freeze-thaw cycle"};
}

var SKI_SPORTS = [
  {id:"downhill",  icon:"⛷️",  label:"Downhill / Piste",   windLimit:50, desc:"Groomed runs, lifts"},
  {id:"snowboard", icon:"🏂",  label:"Snowboarding",        windLimit:55, desc:"Piste & park riding"},
  {id:"nordic",    icon:"🎿",  label:"Cross-Country",       windLimit:40, desc:"Nordic & groomed trails"},
  {id:"backcountry",icon:"🏔️",label:"Backcountry / Off-Piste",windLimit:35,desc:"Ungroomed terrain"},
];

// Wind chill calculation (°C)
function windChill(tempC, windMph) {
  var windKph = windMph * 1.60934;
  if(tempC > 10 || windKph < 4.8) return tempC;
  return +(13.12 + 0.6215*tempC - 11.37*Math.pow(windKph,0.16) + 0.3965*tempC*Math.pow(windKph,0.16)).toFixed(1);
}

// Frostbite risk time estimate
function frostbiteRisk(wc) {
  if(wc > -10)  return {level:"Low",       color:"#44cc66", time:"No risk",        desc:"No frostbite risk"};
  if(wc > -20)  return {level:"Moderate",  color:"#ffcc00", time:"30+ min",        desc:"Exposed skin at risk after 30 minutes"};
  if(wc > -27)  return {level:"High",      color:"#ff8800", time:"10–30 min",      desc:"Frostbite possible in 10–30 minutes"};
  if(wc > -35)  return {level:"Very High", color:"#ff4400", time:"5–10 min",       desc:"Frostbite likely within 10 minutes"};
  return         {level:"Extreme",         color:"#ff0000", time:"Under 2 min",    desc:"Frostbite in minutes — cover all skin"};
}

// Avalanche risk (European Danger Scale 1-5)
function avalancheRisk(newSnowCm, windMph, tempC, low) {
  var score = 0;
  // New snow loading
  if(newSnowCm >= 30) score += 3;
  else if(newSnowCm >= 20) score += 2;
  else if(newSnowCm >= 10) score += 1;
  // Wind slab formation
  if(windMph >= 30) score += 2;
  else if(windMph >= 20) score += 1;
  // Temperature inversion / weak layer
  if(tempC > 0) score += 1; // warm temps weaken snowpack
  if(low < -15) score += 1; // very cold = faceting
  var level = Math.min(5, Math.max(1, score));
  var labels = ["","Low","Limited","Considerable","High","Very High"];
  var colors = ["","#44cc66","#ffdd00","#ff8800","#ff4400","#cc0000"];
  var descs = [
    "",
    "Natural avalanches unlikely. Safe on most terrain.",
    "Natural avalanches unlikely. Human triggering possible on steep terrain.",
    "Natural avalanches possible. Human triggering likely on steep slopes. Reduce exposure.",
    "Natural and human-triggered avalanches likely. Avoid avalanche terrain.",
    "Widespread natural avalanches expected. Stay off all avalanche terrain."
  ];
  return {level:level, label:labels[level], color:colors[level], desc:descs[level]};
}

// Piste condition from temp + recent snow + freeze-thaw
function pisteCondition(tempC, low, newSnowCm, windMph, humidity) {
  var freezeThaw = low < 0 && tempC > 1;
  if(newSnowCm >= 15) return {type:"Powder",        icon:"❄️", color:"#88ccff", desc:"Fresh powder — excellent conditions. Watch for variable depth."};
  if(newSnowCm >= 5)  return {type:"Fresh Snow",    icon:"🌨️", color:"#aaddff", desc:"Good cover of fresh snow. Grooming overnight will improve."};
  if(tempC >= 2 && humidity >= 70) return {type:"Spring Snow", icon:"🌤️",color:"#ffdd88",desc:"Wet, heavy spring snow. Best morning skiing before softening."};
  if(freezeThaw && tempC < 0) return {type:"Hard Pack",    icon:"🧊", color:"#88aaff", desc:"Frozen overnight refreeze. Firm and fast — edges critical."};
  if(freezeThaw && tempC >= 0) return {type:"Icy Patches", icon:"⚠️",color:"#ff8800",desc:"Freeze-thaw creating icy patches. Extra caution on shaded runs."};
  if(tempC < -5) return {type:"Packed Powder",icon:"⛷️",color:"#aaffcc",desc:"Cold packed powder. Good all-round conditions."};
  if(tempC > 5)  return {type:"Slushy",       icon:"💧",color:"#ffaa44",desc:"Warm and slushy. Ski early morning for best conditions."};
  return          {type:"Groomed",         icon:"✅",color:"#44cc66",desc:"Good groomed piste. Standard conditions."};
}

// Ski lift wind threshold (FIS / EN 12385 guidelines)
function liftStatus(windMph, gustMph, vis, tempC) {
  if(gustMph >= 65) return {status:"Closed",  color:"#ff2200", reason:"Gusts "+gustMph+"mph — all lifts closed (limit: 65mph)"};
  if(windMph >= 50) return {status:"Closed",  color:"#ff2200", reason:"Wind "+windMph+"mph — above FIS operational limit"};
  if(vis < 50)      return {status:"Closed",  color:"#ff2200", reason:"Visibility below 50m — white-out conditions"};
  if(gustMph >= 45) return {status:"At Risk", color:"#ff8800", reason:"Gusts "+gustMph+"mph — lifts may close. Check with resort."};
  if(windMph >= 35) return {status:"Reduced", color:"#ffcc00", reason:"Wind "+windMph+"mph — upper lifts may be suspended"};
  if(tempC < -25)   return {status:"Reduced", color:"#ffcc00", reason:"Extreme cold ("+tempC+"°C) — some lifts may limit operation"};
  return             {status:"Open",    color:"#44cc66", reason:"Conditions within lift operational parameters"};
}

// Visibility / white-out risk
function visibilityRisk(humidity, rain, windMph, tempC) {
  if(rain >= 60 && tempC < 0) return {level:"White-Out Risk",  color:"#ff4400", vis:"Under 50m",  desc:"Heavy snowfall with wind — navigation very difficult"};
  if(windMph >= 35 && tempC < -5) return {level:"Blowing Snow", color:"#ff8800", vis:"50–200m",   desc:"Wind-driven snow reducing visibility significantly"};
  if(humidity >= 95 && tempC <= 0) return {level:"Fog / Cloud",  color:"#ffcc00", vis:"100–500m",  desc:"Low cloud or freezing fog on upper mountain"};
  if(rain >= 40 && tempC < 0)      return {level:"Snow Showers", color:"#ffdd88", vis:"500m+",     desc:"Snow showers reducing visibility intermittently"};
  return                              {level:"Good",         color:"#44cc66", vis:"Clear",    desc:"Good visibility — no significant restrictions"};
}

// UV at altitude (increases ~4% per 300m — estimate 1500m resort altitude)
function altitudeUV(uvBase, altitudeM) {
  var extra = Math.floor((altitudeM||1500)/300) * 0.04;
  return +(uvBase * (1 + extra)).toFixed(1);
}

// Hourly ski window assessment
function skiWindowRating(windMph, tempC, vis, snow, sport) {
  var sp = SKI_SPORTS.find(function(s){return s.id===sport;})||SKI_SPORTS[0];
  var score = 8;
  if(windMph >= sp.windLimit) return {score:0, status:"stop",   color:"#ff2200"};
  if(windMph >= sp.windLimit*0.75) score -= 3;
  else if(windMph >= sp.windLimit*0.5) score -= 1;
  if(vis==="White-Out Risk") score -= 4;
  else if(vis==="Blowing Snow") score -= 2;
  if(tempC < -20) score -= 2;
  else if(tempC < -15) score -= 1;
  else if(tempC > 5) score -= 1;
  if(snow==="Powder" || snow==="Fresh Snow") score += 1;
  if(snow==="Icy Patches" || snow==="Slushy") score -= 1;
  score = Math.max(0, Math.min(10, score));
  var status = score >= 7 ? "go" : score >= 4 ? "caution" : "stop";
  var color  = score >= 7 ? "#44cc66" : score >= 4 ? "#ffcc00" : "#ff4400";
  return {score:score, status:status, color:color};
}

      SKI_SPORTS.map(function(s){
        var on=iSport===s.id;
        return e("button",{key:s.id,onClick:function(){setSport(s.id);},style:{padding:"5px 10px",borderRadius:10,border:"1px solid",borderColor:on?"#88ccff":"rgba(255,255,255,0.1)",background:on?"rgba(136,200,255,0.15)":"rgba(255,255,255,0.03)",color:on?"#aaddff":"#666",fontSize:11,cursor:"pointer"}},s.icon+" "+s.label);
      })
    ),

    // Altitude input
    e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:14,fontSize:11,color:"#666"}},
      e("span",null,"Resort altitude (m):"),
      e("input",{type:"range",min:500,max:4000,step:100,value:iAlt,onChange:function(ev){setAlt(parseInt(ev.target.value));},style:{flex:1,accentColor:"#88ccff"}}),
      e("span",{style:{color:"#aaddff",minWidth:45}},iAlt+"m")
    ),

    // Day selector
    e("div",{style:{display:"flex",gap:4,marginBottom:14,overflowX:"auto",paddingBottom:4}},
      days.slice(0,7).map(function(d,i){
        var dnsc = d.rainMm*(d.temp<=0?8:0);
        var dwr  = skiWindowRating(d.windMph,d.temp,visibilityRisk(d.humidity,d.rain,d.windMph,d.temp).level,pisteCondition(d.temp,d.low,dnsc,d.windMph,d.humidity).type,iSport);
        var on   = iDayIdx===i;
        return e("button",{key:i,onClick:function(){setDayIdx(i);},style:{flex:"0 0 auto",padding:"6px 10px",borderRadius:10,border:"1px solid",borderColor:on?dwr.color:"rgba(255,255,255,0.08)",background:on?"rgba(255,255,255,0.07)":"transparent",color:on?"#e8dcc8":"#666",fontSize:11,cursor:"pointer",minWidth:52,textAlign:"center"}},
          e("div",{style:{fontSize:9,color:dwr.color,marginBottom:2}},"●"),
          e("div",null,d.date.split(" ")[0])
        );
      })
    ),

    // Tabs
    e("div",{style:{display:"flex",gap:0,borderBottom:"1px solid rgba(255,255,255,0.07)",marginBottom:14,overflowX:"auto"}},
      tabs.map(function(t){
        var on=iTab===t.id;
        return e("button",{key:t.id,onClick:function(){setTab(t.id);},style:{padding:"7px 12px",background:"none",border:"none",borderBottom:on?"2px solid #88ccff":"2px solid transparent",color:on?"#aaddff":"#555",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}},t.label);
      })
    ),

    // ── Summary Tab ──
    iTab==="summary" && e("div",null,
      // Piste condition hero card
      e("div",{style:{background:piste.color+"18",border:"1px solid "+piste.color+"44",borderRadius:14,padding:"14px 16px",marginBottom:12}},
        e("div",{style:{display:"flex",alignItems:"center",gap:12}},
          e("span",{style:{fontSize:32}},piste.icon),
          e("div",{style:{flex:1}},
            e("div",{style:{fontSize:16,color:piste.color,fontWeight:"bold",marginBottom:2}},piste.type),
            e("div",{style:{fontSize:11,color:"#9a8c7a"}},piste.desc)
          ),
          e("div",{style:{textAlign:"right"}},
            e("div",{style:{fontSize:22,fontWeight:"bold",color:overallWR.color}},overallWR.score),
            e("div",{style:{fontSize:10,color:"#666"}},"/10 "+sp.label)
          )
        )
      ),

      // Key conditions grid
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
        [
          {icon:"🌡️",label:"Air Temp",val:cvtT(day.temp)+tUnit(),color:day.temp<-15?"#cc88ff":day.temp<-5?"#88ccff":day.temp>2?"#ffaa44":"#aaddff",sub:"Feels like: "+cvtT(wc)+tUnit()},
          {icon:"💨",label:"Wind",val:day.windMph+"mph",color:day.windMph>=sp.windLimit?"#ff2200":day.windMph>=sp.windLimit*0.7?"#ff8800":"#aaddff",sub:"Gusts: "+day.gustMph+"mph"},
          {icon:"❄️",label:"New Snow Est.",val:newSnowCm>0?newSnowCm.toFixed(0)+"cm":"None",color:newSnowCm>=15?"#88ccff":newSnowCm>=5?"#aaddff":"#666",sub:newSnowCm>0?"Fresh snow":"No precipitation"},
          {icon:"👁️",label:"Visibility",val:vis.level,color:vis.color,sub:vis.vis},
          {icon:"☀️",label:"UV (Altitude)",val:uvAlt+"",color:uvAlt>=8?"#ff6600":uvAlt>=6?"#ffaa00":"#88cc44",sub:"At "+iAlt+"m — use SPF50"},
          {icon:"🌡️",label:"Freeze-Thaw",val:freezeThaw?"Active":"None",color:freezeThaw?"#ff8800":"#44cc66",sub:freezeThaw?"Icy patches likely overnight":"Stable snowpack"},
        ].map(function(c,i){
          return e("div",{key:i,style:{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 11px",border:"1px solid rgba(255,255,255,0.06)"}},
            e("div",{style:{fontSize:10,color:"#555",marginBottom:3}},c.icon+" "+c.label),
            e("div",{style:{fontSize:13,color:c.color,fontWeight:"bold"}},c.val),
            c.sub&&e("div",{style:{fontSize:10,color:"#666",marginTop:1}},c.sub)
          );
        })
      ),

      // Activity cards
      e("div",{style:{fontSize:10,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:8}},"Activity Assessment"),
      [
        {icon:"🚡",label:"Ski Lifts",result:{status:lift.status==="Open"?"go":lift.status==="Reduced"?"caution":"stop",color:lift.color,reason:lift.reason}},
        {icon:"⛷️",label:"On-Piste "+sp.label,result:{status:overallWR.status,color:overallWR.color,reason:piste.desc+" Wind: "+day.windMph+"mph (limit "+sp.windLimit+"mph)"}},
        {icon:"⛰️",label:"Backcountry / Off-Piste",result:{status:avRisk.level>=3?"stop":avRisk.level>=2?"caution":"go",color:avRisk.color,reason:"Avalanche danger: "+avRisk.label+" — "+avRisk.desc}},
        {icon:"🧊",label:"Frostbite Risk",result:{status:fbRisk.level==="Low"?"go":fbRisk.level==="Moderate"?"caution":"stop",color:fbRisk.color,reason:fbRisk.desc+" (Wind chill: "+cvtT(wc)+tUnit()+")"}},
      ].map(function(card,i){
        return e("div",{key:i,style:{padding:"10px 14px",borderRadius:10,border:"1px solid "+card.result.color+"44",borderLeft:"3px solid "+card.result.color,background:card.result.color+"08",marginBottom:6}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("span",{style:{fontSize:18}},card.icon),
            e("div",{style:{flex:1}},
              e("div",{style:{fontSize:12,color:"#e8dcc8",fontWeight:"bold"}},card.label),
              e("div",{style:{fontSize:10,color:card.result.color,marginTop:2}},card.result.reason)
            ),
            e("span",{style:{fontSize:11,padding:"2px 10px",borderRadius:12,border:"1px solid "+card.result.color,color:card.result.color}},card.result.status.toUpperCase())
          )
        );
      })
    ),

    // ── Safety Tab ──
    iTab==="safety" && e("div",null,
      // Avalanche
      e("div",{style:{padding:"14px",borderRadius:12,background:avRisk.color+"15",border:"1px solid "+avRisk.color+"44",marginBottom:10}},
        e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:8}},
          e("span",{style:{fontSize:28}},"⛰️"),
          e("div",{style:{flex:1}},
            e("div",{style:{fontSize:14,color:avRisk.color,fontWeight:"bold"}},"Avalanche Danger: "+avRisk.label+" (Level "+avRisk.level+"/5)"),
            e("div",{style:{fontSize:11,color:"#9a8c7a",marginTop:2}},avRisk.desc)
          )
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:10,color:"#666"}},
          e("div",null,"New snow: "+(newSnowCm>0?newSnowCm.toFixed(0)+"cm":"None")),
          e("div",null,"Wind: "+day.windMph+"mph"),
          e("div",null,"Temp: "+cvtT(day.temp)+tUnit())
        ),
        avRisk.level >= 3 && e("div",{style:{marginTop:8,padding:"8px 10px",background:"rgba(255,50,0,0.1)",borderRadius:8,fontSize:11,color:"#ff8866"}},
          "⚠️ Always carry avalanche transceiver, probe and shovel in avalanche terrain. Check local avalanche bulletin before heading out."
        )
      ),

      // Frostbite
      e("div",{style:{padding:"14px",borderRadius:12,background:fbRisk.color+"15",border:"1px solid "+fbRisk.color+"44",marginBottom:10}},
        e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
          e("span",{style:{fontSize:24}},"🥶"),
          e("div",null,
            e("div",{style:{fontSize:13,color:fbRisk.color,fontWeight:"bold"}},"Frostbite Risk: "+fbRisk.level),
            e("div",{style:{fontSize:11,color:"#9a8c7a",marginTop:1}},fbRisk.desc)
          )
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
          e("div",{style:{fontSize:11,color:"#aaddff"}},"Air temp: "+cvtT(day.temp)+tUnit()),
          e("div",{style:{fontSize:11,color:"#ff8888"}},"Wind chill: "+cvtT(wc)+tUnit()),
          e("div",{style:{fontSize:11,color:fbRisk.color}},"Exposed skin: "+fbRisk.time),
          e("div",{style:{fontSize:11,color:"#888"}},"Wind: "+day.windMph+"mph")
        )
      ),

      // UV at altitude
      e("div",{style:{padding:"14px",borderRadius:12,background:"rgba(255,160,0,0.08)",border:"1px solid rgba(255,160,0,0.2)",marginBottom:10}},
        e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
          e("span",{style:{fontSize:24}},"☀️"),
          e("div",null,
            e("div",{style:{fontSize:13,color:uvAlt>=8?"#ff6600":uvAlt>=6?"#ffaa00":"#88cc44",fontWeight:"bold"}},"UV Index at "+iAlt+"m: "+uvAlt),
            e("div",{style:{fontSize:11,color:"#9a8c7a",marginTop:1}},"Snow reflects up to 80% of UV — doubling exposure vs ground level")
          )
        ),
        e("div",{style:{fontSize:11,color:"#888",lineHeight:1.6}},"At altitude snow reflection means UV can be double what it appears. Use SPF50+ on all exposed skin, UV-protective goggles and balaclava or buff.")
      ),

      // Lift wind status
      e("div",{style:{padding:"14px",borderRadius:12,background:lift.color+"0f",border:"1px solid "+lift.color+"33",marginBottom:10}},
        e("div",{style:{display:"flex",alignItems:"center",gap:10}},
          e("span",{style:{fontSize:24}},"🚡"),
          e("div",null,
            e("div",{style:{fontSize:13,color:lift.color,fontWeight:"bold"}},"Lift Status: "+lift.status),
            e("div",{style:{fontSize:11,color:"#9a8c7a",marginTop:1}},lift.reason)
          )
        )
      ),

      // Visibility
      e("div",{style:{padding:"14px",borderRadius:12,background:vis.color+"0f",border:"1px solid "+vis.color+"33"}},
        e("div",{style:{display:"flex",alignItems:"center",gap:10}},
          e("span",{style:{fontSize:24}},"👁️"),
          e("div",null,
            e("div",{style:{fontSize:13,color:vis.color,fontWeight:"bold"}},vis.level),
            e("div",{style:{fontSize:11,color:"#9a8c7a",marginTop:1}},vis.desc),
            e("div",{style:{fontSize:10,color:"#555",marginTop:2}},"Visibility: "+vis.vis)
          )
        )
      )
    ),

    // ── Conditions Tab ──
    iTab==="conditions" && e("div",null,
      e("div",{style:{padding:"14px",borderRadius:12,background:piste.color+"15",border:"1px solid "+piste.color+"44",marginBottom:12}},
        e("div",{style:{display:"flex",alignItems:"center",gap:12}},
          e("span",{style:{fontSize:28}},piste.icon),
          e("div",null,
            e("div",{style:{fontSize:15,color:piste.color,fontWeight:"bold"}},piste.type),
            e("div",{style:{fontSize:11,color:"#9a8c7a",marginTop:2}},piste.desc)
          )
        )
      ),

      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
        [
          {label:"Surface Temp",val:cvtT(day.temp)+tUnit(),icon:"🌡️",color:day.temp<0?"#88ccff":"#ffaa44",sub:day.temp<0?"Below freezing":"Above freezing — softening"},
          {label:"Overnight Low",val:cvtT(day.low)+tUnit(),icon:"🌙",color:day.low<-10?"#cc88ff":day.low<0?"#88ccff":"#ffaa44",sub:day.low<0?"Hard freeze overnight":"No freeze — surface softens"},
          {label:"New Snow Est.",val:newSnowCm>0?newSnowCm.toFixed(0)+"cm":"0cm",icon:"❄️",color:newSnowCm>=10?"#88ccff":newSnowCm>=3?"#aaddff":"#555",sub:newSnowCm>=10?"Excellent — check for slabs":newSnowCm>=3?"Good fresh cover":"No significant snowfall"},
          {label:"Freeze-Thaw",val:freezeThaw?"Yes":"No",icon:"🔄",color:freezeThaw?"#ff8800":"#44cc66",sub:freezeThaw?"Watch for icy runs AM":"Stable surface temperature"},
          {label:"Wind Effect",val:day.windMph+"mph",icon:"💨",color:day.windMph>=30?"#ff8800":day.windMph>=15?"#ffcc00":"#44cc66",sub:day.windMph>=30?"Blowing snow, wind slabs":day.windMph>=15?"Drifting possible":"No significant wind effect"},
          {label:"Snow Quality",val:piste.type,icon:"⛷️",color:piste.color,sub:"Based on temp + recent precipitation"},
        ].map(function(c,i){
          return e("div",{key:i,style:{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 11px",border:"1px solid rgba(255,255,255,0.06)"}},
            e("div",{style:{fontSize:10,color:"#555",marginBottom:3}},c.icon+" "+c.label),
            e("div",{style:{fontSize:13,color:c.color,fontWeight:"bold"}},c.val),
            e("div",{style:{fontSize:10,color:"#555",marginTop:1}},c.sub)
          );
        })
      ),

      // Best time to ski today
      e("div",{style:{padding:"10px 14px",borderRadius:10,background:"rgba(136,200,255,0.06)",border:"1px solid rgba(136,200,255,0.15)"}},
        e("div",{style:{fontSize:10,color:"#555",marginBottom:4,letterSpacing:1,textTransform:"uppercase"}},"⏰ Best Time to Ski Today"),
        e("div",{style:{fontSize:12,color:"#aaddff"}},
          freezeThaw ? "Morning (08:00–11:00) for firm, groomed conditions before freeze-thaw softens the surface." :
          piste.type==="Slushy" ? "Early morning (07:00–10:00) before warm temps make the snow heavy and slow." :
          piste.type==="Powder" ? "All day — powder conditions are excellent throughout." :
          "Mid-morning (09:00–12:00) once lifts are running and groomers have finished."
        )
      )
    ),

    // ── Hourly Window Tab ──
    iTab==="hourly" && e("div",null,
      e("div",{style:{fontSize:11,color:"#555",marginBottom:12}},sp.icon+" "+sp.label+" · "+day.date+" · Estimated diurnal conditions"),
      hourlyWindows.map(function(hw,i){
        var hh = String(hw.hour).padStart(2,"0")+":00";
        return e("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.05)",marginBottom:4,background:"rgba(255,255,255,0.02)"}},
          e("div",{style:{width:3,height:36,borderRadius:2,background:hw.wr.color,flexShrink:0}}),
          e("div",{style:{width:44,color:"#888",fontSize:11}},hh),
          e("div",{style:{flex:1}},
            e("div",{style:{fontSize:11,color:"#e8dcc8"}},hw.piste+" · "+cvtT(hw.temp)+tUnit()+" · "+hw.wind.toFixed(0)+"mph"),
            e("div",{style:{fontSize:10,color:"#555",marginTop:1}},"Feels: "+cvtT(hw.wc)+tUnit()+" · Vis: "+hw.vis)
          ),
          e("div",{style:{textAlign:"right"}},
            e("div",{style:{fontSize:13,fontWeight:"bold",color:hw.wr.color}},hw.wr.score+"/10"),
            e("span",{style:{fontSize:10,padding:"1px 8px",borderRadius:10,border:"1px solid "+hw.wr.color,color:hw.wr.color}},hw.wr.status.toUpperCase())
          )
        );
      })
    ),

    // ── 7-Day Planning Tab ──
    iTab==="planning" && e("div",null,
      e("div",{style:{fontSize:11,color:"#555",marginBottom:12}},"7-day ski forecast · "+sp.icon+" "+sp.label),
      days.slice(0,7).map(function(d,i){
        var dnsc = d.rainMm*(d.temp<=0?8:0);
        var dVis = visibilityRisk(d.humidity,d.rain,d.windMph,d.temp);
        var dPiste = pisteCondition(d.temp,d.low,dnsc,d.windMph,d.humidity);
        var dAvRisk = avalancheRisk(dnsc,d.windMph,d.temp,d.low);
        var dWR = skiWindowRating(d.windMph,d.temp,dVis.level,dPiste.type,iSport);
        var dWC = windChill(d.temp,d.windMph);
        return e("div",{key:i,
          onClick:function(){setDayIdx(i);setTab("summary");},
          style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",marginBottom:6,background:iDayIdx===i?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.02)",cursor:"pointer"}},
          e("div",{style:{width:3,height:44,borderRadius:2,background:dWR.color,flexShrink:0}}),
          e("div",{style:{flex:1}},
            e("div",{style:{fontSize:12,color:"#e8dcc8"}},d.date),
            e("div",{style:{fontSize:10,color:"#666",marginTop:1}},
              dPiste.icon+" "+dPiste.type+" · "+cvtT(d.temp)+tUnit()+" · "+d.windMph+"mph · "+(dnsc>0?dnsc.toFixed(0)+"cm snow":"No snow")
            ),
            e("div",{style:{fontSize:10,color:"#555",marginTop:1}},
              "Avalanche: "+dAvRisk.label+" · Vis: "+dVis.level
            )
          ),
          e("div",{style:{textAlign:"right"}},
            e("div",{style:{fontSize:14,fontWeight:"bold",color:dWR.color}},dWR.score+"/10"),
            e("div",{style:{fontSize:10,color:dWR.color}},dWR.status.toUpperCase())
          )
        );
      }),
      e("div",{style:{marginTop:8,fontSize:10,color:"#444",lineHeight:1.6,padding:"8px 12px",background:"rgba(255,255,255,0.02)",borderRadius:8}},
        "⚠️ Snow depth and avalanche data are estimated from surface weather. Always check the local avalanche bulletin (avalanche.org / sais.gov.uk) and resort snow report before heading out."
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="color:#ff6666;padding:20px;font-family:monospace;background:#0a0a1a;min-height:100vh;font-size:12px"><div style="color:#ff9944;font-size:16px;margin-bottom:12px">Runtime Error</div><b>'+e.name+':</b> '+e.message+'<br><br><pre style="white-space:pre-wrap;font-size:10px">'+e.stack+'</pre></div>';
}
</script>></div>';
}
</script>

</body>
</html>
